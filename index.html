xt":"After 10 min, arrange shrimp on top. Cook 8\u201310 min more until rice is cooked and stock is absorbed.","time":"18 min"},{"title":"Rest and serve","text":"Rest 5 min off heat. Serve directly from the pan with lemon wedges.","time":null}],"Spring Vegetable Tart with Goat Cheese":[{"title":"Prep pastry","text":"Lay puff pastry on a parchment-lined baking sheet. Score a 1-inch border around the edge. Prick inside the border all over with a fork to prevent puffing.","time":null},{"title":"Blind bake","text":"Bake at 400\u00b0F for 12\u201315 min until golden and puffed. Press down the center if it has puffed up.","time":"15 min"},{"title":"Make egg custard","text":"Whisk eggs with cream, salt, pepper, and fresh thyme.","time":null},{"title":"Assemble and bake","text":"Spread goat cheese inside the border. Arrange asparagus, sliced leeks, and halved tomatoes. Pour custard over. Bake 20\u201322 min until set.","time":"22 min"},{"title":"Serve","text":"This tart is excellent warm, at room temperature, or even cold the next day.","time":null}],"Cod in Parchment with Spring Vegetables":[{"title":"Prep the parchment pouches","text":"Cut two large pieces of parchment paper. Place a thin layer of sliced leeks on one half of each piece.","time":null},{"title":"Assemble the pouches","text":"Lay cod on the leeks. Add asparagus spears, cherry tomato halves, fresh dill, lemon slices, and a tablespoon of white wine per pouch. Add a small pat of butter.","time":null},{"title":"Seal the parchment","text":"Fold the parchment over and crimp the edges tightly all around, creating a sealed pouch. The steam inside cooks the fish.","time":null},{"title":"Bake","text":"Bake at 400\u00b0F for 15\u201318 min. The parchment will puff up when done.","time":"18 min"},{"title":"Serve at the table","text":"Bring pouches to the table. Cut open at the table \u2014 the steam release is the presentation.","time":null}],"Lamb Burger with Harissa Aioli":[{"title":"Make harissa aioli","text":"Mix mayonnaise with harissa paste, a squeeze of lemon, and salt. Refrigerate.","time":null},{"title":"Make quick cucumber pickle","text":"Thinly slice cucumber. Toss with red wine vinegar, salt, and a pinch of sugar. Let sit 10 min.","time":"10 min"},{"title":"Form patties","text":"Divide lamb into two loose patties. Season the outside only. Create a dimple in the center to prevent doming.","time":null},{"title":"Cook the burgers","text":"Cook in a cast iron skillet over high heat 3\u20134 min per side for medium. Lamb is best slightly pink.","time":"8 min"},{"title":"Assemble","text":"Toast buns. Spread harissa aioli on both halves. Add lettuce, pickled cucumber, the lamb patty, and crumbled feta. Serve immediately.","time":null}],"Leek & Gruy\u00e8re Tart with Green Salad":[{"title":"Cook the leeks","text":"Melt butter in a pan over low heat. Add sliced leeks and cook very slowly 20 min until completely soft and sweet \u2014 don't rush this step.","time":"20 min"},{"title":"Make the custard","text":"Whisk eggs with sour cream, salt, and a pinch of nutmeg.","time":null},{"title":"Assemble tart","text":"Press puff pastry into a tart pan or lay flat on a baking sheet with a border. Spread leeks inside. Scatter Gruy\u00e8re. Pour custard over.","time":null},{"title":"Bake","text":"Bake at 375\u00b0F for 25\u201330 min until the custard is set and the top is golden.","time":"30 min"},{"title":"Make salad and serve","text":"Dress butter lettuce with a simple Dijon vinaigrette. Serve tart warm or at room temperature alongside.","time":null}],"Pan-Seared Cod with Chorizo & White Wine":[{"title":"Cook chorizo","text":"Slice Spanish chorizo and cook in olive oil until the fat renders and the slices are caramelized. Remove and set aside.","time":"4 min"},{"title":"Cook shrimp","text":"Add shrimp to the chorizo oil and cook 1\u20132 min per side until just pink. Remove.","time":"3 min"},{"title":"Make the sauce","text":"Add shallots and garlic to the pan. Cook 2 min. Add white wine and reduce. Add chicken stock and simmer 3 min.","time":"6 min"},{"title":"Sear cod","text":"In a separate pan, sear cod fillets 3\u20134 min per side until golden.","time":"8 min"},{"title":"Combine and serve","text":"Return chorizo and shrimp to sauce. Plate cod and spoon the chorizo-shrimp sauce over. Scatter parsley.","time":null}],"Dry-Brined Chicken Thighs with Salsa Rossa":[{"title":"Dry brine chicken","text":"Season chicken thighs all over with kosher salt. Refrigerate uncovered at least 1 hour, ideally overnight. The salt draws moisture out then back in, seasoning deeply.","time":"60 min"},{"title":"Make salsa rossa","text":"Blend fire-roasted tomatoes with roasted Fresno chiles, garlic, red wine vinegar, and olive oil. Season well.","time":"5 min"},{"title":"Roast chicken","text":"Place thighs skin-side up on a baking sheet. Roast at 425\u00b0F for 35\u201340 min until skin is very crispy and thighs are cooked through.","time":"40 min"},{"title":"Plate","text":"Place chicken on the plate. Spoon salsa rossa over and around. Tear fresh basil over the top.","time":null}],"Chicken Thighs with Orange Gastrique":[{"title":"Render chicken skin","text":"Place thighs skin-side down in a cold pan. Heat slowly over medium heat. Render 12\u201315 min until deeply golden and very crispy.","time":"15 min"},{"title":"Finish in oven","text":"Flip and roast at 400\u00b0F for 12\u201315 min until cooked through. Rest 5 min.","time":"15 min"},{"title":"Glaze baby carrots","text":"Cook baby carrots in butter with a pinch of sugar until tender and glazed.","time":"8 min"},{"title":"Make orange gastrique","text":"Make a light caramel with sugar in the chicken pan. Add red wine vinegar to stop it, then fresh orange juice and zest. Add chicken stock. Reduce until glossy and lightly syrupy.","time":"10 min"},{"title":"Plate","text":"Serve chicken with glazed carrots. Spoon orange gastrique over the chicken.","time":null}],"Grilled Salmon Ni\u00e7oise with Basil Vinaigrette":[{"title":"Prep all components","text":"Boil potato slices in salted water until tender, toss with vinegar while warm. Soft-boil eggs exactly 7 min, ice bath. Blanch green beans 2\u20133 min, ice bath.","time":"15 min"},{"title":"Make basil vinaigrette","text":"Blend fresh basil with red wine vinegar, olive oil, and salt until smooth and bright green.","time":null},{"title":"Grill salmon","text":"Season salmon and grill over high heat 3\u20134 min per side until medium \u2014 slightly translucent at the center.","time":"8 min"},{"title":"Compose the plate","text":"Arrange potatoes, green beans, cherry tomatoes, olives, and halved eggs on a platter. Place salmon in the center. Drizzle basil vinaigrette generously over everything.","time":null}],"Grilled Chicken Thighs with Za'atar & Labneh":[{"title":"Marinate chicken","text":"Coat chicken thighs with za'atar, olive oil, minced garlic, and lemon juice. Marinate at least 30 min.","time":"30 min"},{"title":"Grill over high heat","text":"Grill skin-side down over high heat 5\u20136 min until skin has grill marks and is beginning to crisp. Flip and cook 4\u20135 min more.","time":"12 min"},{"title":"Make labneh plate","text":"Spread labneh or thick yogurt generously on the plate. Drizzle with olive oil and sprinkle with za'atar.","time":null},{"title":"Serve","text":"Place grilled chicken on the labneh. Scatter fresh parsley and a squeeze of lemon. The chicken juices mingle with the labneh \u2014 it's the whole point.","time":null}],"Pasta Primavera with Asparagus & Basil Oil":[{"title":"Make basil oil","text":"Blanch basil leaves 15 seconds, shock in ice water, squeeze dry, and blend with olive oil. This keeps the oil a brilliant, vivid green.","time":"5 min"},{"title":"Cook pasta","text":"Cook pasta in very well-salted water. In the last 2 min, add asparagus to the pot.","time":"10 min"},{"title":"Cook tomatoes","text":"Blister cherry tomatoes in a hot pan with garlic and olive oil until they begin to burst.","time":"4 min"},{"title":"Add peas","text":"Add frozen peas to the tomato pan and warm through.","time":"2 min"},{"title":"Combine and finish","text":"Toss drained pasta and asparagus with the tomato-pea mixture. Drizzle basil oil generously. Add parmesan, lemon zest, and a squeeze of lemon.","time":null}],"Cod with Brown Butter, Almonds & Spinach":[{"title":"Wilt spinach","text":"Saut\u00e9 garlic in olive oil briefly. Add spinach and toss until wilted. Season with salt. Keep warm.","time":"3 min"},{"title":"Season and sear cod","text":"Pat cod completely dry. Season well. Sear in oil over high heat 3\u20134 min per side until golden and cooked through.","time":"8 min"},{"title":"Toast almonds in brown butter","text":"In the same pan, add butter and sliced almonds. Cook over medium heat until the butter is golden brown and almonds are toasted. Add lemon juice \u2014 it will sputter.","time":"3 min"},{"title":"Plate","text":"Plate wilted spinach, set cod on top, and spoon almond brown butter over generously.","time":null}],"Pepper-Crusted Burger with Garlic Aioli":[{"title":"Make garlic aioli","text":"Mix mayonnaise with minced garlic, a squeeze of lemon, and salt. Refrigerate.","time":null},{"title":"Crust and form patties","text":"Spread coarsely crushed peppercorns on a plate. Form beef into loose patties and press both sides firmly into the pepper. Create a dimple in the center.","time":null},{"title":"Sear in cast iron","text":"Heat cast iron until smoking. Cook patties 3\u20134 min per side for medium. The pepper crust should be slightly charred.","time":"8 min"},{"title":"Melt cheese and toast buns","text":"Add cheese and cover to melt. Toast buns cut-side down until golden.","time":"2 min"},{"title":"Assemble","text":"Spread aioli on both bun halves. Add arugula, tomato, and the pepper-crusted patty. Eat immediately.","time":null}],"Braised Lamb Shanks with White Beans":[{"title":"Season and brown shanks","text":"Season aggressively. Brown all sides in a Dutch oven over high heat until very deeply caramelized \u2014 about 3\u20134 min per side.","time":"15 min"},{"title":"Build the braise","text":"Add mirepoix and cook 5 min. Add garlic, red wine, and beef stock. Return shanks \u2014 liquid should come halfway up.","time":"8 min"},{"title":"Braise low and slow","text":"Cover and cook at 325\u00b0F for 2.5\u20133 hours until the meat is completely tender and falling off the bone.","time":"180 min"},{"title":"Add white beans","text":"Remove shanks. Add drained cannellini beans to the braising liquid. Simmer 10 min. Return shanks.","time":"10 min"},{"title":"Gremolata and serve","text":"Combine lemon zest, minced garlic, and parsley. Plate shanks with beans and sauce. Scatter gremolata generously.","time":null}],"Steamed Cod with Black Bean Sauce & Bok Choy":[{"title":"Prep and season cod","text":"Place cod fillets on a heatproof plate. Mix black bean sauce with garlic, ginger, and a little soy. Spread over the fish.","time":null},{"title":"Steam the fish","text":"Place over boiling water in a steamer basket or wok with a rack. Cover and steam 8\u201310 min until fish is just cooked through.","time":"10 min"},{"title":"Steam or blanch bok choy","text":"Steam bok choy halves 3\u20134 min until tender. Or blanch in boiling water 2 min.","time":"4 min"},{"title":"Finish with hot oil","text":"Heat a little oil in a small pan until smoking. Pour over the fish and bok choy \u2014 the sizzle brightens all the aromatics.","time":"1 min"},{"title":"Plate","text":"Arrange bok choy on the plate. Place cod on top. Scatter sliced scallions over everything.","time":null}],"Seared NY Strip with Romesco & Crispy Potatoes":[{"title":"Make romesco","text":"Blend roasted peppers, toasted almonds, garlic, smoked paprika, sherry vinegar, and olive oil until smooth. Season well.","time":"5 min"},{"title":"Roast fingerling potatoes","text":"Halve potatoes and roast at 425\u00b0F for 25 min, cut-side down, until golden and crispy.","time":"25 min"},{"title":"Season and sear steak","text":"Season NY strip very generously. Sear in a smoking cast iron pan 3\u20134 min per side for medium-rare. Baste with butter and garlic in the last minute.","time":"8 min"},{"title":"Rest the steak","text":"Rest 8 min \u2014 non-negotiable. The juices redistribute dramatically.","time":"8 min"},{"title":"Plate","text":"Spread romesco on the plate. Add crispy potatoes. Slice steak against the grain and fan over the potatoes.","time":null}],"Whole Roasted Red Snapper with Lemon & Oregano":[{"title":"Prep the fish","text":"Score snapper diagonally 3\u20134 times on each side. Stuff cavity with lemon slices and garlic cloves.","time":null},{"title":"Season and dress","text":"Drizzle very generously with olive oil inside and out. Season with salt, pepper, and dried oregano \u2014 rub it into the score marks.","time":null},{"title":"Add tomatoes","text":"Arrange cherry tomatoes and lemon wedges around the fish in the roasting pan.","time":null},{"title":"Roast hot","text":"Roast at 425\u00b0F for 18\u201322 min. Fish is done when the flesh is opaque and flakes away from the bone at the thickest point.","time":"22 min"},{"title":"Serve whole","text":"Bring to the table whole. Serve with the roasted tomatoes and plenty of lemon.","time":null}],"Chicken Milanese with Shaved Fennel & Orange":[{"title":"Bread the chicken","text":"Set up breading station with flour, beaten eggs, and panko mixed with parmesan. Season at each stage. Press breadcrumbs firmly.","time":null},{"title":"Fry the Milanese","text":"Fry in olive oil 3\u20134 min per side until shatteringly golden. The oil should come halfway up the chicken.","time":"8 min"},{"title":"Make the fennel-orange salad","text":"Shave fennel very thin on a mandoline. Segment navel oranges. Toss with arugula, olive oil, and salt.","time":null},{"title":"Plate","text":"Lay Milanese on the plate. Pile salad directly on top of the hot schnitzel \u2014 the heat wilts it slightly. The contrast of hot crispy chicken and cool bright salad is the whole dish.","time":null}],"Pappardelle with Beef Chuck Rag\u00f9":[{"title":"Brown the beef","text":"Season chuck aggressively. Brown in batches over high heat. Real browning \u2014 not grey. This caramelization is the flavor foundation.","time":"12 min"},{"title":"Build the rag\u00f9","text":"In same pot, cook mirepoix 5 min. Add garlic, red wine, and tomatoes. Return beef with rosemary.","time":"8 min"},{"title":"Braise","text":"Cover and cook at 325\u00b0F for 2+ hours until meat is completely tender.","time":"120 min"},{"title":"Shred and reduce","text":"Remove meat and shred with forks. Reduce braising liquid if too thin. Return meat and stir to combine.","time":"10 min"},{"title":"Cook pasta and serve","text":"Cook pappardelle until al dente. Toss with rag\u00f9 and pasta water. Plate generously with parmesan.","time":"8 min"}],"Olive Oil\u2013Poached Salmon with Salsa Verde":[{"title":"Make salsa verde","text":"Finely chop parsley, capers, and garlic together until almost paste-like. Combine with olive oil and lemon juice. Season well.","time":null},{"title":"Prep the olive oil poach","text":"Choose a deep pan just big enough for the salmon. Pour in olive oil and heat to exactly 180\u00b0F \u2014 it should shimmer but not smoke.","time":"5 min"},{"title":"Poach salmon gently","text":"Submerge salmon in the warm oil. Poach 12\u201315 min until opaque on the outside but still silky in the center.","time":"15 min"},{"title":"Serve","text":"Remove salmon from oil and drain briefly. Serve with sliced radishes and a generous spoonful of salsa verde.","time":null}],"Lamb Chops with Pistachio Crust & Mint Chimichurri":[{"title":"Make mint chimichurri","text":"Finely chop mint, parsley, and garlic. Mix with red wine vinegar, olive oil, salt, and red pepper flakes. Let sit 20 min.","time":null},{"title":"Make pistachio crust","text":"Pulse pistachios with panko and salt until coarsely ground \u2014 not fine powder. Press onto one side of each chop.","time":null},{"title":"Sear and crust","text":"Sear chops on the non-crusted side 2\u20133 min in a hot pan. Flip and cook 2 min on the pistachio side to toast the crust.","time":"5 min"},{"title":"Finish in oven","text":"Transfer to 400\u00b0F oven for 4\u20135 min for medium-rare. The pistachio crust should be golden.","time":"5 min"},{"title":"Rest and serve","text":"Rest 3 min. Plate with mint chimichurri spooned over and around.","time":null}],"French Onion Soup with Gruy\u00e8re Croutons":[{"title":"Caramelize the onions","text":"Cook sliced onions in butter over medium-low heat for 45\u201360 min, stirring every 10 min, until deeply caramelized and jammy. Patience is required.","time":"60 min"},{"title":"Deglaze and add stock","text":"Add sherry and cook until absorbed. Add beef stock and thyme. Simmer 20 min.","time":"22 min"},{"title":"Season the soup","text":"Season generously with salt and pepper. The soup should taste deeply savory and slightly sweet from the onions.","time":null},{"title":"Make cheese croutons","text":"Top baguette slices with Gruy\u00e8re. Broil until the cheese is melted, golden, and bubbling.","time":"4 min"},{"title":"Serve","text":"Ladle soup into bowls. Float cheese croutons on top.","time":null}],"Herb-Crusted Rack of Lamb with Spring Peas":[{"title":"Season and rest rack","text":"Remove rack from fridge 40 min before cooking. Season all over with salt and pepper.","time":"40 min"},{"title":"Sear the rack","text":"Sear meaty side in a hot skillet 3\u20134 min until deeply browned.","time":"4 min"},{"title":"Crust and roast","text":"Brush with Dijon mustard. Press herb crust (panko, rosemary, thyme) firmly on. Roast at 400\u00b0F for 20\u201325 min for medium-rare (130\u00b0F). Rest 8 min.","time":"25 min"},{"title":"Make pea pur\u00e9e","text":"Blanch peas 2 min. Blend with butter, mint, and salt until silky.","time":"5 min"},{"title":"Carve and plate","text":"Cut between ribs. Plate on pea pur\u00e9e with mint tter. The butter is what makes it golden and crispy.","time":null},{"title":"Prep cod","text":"Pat fillets dry. Season with salt and pepper. Place on a parchment-lined baking sheet.","time":null},{"title":"Crust and bake","text":"Press parmesan crust firmly onto the cod \u2014 a thick, even layer. Bake at 400\u00b0F for 15\u201318 min until crust is golden and fish flakes.","time":"18 min"},{"title":"Roast asparagus","text":"Toss asparagus with olive oil and roast alongside the cod for the last 10\u201312 min.","time":"12 min"},{"title":"Serve","text":"Plate cod with asparagus. Squeeze lemon over everything.","time":null}],"Ground Lamb Bowls with Tzatziki & Rice":[{"title":"Make tzatziki","text":"Grate cucumber and squeeze completely dry. Mix with Greek yogurt, garlic, dill, lemon juice, and olive oil. Refrigerate.","time":null},{"title":"Cook rice","text":"Cook jasmine or long-grain rice per package.","time":"18 min"},{"title":"Brown lamb","text":"Brown ground lamb in olive oil over high heat, breaking up. Season with cumin, coriander, garlic, salt, and pepper.","time":"8 min"},{"title":"Make simple salad","text":"Halve cherry tomatoes. Toss with olive oil and a pinch of salt.","time":null},{"title":"Build bowls","text":"Rice in the bowl. Spiced lamb on top. A generous spoonful of tzatziki alongside. Cherry tomatoes. Extra lemon for squeezing.","time":null}],"One-Pan Chicken & Vegetables":[{"title":"Season everything","text":"Toss chicken thighs and all vegetables with olive oil, Italian seasoning, garlic, salt, and pepper. The simplicity here is the whole point.","time":null},{"title":"Arrange in pan","text":"Place chicken thighs skin-side up in the center of a large baking sheet. Surround with vegetables in a single layer.","time":null},{"title":"Roast at high heat","text":"Roast at 425\u00b0F for 35\u201340 min until chicken skin is very crispy and vegetables are tender and starting to caramelize.","time":"40 min"},{"title":"Finish","text":"Squeeze fresh lemon over everything. This is a weeknight workhorse that delivers every time.","time":null}]};

function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  lbl.textContent = state === 'syncing' ? 'Syncing…' : state === 'error' ? 'Offline' : 'Synced';
}

async function supaLoad() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/planner_state?id=eq.shared&select=*`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    if (!res.ok) throw new Error('load failed');
    const rows = await res.json();
    if (rows.length) {
      const r = rows[0];
      sel       = r.sel        || {};
      shopCk    = r.shop_ck    || {};
      cooked    = r.cooked     || {};
      favs      = r.favs       || {};
      saveLater = r.save_later || {};
      servings  = r.servings   || {};
      refreshed = r.refreshed  || {};
      notes     = r.notes      || {};
    }
    setSyncStatus('ok');
  } catch(e) {
    try {
      const d = JSON.parse(localStorage.getItem('dp_v5') || '{}');
      sel = d.sel||{}; shopCk = d.shopCk||{}; favs = d.favs||{}; cooked = d.cooked||{};
      saveLater = d.saveLater||{}; servings = d.servings||{}; refreshed = d.refreshed||{};
    } catch(_){}
    setSyncStatus('error');
  }
}

async function supaSync() {
  localStorage.setItem('dp_v5', JSON.stringify({ sel, shopCk, favs, cooked, saveLater, servings, refreshed }));

  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/planner_state?id=eq.shared`, {

        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${SUPA_KEY}`,

        'Prefer': 'return=minimal'

      })

  } catch(e) {
    setSyncStatus('error');
  }
}

// Real-time listener — when Whitney's device changes, your screen updates
async function supaSubscribe() {
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const supa = createClient(SUPA_URL, SUPA_KEY);
    supa.channel('planner_state_changes')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'planner_state' }, payload => {
        const r = payload.new;
        sel       = r.sel        || {};
        shopCk    = r.shop_ck    || {};
        cooked    = r.cooked     || {};
        favs      = r.favs       || {};
        saveLater = r.save_later || {};
        servings  = r.servings   || {};
        refreshed = r.refreshed  || {};

    }, 30000);

// 14-DAY ROLLING WINDOW — starts today, shows 14 days forward
// ═══════════════════════════════════════════════════════════════

function get14Days() {
  const today = new Date();
  today.setHours(0,0,0,0);
  return Array.from({length: 14}, (_, i) => {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    return d.toISOString().slice(0,10);
  });
}

function fmt14DayLabel() {
  const dates = get14Days();
  const s = new Date(dates[0] + 'T12:00:00');
  const e = new Date(dates[13] + 'T12:00:00');
  const mo1 = s.toLocaleDateString('en-US', {month:'short'});
  const mo2 = e.toLocaleDateString('en-US', {month:'short'});
  return `${mo1} ${s.getDate()} – ${mo2} ${e.getDate()}, ${s.getFullYear()}`;
}

function renderPlan() {
  const dates = get14Days();

  // Header
  document.getElementById('weekLabel').textContent = 'Next 14 Days';
  document.getElementById('weekSublabel').textContent = fmt14DayLabel();

  // Day rows — split by calendar Sunday boundaries
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = '';
  let sectionCount = 0;
  const sectionLabels = ['This Week', 'Next Week', 'Week After'];

  dates.forEach((ds, idx) => {
    const d_check = new Date(ds + 'T12:00:00');
    const isSunday = d_check.getDay() === 0;
    if (isSunday && idx > 0) {
      sectionCount++;
      html += `<div class="week-divider">${sectionLabels[sectionCount] || 'Upcoming'}</div>`;
    } else if (idx === 0) {
      html += `<div style="height:10px;"></div>`;
    }

// ═══════════════════════════════════════════════════════════════
// RECIPE ROTATION — maps any date to a MEALS entry by cycling
// through all 61 available recipe dates. The app never runs out.
// ═══════════════════════════════════════════════════════════════
const MEAL_DATES = Object.keys(MEALS).sort(); // sorted array of all 61 dates
const CYCLE_ORIGIN = new Date('2026-03-01T12:00:00'); // anchor date

function getCyclicMealDate(ds) {
  const d = new Date(ds + 'T12:00:00');
  const dayOffset = Math.round((d - CYCLE_ORIGIN) / (1000 * 60 * 60 * 24));
  // Cycle through MEAL_DATES, but use a shuffled order so each cycle feels different
  // Shuffle deterministically using a seed based on which cycle we're on
  const cycle = Math.floor(dayOffset / MEAL_DATES.length);
  const posInCycle = ((dayOffset % MEAL_DATES.length) + MEAL_DATES.length) % MEAL_DATES.length;
  // Rotate the date list by cycle number so each 61-day period uses a different order
  const rotated = [...MEAL_DATES.slice(cycle % MEAL_DATES.length), ...MEAL_DATES.slice(0, cycle % MEAL_DATES.length)];
  return rotated[posInCycle];
}

function getMealsForDay(ds) {
  const cyclicDs = getCyclicMealDate(ds);
  const base = MEALS[cyclicDs] || [];
  const extra = refreshed[ds] || [];
  const backups = extra.map(i => BACKUP_MEALS[i]).filter(Boolean);
  return [...base, ...backups];
}

function refreshOptions(ds) {
  const current = refreshed[ds] || [];
  const used = new Set(current);
  // Pick next 3 backups not already shown
  const available = BACKUP_MEALS.map((_,i)=>i).filter(i => !used.has(i));
  if (!available.length) {
    // All 12 shown — reset
    refreshed[ds] = [];
  } else {
    const picks = available.slice(0, Math.min(3, available.length));
    refreshed[ds] = [...current, ...picks];
  }
  save();
  renderOptionsView(ds);
}

// RECIPE CACHE — all steps stored in localStorage after first generation
// ═══════════════════════════════════════════════════════════════
let recipeCache = {}; // { "Meal Name": [ {title,text,time}, ... ] }

function loadRecipeCache() {
  try {
    const r = localStorage.getItem('dp_recipes_v1');
    if (r) recipeCache = JSON.parse(r);
  } catch(e) {}
}
function saveRecipeCache() {
  try { localStorage.setItem('dp_recipes_v1', JSON.stringify(recipeCache)); } catch(e) {}
}

function stepsHtmlFromCache(steps) {
  return steps.map((step, idx) => `
    <div class="step-row">
      <div class="step-n">${String(idx+1).padStart(2,'0')}</div>
      <div class="step-body">

        ${step.time ? `<span class="step-time">⏱ ${step.time}</span>` : ''}
      </div>

}

async function fetchStepsFromAPI(meal) {
  // All 194 recipe steps are baked into RECIPE_STEPS above.
  // This function is kept as a fallback but should never be called
  // under normal app use — RECIPE_STEPS covers everything.
  if (RECIPE_STEPS[meal.name] && RECIPE_STEPS[meal.name].length > 0) {
    return RECIPE_STEPS[meal.name];
  }
  // Fallback: return a placeholder rather than hitting the API
  return [{"title":"Recipe steps unavailable","text":"Steps for this recipe aren't cached yet. Try removing and re-adding this meal.","time":null}];
}

// ─── BACKGROUND BULK GENERATOR ───────────────────────────────
// Runs silently in the background after app loads.
// Generates any missing recipes without blocking the UI.
let generatingInBackground = false;

async function backgroundGenerateAll() {
  if (generatingInBackground) return;
  generatingInBackground = true;

  // Collect all meals that don't have cached steps yet
  const missing = [];
  Object.values(MEALS).forEach(dayMeals => {
    dayMeals.forEach(meal => {
      if (!recipeCache[meal.name]) missing.push(meal);
    });
  });

  if (missing.length === 0) { generatingInBackground = false; return; }

  // Update nav to show generation progress
  const showProgress = (done, total) => {
    const meta = document.getElementById('topMeta');
    if (meta && done < total) {
      const pct = Math.round((done/total)*100);
      meta.innerHTML = `<span style="color:var(--gold)">⚙ Loading recipes ${pct}%</span>`;
    } else if (meta && done >= total) {
      updateMeta();
    }
  };

  showProgress(0, missing.length);

  // Process in batches of 3 (one API call = 3 recipes)
  const BATCH = 3;
  let done = 0;

  for (let i = 0; i < missing.length; i += BATCH) {
    const batch = missing.slice(i, i + BATCH);

    try {
      // Generate all recipes in the batch with a single call
      const ingredientsBlock = batch.map(m =>
        `"${m.name}": ${m.cuisine}, ${m.time}min, diff ${m.diff}/5. Ingredients: ${m.ingredients.map(x=>`${x.n}: ${x.q}`).join(', ')}`
      ).join('\n\n');

      const response = await fetch('/.netlify/functions/recipe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mealName: `BATCH:${batch.map(m=>m.name).join('|')}`,
          cuisine: batch.map(m=>m.cuisine).join(','),
          time: batch.map(m=>m.time).join(','),
          diff: batch.map(m=>m.diff).join(','),
          ingredients: batch.map(m =>
            `"${m.name}": ${m.cuisine}, ${m.time}min, diff ${m.diff}/5. Ingredients: ${m.ingredients.map(x=>`${x.n}: ${x.q}`).join(', ')}`
          ).join('\n\n')
        })
      });

      const data = await response.json();
      const text = data.content?.[0]?.text || '{}';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      // Store each recipe that came back
      batch.forEach(meal => {
        const steps = parsed[meal.name];
        if (steps && Array.isArray(steps) && steps.length > 0) {
          recipeCache[meal.name] = steps;
          done++;
        }
      });

      saveRecipeCache();
      showProgress(done, missing.length);

      // If the recipe view is currently showing a meal we just cached, refresh it
      if (activeDate && sel[activeDate] !== undefined && viewingRecipe) {
        const activeMeal = MEALS[activeDate][sel[activeDate]];
        if (batch.find(m => m.name === activeMeal.name) && recipeCache[activeMeal.name]) {
          const container = document.getElementById('stepsContainer');
          if (container) container.innerHTML = stepsHtmlFromCache(recipeCache[activeMeal.name]);
        }
      }

    } catch(e) {
      // Silently skip failed batches — they'll retry next session
      done += batch.length;
      showProgress(done, missing.length);
    }

    // Small delay between batches to stay well within rate limits
    await new Promise(r => setTimeout(r, 800));
  }

  generatingInBackground = false;
  updateMeta();
}

// ─── SERVING MULTIPLIER HELPER ───────────────────────────────
function multiplyQty(q, mult) {
  if (mult === 1) return q;
  // Try to parse fractions and numbers
  const fracs = {'½':0.5,'¼':0.25,'¾':0.75,'⅓':0.333,'⅔':0.667,'⅛':0.125};
  let str = q.trim();
  // replace unicode fractions
  let num = 0;
  let rest = str;
  Object.entries(fracs).forEach(([f, v]) => {
    if (str.startsWith(f)) { num = v; rest = str.slice(f.length).trim(); }
  });
  // leading number
  const match = rest.match(/^(\d+\.?\d*)/);
  if (match) { num += parseFloat(match[1]); rest = rest.slice(match[1].length).trim(); }
  if (num === 0) return q; // can't parse, return as-is
  const result = num * mult;
  const unit = rest;
  // Format cleanly
  const display = result % 1 === 0 ? result.toString() : result === 0.5 ? '½' : result === 0.25 ? '¼' : result === 0.75 ? '¾' : result.toFixed(1).replace(/\.0$/,'');
  return unit ? `${display} ${unit}` : display;
}

// ─── RECIPE VIEW ─────────────────────────────────────────────
async function renderRecipeView(ds, mi) {
  const allMeals = getMealsForDay(ds);
  const meal = allMeals[mi];
  if (!meal) { showOptions(); return; }

  const sv = servings[ds] || 1; // current multiplier
  const body = document.getElementById('slideBody');
  const diffLbl = ['Easy','Easy','Medium','Medium','Hard','Hard'][meal.diff] || 'Medium';
  const timeStr = meal.time >= 120 ? `${Math.round(meal.time/60)}h ${meal.time%60>0?meal.time%60+'m':''}`.trim() : `${meal.time} min`;
  const isFav = !!favs[meal.name];
  const pips = [1,2,3,4,5].map(n => `<div class="pip${n<=meal.diff?' on':''}"></div>`).join('');

  const ingsHtml = meal.ingredients.map((ing, idx) =>
    `<div class="ing-row"><span class="ing-name">${ing.n}</span><span class="ing-qty" data-idx="${idx}">${multiplyQty(ing.q, sv)}</span></div>`
  ).join('');

  // Check baked-in steps first, then localStorage cache
  const cached = RECIPE_STEPS[meal.name] || recipeCache[meal.name];
  const skeletonHtml = [1,2,3,4,5].map(i => `
    <div class="step-row">
      <div class="step-n" style="color:var(--cream3)">${String(i).padStart(2,'0')}</div>
      <div class="step-body">
        <div class="skeleton" style="height:14px;width:${50+Math.random()*30}%;margin-bottom:6px;"></div>
        <div class="skeleton" style="height:12px;width:${60+Math.random()*30}%;margin-bottom:4px;"></div>
        <div class="skeleton" style="height:12px;width:${40+Math.random()*20}%;"></div>
      </div>
    </div>`).join('');

  const allMealsForDay = getMealsForDay(ds);
  const totalOptions = allMealsForDay.length;
  const prevMi = mi > 0 ? mi - 1 : null;
  const nextMi = mi < totalOptions - 1 ? mi + 1 : null;

  body.innerHTML = `<div class="recipe-wrap" id="recipeWrap"
    data-ds="${ds}" data-mi="${mi}"
    data-touch-start-x="">

    <div class="recipe-nav">
      <button class="recipe-nav-btn" onclick="swapRecipe('${ds}',${prevMi})" ${prevMi===null?'disabled':''}>
        ‹ Prev
      </button>
      <span class="recipe-nav-pos">${mi + 1} of ${totalOptions}</span>
      <button class="recipe-nav-btn" onclick="swapRecipe('${ds}',${nextMi})" ${nextMi===null?'disabled':''}>
        Next ›
      </button>
    </div>

    <div class="recipe-hero">
      <div class="recipe-eyebrow">${meal.cuisine}</div>
      <div class="recipe-title">${meal.name}</div>
      ${meal.note ? `<div style="margin-top:8px;font-size:11px;color:rgba(245,240,232,0.55);line-height:1.5;padding-right:36px;">${meal.note.startsWith('⚠️') ? '⚠️ ' : '↔ '}<span>${meal.note.replace('⚠️ ','')}</span></div>` : ''}
      <button class="recipe-fav${isFav?' on':''}" id="recipeFavBtn" onclick="toggleFavFromRecipe('${ds}',${mi})">${isFav?'★':'☆'}</button>
    </div>
    <div class="recipe-stats">
      <div class="rstat"><div class="rstat-val">${meal.cal}</div><div class="rstat-lbl">Cal / person</div></div>
      <div class="rstat"><div class="rstat-val">${meal.protein}g</div><div class="rstat-lbl">Protein / person</div></div>
      <div class="rstat"><div class="rstat-val">${timeStr}</div><div class="rstat-lbl">Cook Time</div></div>
      <div class="rstat"><div class="diff-pips">${pips}</div><div class="rstat-lbl">${diffLbl}</div></div>
    </div>

    <div class="serving-row">
      <span class="serving-label">Servings</span>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div class="serving-btns">
          <button class="serving-btn${sv===1?' active':''}" onclick="setServings('${ds}',1)">1×</button>
          <button class="serving-btn${sv===2?' active':''}" onclick="setServings('${ds}',2)">2×</button>
          <button class="serving-btn${sv===3?' active':''}" onclick="setServings('${ds}',3)">3×</button>
        </div>
        <div style="font-size:10px;color:var(--ink4);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.15em;">
          <span class="serves-label">serves ${sv === 1 ? '2' : sv === 2 ? '4' : '6'}</span>
        </div>
      </div>
    </div>

    <div class="recipe-actions">
      <button class="recipe-action-btn${cooked[ds]?' cooked':''}" id="cookedBtn" onclick="toggleCooked('${ds}')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M4 7l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${cooked[ds] ? 'Unmark' : 'Mark Cooked'}
      </button>
      <button class="recipe-action-btn remove" onclick="removeRecipe('${ds}')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Remove
      </button>
    </div>

    <div class="recipe-sec">
      <div class="recipe-sec-title ing-title">Ingredients${sv > 1 ? ` <span style="font-size:10px;color:var(--rust);font-weight:400;letter-spacing:0.1em;">(×${sv})</span>` : ''}</div>
      <div>${ingsHtml}</div>
    </div>
    <div class="recipe-sec" style="margin-top:16px;">
      <div class="recipe-sec-title">Instructions</div>
      <div id="stepsContainer">${cached ? stepsHtmlFromCache(cached) : skeletonHtml}</div>
    </div>

    <div class="recipe-notes-wrap">
      <div class="recipe-notes-label">Notes</div>
      <textarea class="recipe-notes-input" id="recipeNotes" placeholder="How'd it go? Substitutions, tweaks, Whitney's verdict…" oninput="saveNote('${ds}',this.value)">${notes[ds] || ''}</textarea>
      <div class="recipe-notes-saved" id="notesSaved"></div>
    </div>

    <div style="height:32px;"></div>
  </div>`;

  // Swipe gesture support
  const wrap = document.getElementById('recipeWrap');
  let touchStartX = 0;
  wrap.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  wrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) < 50) return; // too short
    if (dx < 0 && nextMi !== null) swapRecipe(ds, nextMi);   // swipe left = next
    if (dx > 0 && prevMi !== null) swapRecipe(ds, prevMi);   // swipe right = prev
  }, { passive: true });

  if (!cached) {
    try {
      const steps = await fetchStepsFromAPI(meal);
      recipeCache[meal.name] = steps;
      saveRecipeCache();
      const container = document.getElementById('stepsContainer');
      if (container) container.innerHTML = stepsHtmlFromCache(steps);
    } catch(err) {
      const container = document.getElementById('stepsContainer');
      if (container) container.innerHTML = `
        <div style="padding:16px 0;">
          <div style="font-size:13px;color:var(--ink3);margin-bottom:12px;">Recipe steps are loading in the background. Try tapping again in a moment.</div>
          <button onclick="renderRecipeView('${ds}',${mi})" style="background:none;border:1.5px solid var(--border);padding:8px 16px;border-radius:4px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;color:var(--ink3);">↺ Retry</button>
        </div>`;
    }
  }
}

function setServings(ds, mult) {
  servings[ds] = mult;
  save();

  const allMeals = getMealsForDay(ds);
  const meal = allMeals[sel[ds]];
  if (!meal) return;

  // Update serving buttons active state
  document.querySelectorAll('.serving-btn').forEach(btn => {
    const btnMult = parseInt(btn.textContent);
    btn.classList.toggle('active', btnMult === mult);
  });

  // Update serves label
  const servesLabel = document.querySelector('.serving-row .serves-label');
  if (servesLabel) servesLabel.textContent = `serves ${mult * 2}`;

  // Update ingredient quantities in place
  meal.ingredients.forEach((ing, idx) => {
    const qEl = document.querySelector(`.ing-qty[data-idx="${idx}"]`);
    if (qEl) qEl.textContent = multiplyQty(ing.q, mult);
  });

  // Update ingredients section title
  const ingTitle = document.querySelector('.recipe-sec-title.ing-title');
  if (ingTitle) ingTitle.innerHTML = `Ingredients${mult > 1 ? ` <span style="font-size:10px;color:var(--rust);font-weight:400;letter-spacing:0.1em;">(×${mult})</span>` : ''}`;
}

function showOptions() {
  viewingRecipe = false;
  renderSlideBody();
}

function swapRecipe(ds, mi) {
  if (mi === null || mi === undefined) return;
  sel[ds] = mi;
  save();
  renderRecipeView(ds, mi);
  // Scroll back to top of slide body
  const body = document.getElementById('slideBody');
  if (body) body.scrollTop = 0;
}

let noteTimer = null;
function saveNote(ds, text) {
  notes[ds] = text;
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => {
    save();
    const el = document.getElementById('notesSaved');
    if (el) {
      el.textContent = 'Saved';
      setTimeout(() => { if (el) el.textContent = ''; }, 1500);
    }
  }, 600);
}

function toggleCooked(ds) {
  cooked[ds] = !cooked[ds];
  save();
  const btn = document.getElementById('cookedBtn');
  if (btn) {
    btn.classList.toggle('cooked', cooked[ds]);
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M4 7l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> ${cooked[ds] ? 'Unmark' : 'Mark Cooked'}`;
  }
  // Cooked meals are fully removed from grocery list (already bought & made)
  renderGrocery();
  renderPlan();
  updateMeta();
}

function removeRecipe(ds) {
  delete sel[ds];
  delete cooked[ds];
  delete servings[ds];
  delete saveLater[ds];
  delete refreshed[ds];
  delete notes[ds];
  save();
  closeSlide();
  renderGrocery();
}

function closeSlide() {
  document.getElementById('slidePanel').classList.remove('open');
  document.body.style.overflow = '';
  const wasDate = activeDate;
  activeDate = null;
  viewingRecipe = false;
  // Re-render plan so day row reflects any selection changes
  renderPlan();
}

// ═══════════════════════════════════════════════════════════════
// FAVORITES
// ═══════════════════════════════════════════════════════════════
function toggleFav(ds, mi, mealNameOverride) {
  const allMeals = getMealsForDay(ds);
  const meal = allMeals[mi] || (mealNameOverride ? {name: mealNameOverride} : null);
  if (!meal) return;
  if (favs[meal.name]) {
    delete favs[meal.name];
  } else {
    favs[meal.name] = { ...meal, savedAt: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) };
  }
  save();
  renderOptionsView(ds);
  renderFavs();
  updateMeta();
}

function toggleFavFromRecipe(ds, mi) {
  const allMeals = getMealsForDay(ds);
  const meal = allMeals[mi];
  if (!meal) return;
  if (favs[meal.name]) {
    delete favs[meal.name];
  } else {
    favs[meal.name] = { ...meal, savedAt: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) };
  }
  save();
  const btn = document.getElementById('recipeFavBtn');
  if (btn) { btn.textContent = favs[meal.name] ? '★' : '☆'; btn.classList.toggle('on', !!favs[meal.name]); }
  renderFavs();
}

function renderFavs() {
  const list = Object.values(favs);
  const sub = document.getElementById('favsSub');
  const content = document.getElementById('favsContent');

  if (!list.length) {
    sub.textContent = 'No favorites yet';
    content.innerHTML = `<div class="favs-empty">
      <div class="favs-empty-h">No Favorites Yet</div>
      <div class="favs-empty-p">Tap the ☆ on any recipe to save it here — works across any date.</div>
    </div>`;
    return;
  }

  sub.textContent = `${list.length} saved recipe${list.length>1?'s':''}`;
  content.innerHTML = list.map(m => {
    const timeStr = m.time >= 120 ? `${Math.round(m.time/60)}h` : `${m.time}m`;
    const diffLbl = ['Easy','Easy','Medium','Medium','Hard','Hard'][m.diff] || 'Medium';
    const keyIngs = (m.ingredients||[]).slice(0,5).map(i => `<span class="ing-chip">${i.n}</span>`).join('');
    return `<div class="fav-card">
      <div class="fav-card-top">
        <div class="fav-body">
          <div class="fav-cuisine">${m.cuisine} · saved ${m.savedAt}</div>
          <div class="fav-name">${m.name}</div>
          <div class="fav-stats">
            <span class="fav-stat"><strong>${m.cal}</strong> cal</span>
            <span class="fav-stat"><strong>${m.protein}g</strong> protein</span>
            <span class="fav-stat"><strong>${timeStr}</strong></span>
            <span class="fav-stat">${diffLbl}</span>
          </div>
        </div>
        <button class="fav-rm" onclick="removeFav('${m.name.replace(/'/g,"\\'")}')">★</button>
      </div>
      <div style="height:1px;background:var(--cream2);margin:0 14px;"></div>
      <div style="padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:4px;">${keyIngs}</div>
    </div>`;
  }).join('');
}

function removeFav(name) {
  delete favs[name];
  save();
  renderFavs();
}

// ═══════════════════════════════════════════════════════════════
// GROCERY
// ═══════════════════════════════════════════════════════════════
const CAT_ORDER = ['Seafood','Meat','Produce','Dairy','Grains','Pantry'];

function renderGrocery() {
  const allSelDates = Object.keys(sel).sort().filter(ds => !cooked[ds]);
  const body = document.getElementById('grocContent');
  const sub = document.getElementById('grocSub');

  if (!allSelDates.length) {
    sub.textContent = 'Select dinners to build your list';
    body.innerHTML = `<div class="groc-empty"><div class="groc-empty-h">Start Planning</div><div class="groc-empty-p">Tap any day in the Plan tab and choose a dinner. Your grocery list builds automatically.</div></div>`;
    return;
  }

  // Split dates: active vs saved-for-later
  const activeDates = allSelDates.filter(ds => !saveLater[ds]);
  const laterDates  = allSelDates.filter(ds =>  saveLater[ds]);

  // Aggregate ingredients from active dates only (respects servings multiplier)
  const agg = {};
  activeDates.forEach(ds => {
    const allMeals = getMealsForDay(ds);
    const m = allMeals[sel[ds]];
    if (!m) return;
    const sv = servings[ds] || 1;
    const d = new Date(ds + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    m.ingredients.forEach(ing => {
      const k = `${ing.c}|||${ing.n}`;
      if (!agg[k]) agg[k] = { c: ing.c, n: ing.n, q: ing.q, sv: 1, dates: [], meals: [] };
      agg[k].dates.push(label);
      agg[k].meals.push(m.name.split(' with ')[0].split(' & ')[0]);
      if (sv > agg[k].sv) agg[k].sv = sv;
    });
  });

  const totalActive = Object.keys(agg).length;
  const ckd = Object.keys(shopCk).filter(k => shopCk[k] && agg[k]).length;
  sub.textContent = `${activeDates.length} meal${activeDates.length!==1?'s':''} · ${totalActive - ckd} items remaining${laterDates.length ? ` · ${laterDates.length} meal${laterDates.length!==1?'s':''} saved for later` : ''}`;

  // ── Meal-level save-for-later checkboxes at top ──
  const mealChipsHtml = allSelDates.map(ds => {
    const allMeals = getMealsForDay(ds);
    const m = allMeals[sel[ds]];
    if (!m) return '';
    const d = new Date(ds + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const short = m.name.length > 30 ? m.name.slice(0,28)+'\u2026' : m.name;
    const isSaved = !!saveLater[ds];
    const sv = servings[ds] || 1;
    return `<div class="meal-save-row">
      <span class="meal-save-date">${label}</span>
      <span class="meal-save-name">${short}${sv>1?` <span style="color:var(--rust);font-size:10px;">\xd7${sv}</span>`:''}</span>
      <div class="meal-save-cb${isSaved?' on':''}" onclick="toggleMealSaveLater('${ds}')" title="${isSaved?'Move back to list':'Save for later'}">${isSaved?'\u2713':''}</div>
    </div>`;
  }).join('');

  // ── Active ingredient list ──
  const byCat = {};
  Object.values(agg).forEach(item => {
    if (!byCat[item.c]) byCat[item.c] = [];
    byCat[item.c].push(item);
  });

  let cols = '';
  if (activeDates.length) {
    CAT_ORDER.forEach(cat => {
      if (!byCat[cat]) return;
      const items = byCat[cat].sort((a,b) => a.n.localeCompare(b.n));
      cols += `<div class="groc-sec">
        <div class="groc-sec-title">${cat}</div>
        ${items.map(item => {
          const k = `${item.c}|||${item.n}`;
          const ck = shopCk[k];
          const qDisplay = multiplyQty(item.q, item.sv);
          const forLabel = item.meals.length > 1
            ? `<span class="groc-for">${[...new Set(item.meals)].slice(0,2).join(', ')}${item.meals.length > 2 ? ' +more' : ''}</span>`
            : `<span class="groc-for">${item.meals[0]}</span>`;
          return `<div class="groc-item${ck?' ckd':''}" onclick="toggleShop('${k.replace(/'/g,"\\'")}')">
            <div class="g-cb">${ck?'\u2713':''}</div>
            <div class="groc-item-r">
              <div class="groc-item-name">${item.n}</div>
              <div class="groc-item-meta">
                ${item.dates.length > 1 ? `<span class="groc-multi">\xd7${item.dates.length} meals</span>` : `<span class="groc-qty">${qDisplay}</span>`}
                ${forLabel}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    });
  } else {
    cols = `<div style="padding:24px 16px;font-size:13px;color:var(--ink4);font-style:italic;">All meals saved for later. Uncheck a meal above to show its ingredients.</div>`;
  }

  const chipHeader = `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 16px 4px;border-bottom:1px solid var(--border2);margin-bottom:0;">
    <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--ink4);">Meal</span>
    <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--ink4);">Save for Later</span>
  </div>`;
  body.innerHTML = chipHeader + `<div class="meal-chips" style="padding:4px 16px 8px;">${mealChipsHtml}</div>${cols}<div style="height:40px;"></div>`;
}

function toggleMealSaveLater(ds) {
  saveLater[ds] = !saveLater[ds];
  if (!saveLater[ds]) delete saveLater[ds];
  save(); renderGrocery();
}

function toggleShop(k) { shopCk[k] = !shopCk[k]; save(); renderGrocery(); }
function clearChecked() { shopCk = {}; save(); renderGrocery(); }
function clearAllMeals() {
  if (!Object.keys(sel).length) return;
  if (confirm('Clear all meal selections?')) {
    sel = {}; shopCk = {}; cooked = {}; saveLater = {}; servings = {}; refreshed = {}; notes = {};
    save(); renderPlan(); renderGrocery(); updateMeta();
  }
}

function shareRecipe(ds, mi) {
  const allMeals = getMealsForDay(ds);
  const meal = allMeals[mi];
  if (!meal) return;
  const sv = servings[ds] || 1;
  const serves = sv * 2;
  const d = new Date(ds + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  const ingList = meal.ingredients
    .map(ing => `  • ${ing.n} — ${multiplyQty(ing.q, sv)}`)
    .join('\n');

  const steps = RECIPE_STEPS[meal.name] || recipeCache[meal.name];
  const stepList = steps
    ? steps.map((s, i) => `  ${i+1}. ${s.title}: ${s.text}`).join('\n')
    : '  (Steps available in the app)';

  const text = `🍽 ${meal.name}
${dateLabel} · Serves ${serves} · ${meal.cal} cal/person · ${meal.time} min

INGREDIENTS
${ingList}

INSTRUCTIONS
${stepList}

— via blibbyeats.netlify.app`;

  if (navigator.share) {
    navigator.share({ title: meal.name, text }).catch(() => copyToClipboard(text));
  } else {
    copyToClipboard(text);
  }
}

function shareGroceryList() {
  const activeDates = Object.keys(sel).sort().filter(ds => !cooked[ds] && !saveLater[ds]);
  if (!activeDates.length) { alert('No active meals in your grocery list.'); return; }

  const agg = {};
  activeDates.forEach(ds => {
    const allMeals = getMealsForDay(ds);
    const m = allMeals[sel[ds]];
    if (!m) return;
    const sv = servings[ds] || 1;
    m.ingredients.forEach(ing => {
      const k = `${ing.c}|||${ing.n}`;
      if (!agg[k]) agg[k] = { c: ing.c, n: ing.n, q: ing.q, sv, count: 0 };
      agg[k].count++;
      if (sv > agg[k].sv) agg[k].sv = sv;
    });
  });

  const lines = ['\ud83d\uded2 GROCERY LIST\n'];
  CAT_ORDER.forEach(cat => {
    const items = Object.values(agg)
      .filter(i => i.c === cat && !shopCk[`${i.c}|||${i.n}`])
      .sort((a,b) => a.n.localeCompare(b.n));
    if (!items.length) return;
    lines.push(`\n${cat.toUpperCase()}`);
    items.forEach(i => {
      const qty = multiplyQty(i.q, i.sv);
      lines.push(`\u2022 ${i.n} — ${qty}${i.count > 1 ? ` (${i.count} meals)` : ''}`);
    });
  });

  const text = lines.join('\n');
  if (navigator.share) {
    navigator.share({ text }).catch(() => copyToClipboard(text));
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.share-btn');
      if (btn) { const o = btn.textContent; btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = o, 2000); }
    }).catch(() => window.open('sms:?body=' + encodeURIComponent(text)));
  } else {
    window.open('sms:?body=' + encodeURIComponent(text));
  }
}

// ═══════════════════════════════════════════════════════════════
// META
// ═══════════════════════════════════════════════════════════════
function updateMeta() {
  const dates = get14Days();
  const n = dates.filter(ds => sel[ds] !== undefined).length;
  const f = Object.keys(favs).length;
  const meta = document.getElementById('topMeta');
  let parts = [];
  if (n > 0) parts.push(`<span>${n}</span> planned`);
  if (f > 0) parts.push(`<span>${f}</span> ★`);
  meta.innerHTML = parts.length ? parts.join(' &nbsp;·&nbsp; ') : 'No meals selected';
}

// ═══════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════
function renderStats() {
  const body = document.getElementById('statsBody');
  const sub = document.getElementById('statsSub');

  // Collect ALL planned meals (all time, not just 14-day window)
  const allSelDates = Object.keys(sel).sort();
  const allMeals = allSelDates.map(ds => { const m = getMealsForDay(ds); return m[sel[ds]]; }).filter(Boolean);
  const cookedMeals = allSelDates.filter(ds => cooked[ds]).map(ds => { const m = getMealsForDay(ds); return m[sel[ds]]; }).filter(Boolean);

  if (!allMeals.length) {
    sub.textContent = 'Plan some meals to see your stats';
    body.innerHTML = `<div class="stats-empty">
      <div class="stats-empty-h">Nothing Yet</div>
      <div class="stats-empty-p">Head to the Plan tab, choose some dinners, and your stats will appear here.</div>
    </div>`;
    return;
  }

  sub.textContent = `${allMeals.length} meals planned · ${cookedMeals.length} cooked`;

  // ── CALCULATE ──────────────────────────────────────────────

  // Avg calories & protein
  const avgCal = Math.round(allMeals.reduce((s,m) => s+m.cal, 0) / allMeals.length);
  const avgProtein = Math.round(allMeals.reduce((s,m) => s+m.protein, 0) / allMeals.length);
  const totalCookTime = allMeals.reduce((s,m) => s+m.time, 0);
  const cookedTime = cookedMeals.reduce((s,m) => s+m.time, 0);
  const avgCookTime = Math.round(totalCookTime / allMeals.length);

  // Hours cooked
  const hoursCooked = Math.floor(cookedTime / 60);
  const minsCooked = cookedTime % 60;
  const cookedTimeStr = hoursCooked > 0 ? `${hoursCooked}h ${minsCooked>0?minsCooked+'m':''}`.trim() : `${minsCooked}m`;

  // Cuisine rankings
  const cuisineCount = {};
  allMeals.forEach(m => { cuisineCount[m.cuisine] = (cuisineCount[m.cuisine]||0)+1; });
  const cuisines = Object.entries(cuisineCount).sort((a,b) => b[1]-a[1]);
  const maxCuisine = cuisines[0]?.[1] || 1;

  // Ingredient frequency
  const ingCount = {};
  allMeals.forEach(m => {
    m.ingredients.forEach(i => {
      ingCount[i.n] = (ingCount[i.n]||0)+1;
    });
  });
  const topIngs = Object.entries(ingCount).sort((a,b) => b[1]-a[1]).slice(0,12);

  // Difficulty breakdown
  const diffCount = {Easy:0, Medium:0, Hard:0};
  allMeals.forEach(m => {
    const d = m.diff <= 2 ? 'Easy' : m.diff <= 4 ? 'Medium' : 'Hard';
    diffCount[d]++;
  });

  // Calorie range
  const minCal = Math.min(...allMeals.map(m=>m.cal));
  const maxCal = Math.max(...allMeals.map(m=>m.cal));

  // Protein range
  const maxProtein = Math.max(...allMeals.map(m=>m.protein));

  // Cook time breakdown
  const timeGroups = {'Under 30m':0,'30–60m':0,'1–2h':0,'2h+':0};
  allMeals.forEach(m => {
    if (m.time < 30) timeGroups['Under 30m']++;
    else if (m.time <= 60) timeGroups['30–60m']++;
    else if (m.time <= 120) timeGroups['1–2h']++;
    else timeGroups['2h+']++;
  });
  const maxTimeGroup = Math.max(...Object.values(timeGroups));

  // Streak — consecutive days with a planned meal ending today or before today
  const today = new Date(); today.setHours(0,0,0,0);
  let streak = 0;
  let checkDate = new Date(today);
  while (true) {
    const ds = checkDate.toISOString().slice(0,10);
    if (sel[ds] !== undefined) {
      streak++;
      checkDate.setDate(checkDate.getDate()-1);
    } else break;
  }

  // Top protein meals
  const topProtein = [...allMeals].sort((a,b)=>b.protein-a.protein).slice(0,3);

  // ── RENDER ─────────────────────────────────────────────────

  const barColor = (i) => {
    const colors = ['var(--rust)','var(--ochre)','var(--sage)','var(--ink3)','var(--ink4)'];
    return colors[i % colors.length];
  };

  body.innerHTML = `

    ${/* ── KEY NUMBERS ──*/''}
    <div class="stat-section">
      <div class="stat-section-title">At a Glance</div>
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-card-val">${avgCal}<span class="stat-card-unit">cal</span></div>
          <div class="stat-card-lbl">Avg calories / dinner</div>
          <div class="stat-card-sub">Range: ${minCal}–${maxCal}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-val">${avgProtein}<span class="stat-card-unit">g</span></div>
          <div class="stat-card-lbl">Avg protein / dinner</div>
          <div class="stat-card-sub">Best: ${maxProtein}g</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-val">${avgCookTime}<span class="stat-card-unit">min</span></div>
          <div class="stat-card-lbl">Avg cook time</div>
          <div class="stat-card-sub">${allMeals.length} meals planned</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-val">${cookedTimeStr}</div>
          <div class="stat-card-lbl">Time spent cooking</div>
          <div class="stat-card-sub">${cookedMeals.length} meals cooked</div>
        </div>
      </div>
    </div>

    ${/* ── STREAK ──*/''}
    ${streak > 0 ? `
    <div class="stat-section">
      <div class="stat-section-title">Cooking Streak</div>
      <div class="streak-display">
        <div class="streak-num">${streak}</div>
        <div class="streak-body">
          <div class="streak-lbl">day${streak>1?'s':''} in a row</div>
          <div class="streak-sub">Consecutive days with dinner planned</div>
        </div>
      </div>
    </div>` : ''}

    ${/* ── CUISINE RANKINGS ──*/''}
    <div class="stat-section">
      <div class="stat-section-title">Cuisines Ranked</div>
      <div class="bar-rows">
        ${cuisines.slice(0,8).map(([cuisine, count], i) => `
          <div class="bar-row">
            <div class="bar-label">${cuisine}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round((count/maxCuisine)*100)}%;background:${barColor(i)};"></div></div>
            <div class="bar-val">${count}</div>
          </div>`).join('')}
      </div>
    </div>

    ${/* ── DIFFICULTY ──*/''}
    <div class="stat-section">
      <div class="stat-section-title">Difficulty Mix</div>
      <div class="diff-grid">
        <div class="diff-chip">
          <div class="diff-chip-val" style="color:var(--sage)">${diffCount.Easy}</div>
          <div class="diff-chip-lbl">Easy</div>
        </div>
        <div class="diff-chip">
          <div class="diff-chip-val" style="color:var(--ochre)">${diffCount.Medium}</div>
          <div class="diff-chip-lbl">Medium</div>
        </div>
        <div class="diff-chip">
          <div class="diff-chip-val" style="color:var(--rust)">${diffCount.Hard}</div>
          <div class="diff-chip-lbl">Hard</div>
        </div>
      </div>
    </div>

    ${/* ── COOK TIME SPREAD ──*/''}
    <div class="stat-section">
      <div class="stat-section-title">Cook Time Breakdown</div>
      <div class="bar-rows">
        ${Object.entries(timeGroups).map(([label, count], i) => `
          <div class="bar-row">
            <div class="bar-label">${label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${maxTimeGroup>0?Math.round((count/maxTimeGroup)*100):0}%;background:${barColor(i)};"></div></div>
            <div class="bar-val">${count}</div>
          </div>`).join('')}
      </div>
    </div>

    ${/* ── TOP PROTEINS ──*/''}
    <div class="stat-section">
      <div class="stat-section-title">Highest Protein Meals</div>
      <div class="bar-rows">
        ${topProtein.map((m, i) => `
          <div class="bar-row">
            <div class="bar-label" title="${m.name}">${m.name.length>22?m.name.slice(0,20)+'…':m.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round((m.protein/maxProtein)*100)}%;background:${barColor(i)};"></div></div>
            <div class="bar-val">${m.protein}g</div>
          </div>`).join('')}
      </div>
    </div>

    ${/* ── FAVORITE INGREDIENTS ──*/''}
    <div class="stat-section">
      <div class="stat-section-title">Most Used Ingredients</div>
      <div class="ing-freq-grid">
        ${topIngs.map(([name, count]) => `
          <div class="ing-freq-chip">
            <span>${name}</span>
            <span class="ing-freq-count">${count}</span>
          </div>`).join('')}
      </div>
    </div>

    <div style="height:8px;"></div>
  `;

  // ── COOKED HISTORY ───────────────────────────────────────────
  const cookedDates = Object.keys(sel)
    .filter(ds => cooked[ds] && sel[ds] !== undefined)
    .sort((a,b) => b.localeCompare(a)); // most recent first

  if (cookedDates.length > 0) {
    const historyOpen = window._historyOpen || false;
    body.innerHTML += `
      <button class="history-toggle" onclick="toggleHistorySection()">
        <span class="history-toggle-label">Cooked History</span>
        <span class="history-toggle-count">${cookedDates.length}</span>
        <span class="history-toggle-chevron${historyOpen?' open':''}" id="historyChevron">▾</span>
      </button>
      <div id="historyList" style="${historyOpen?'':'display:none;'}padding-bottom:16px;">
        ${cookedDates.map(ds => {
          const allMeals = getMealsForDay(ds);
          const meal = allMeals[sel[ds]];
          if (!meal) return '';
          const d = new Date(ds + 'T12:00:00');
          const dateLabel = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
          const timeStr = meal.time >= 120 ? `${Math.round(meal.time/60)}h ${meal.time%60>0?meal.time%60+'m':''}`.trim() : `${meal.time} min`;
          const note = notes[ds] ? notes[ds].trim() : '';
          return `<div class="history-card">
            <div class="history-card-top" onclick="openHistoryRecipe('${ds}')">
              <div class="history-card-body">
                <div class="history-card-date">${dateLabel}</div>
                <div class="history-card-name">${meal.name}</div>
                <div class="history-card-meta">
                  <span class="history-card-stat">${meal.cuisine}</span>
                  <span class="history-card-stat">${meal.cal} cal/person</span>
                  <span class="history-card-stat">${timeStr}</span>
                </div>
              </div>
              <div style="color:var(--ink4);font-size:18px;align-self:center;">›</div>
            </div>
            ${note ? `<div class="history-card-note">📝 ${note}</div>` : ''}
            <div class="history-card-action">
              <span style="font-size:11px;color:var(--ink4);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;">Tap card to view recipe</span>
              <button class="history-card-btn" onclick="openAssignSheet('${ds}')">Cook Again</button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="height:16px;"></div>`;
  } else {
    body.innerHTML += `<div style="height:8px;"></div>`;
  }
}

function toggleHistorySection() {
  window._historyOpen = !window._historyOpen;
  const list = document.getElementById('historyList');
  const chev = document.getElementById('historyChevron');
  if (list) list.style.display = window._historyOpen ? '' : 'none';
  if (chev) chev.className = `history-toggle-chevron${window._historyOpen?' open':''}`;
}

// Open the slide panel to show a cooked recipe from history
function openHistoryRecipe(ds) {
  activeDate = ds;
  viewingRecipe = true;
  const d = new Date(ds + 'T12:00:00');
  document.getElementById('slideDate').textContent =
    'Cooked · ' + d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  renderRecipeView(ds, sel[ds]);
  document.getElementById('slidePanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// Open the assign-to-day bottom sheet for a meal from history
function openAssignSheet(fromDs) {
  const allMeals = getMealsForDay(fromDs);
  const meal = allMeals[sel[fromDs]];
  if (!meal) return;

  document.getElementById('assignTitle').textContent = meal.name.length > 32 ? meal.name.slice(0,30)+'…' : meal.name;
  document.getElementById('assignSub').textContent = 'Pick an upcoming day to add this to your plan';

  // Show next 28 days as options
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Array.from({length: 28}, (_, i) => {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    return d.toISOString().slice(0,10);
  });

  const listEl = document.getElementById('assignDayList');
  listEl.innerHTML = days.map(ds => {
    const d = new Date(ds + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const hasSel = sel[ds] !== undefined;
    const existingMeals = getMealsForDay(ds);
    const existing = hasSel ? existingMeals[sel[ds]]?.name : null;
    const statusText = hasSel ? `Replaces: ${existing ? (existing.length > 24 ? existing.slice(0,22)+'…' : existing) : 'current meal'}` : 'Open';

    return `<button class="assign-day-btn${hasSel?' taken':''}"
      onclick="assignMealToDay('${fromDs}','${ds}')">
      <div>
        <div class="assign-day-date">${label}</div>
        <div class="assign-day-status">${statusText}</div>
      </div>
      <div style="color:var(--rust);font-size:16px;">${hasSel ? '↺' : '+'}</div>
    </button>`;
  }).join('');

  document.getElementById('assignOverlay').style.display = 'flex';
}

function closeAssignSheet(event) {
  if (event && event.target !== document.getElementById('assignOverlay')) return;
  document.getElementById('assignOverlay').style.display = 'none';
}

function assignMealToDay(fromDs, toDs) {
  const sourceMeals = getMealsForDay(fromDs);
  const meal = sourceMeals[sel[fromDs]];
  if (!meal) return;

  const targetMeals = getMealsForDay(toDs);

  // Check if meal already exists naturally in target day
  let targetIdx = targetMeals.findIndex(m => m.name === meal.name);

  if (targetIdx === -1) {
    // Check if it's in BACKUP_MEALS
    const backupIdx = BACKUP_MEALS.findIndex(b => b.name === meal.name);
    if (backupIdx !== -1) {
      const current = refreshed[toDs] || [];
      if (!current.includes(backupIdx)) refreshed[toDs] = [...current, backupIdx];
      const updated = getMealsForDay(toDs);
      targetIdx = updated.findIndex(m => m.name === meal.name);
    } else {
      // Meal is from the MEALS rotation — just pick the same index from the target day
      // so it points to whatever option occupies that slot (acceptable fallback)
      targetIdx = Math.min(sel[fromDs], targetMeals.length - 1);
    }
  }

  sel[toDs] = Math.max(0, targetIdx);
  save();
  document.getElementById('assignOverlay').style.display = 'none';

  // Switch to Plan tab so user sees it land
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.btab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-plan').classList.add('active');
  document.querySelector('.btab').classList.add('active');
  renderPlan();
  renderGrocery();
  updateMeta();

  // Scroll the assigned day row into view
  setTimeout(() => {
    const row = document.getElementById(`dayrow-${toDs}`);
    if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 150);
}
// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  // Load localStorage immediately for instant render
  load();
  loadRecipeCache();
  renderPlan();
  renderFavs();

  // Then load from Supabase (overrides local if newer)
  await supaLoad();
  renderPlan();
  renderFavs();
  updateMeta();

  // Subscribe to real-time changes (cross-device sync)
  supaSubscribe();

  // Recipe steps are baked into RECIPE_STEPS — no API calls needed.
  // Background generator permanently disabled.
  // setTimeout(() => backgroundGenerateAll(), 2000);
}

init();
</script>
</body>
