heavily and set in a colander with a weight on top for 20 min. Pat completely dry \u2014 this removes bitterness.","time":"20 min"},{"title":"Bread and fry eggplant","text":"Dredge in flour, then beaten egg, then panko mixed with parmesan. Fry in half inch of oil at 375\u00b0F until golden both sides. Drain.","time":"15 min"},{"title":"Make tomato sauce","text":"Saut\u00e9 garlic in olive oil 1 min. Add tomatoes, season, simmer 10 min. Add torn fresh basil at the end.","time":"12 min"},{"title":"Assemble and bake","text":"Layer in a baking dish: sauce, eggplant, mozzarella, more sauce. Top with parmesan. Bake at 375\u00b0F for 25 min until bubbly and golden.","time":"25 min"},{"title":"Rest and serve","text":"Let rest 5 min before serving. Serve with extra fresh basil.","time":null}],"Spring Vegetable Risotto with Ricotta":[{"title":"Warm stock with peas","text":"Keep stock at a gentle simmer. Add peas to stock for the last 2 min to cook them. Remove with a slotted spoon and keep stock warm.","time":null},{"title":"Toast the rice","text":"Cook shallots in butter until soft. Add arborio and toast 2 min until edges turn translucent. Deglaze with white wine.","time":"5 min"},{"title":"Add stock gradually","text":"Add warm stock one ladle at a time, stirring constantly and waiting for each addition to absorb. Takes 20\u201322 min.","time":"22 min"},{"title":"Finish the risotto","text":"Off heat, stir in butter, parmesan, lemon zest, and juice. Fold in most of the peas. Should flow like lava.","time":null},{"title":"Plate","text":"Divide into warm bowls. Top with remaining peas, a quenelle of ricotta, torn mint, and a drizzle of olive oil.","time":null}],"Seared Shrimp with Spring Pea Pur\u00e9e":[{"title":"Make pea pur\u00e9e","text":"Blanch peas 2 min. Blend with butter, chicken stock, mint, and salt until very smooth. Pass through a sieve for silky texture. Keep warm.","time":"8 min"},{"title":"Crisp the bacon","text":"Render bacon until very crispy. Set aside, keep the fat in the pan.","time":"5 min"},{"title":"Sear shrimp in bacon fat","text":"Get the pan with bacon fat smoking hot. Add shrimp in a single layer \u2014 do not touch for 2 full minutes. Flip, cook 60\u201390 seconds. Golden crust is the goal.","time":"4 min"},{"title":"Brown butter finish","text":"Add butter to the pan and baste shrimp as it foams and turns golden. Plate pea pur\u00e9e, add shrimp, crumble crispy bacon over. Squeeze lemon to finish.","time":"1 min"}],"Lamb Braised with Harissa & Apricot":[{"title":"Brown the lamb","text":"Season lamb shoulder aggressively. Sear all sides in a heavy pot over high heat until deeply caramelized.","time":"12 min"},{"title":"Build the braise","text":"Add diced onion and garlic and cook 4 min. Add harissa and spices, cook 1 min. Add chicken stock and dried apricots. Return lamb.","time":"7 min"},{"title":"Braise low and slow","text":"Cover and cook at 325\u00b0F for 2.5\u20133 hours until the meat is completely falling off the bone.","time":"180 min"},{"title":"Make couscous","text":"Pour hot stock over couscous, cover, and steam 5 min. Fluff with a fork and season with olive oil and salt.","time":null},{"title":"Serve","text":"Shred the lamb. Serve over couscous with the braising sauce spooned over. Scatter fresh cilantro.","time":null}],"Grilled Ribeye with Compound Butter":[{"title":"Make compound butter","text":"Mix softened butter with minced garlic, chopped thyme, salt, and pepper. Roll in plastic wrap into a log and refrigerate until firm.","time":null},{"title":"Season and rest steak","text":"Season ribeye very generously with kosher salt and pepper on both sides. Rest at room temperature 30 min.","time":"30 min"},{"title":"Grill over high heat","text":"Grill over very high heat 4\u20135 min per side for medium-rare. Rotate 90\u00b0 after 2 min on each side for crosshatch marks.","time":"10 min"},{"title":"Rest with compound butter","text":"Place on a cutting board and put a coin of compound butter on top. Rest 8 min while butter melts over the meat.","time":"8 min"},{"title":"Dress watercress and serve","text":"Toss watercress with sliced shallots, red wine vinegar, and olive oil. Slice steak against the grain, fan on plate with watercress alongside.","time":null}],"Crab Cakes with Remoulade & Fennel Salad":[{"title":"Make remoulade","text":"Mix mayonnaise with Dijon, capers, hot sauce, lemon juice, and a pinch of Old Bay. Refrigerate.","time":null},{"title":"Mix crab cakes","text":"Pick through crab for any shells. Combine gently with panko, mayo, egg, mustard, Old Bay, and lemon zest. Mix as little as possible.","time":null},{"title":"Form and chill","text":"Shape into 4 patties. Refrigerate 30 min minimum \u2014 this is what makes them hold together during cooking.","time":"30 min"},{"title":"Sear crab cakes","text":"Heat oil over medium-high. Sear cakes 3\u20134 min per side until deeply golden. Handle gently \u2014 flip only once.","time":"8 min"},{"title":"Make fennel salad and plate","text":"Shave fennel thinly. Toss with lemon juice, olive oil, and salt. Plate crab cakes on the fennel salad with remoulade alongside.","time":null}],"General Tso's Chicken":[{"title":"Make the sauce","text":"Combine soy sauce, rice vinegar, hoisin, sesame oil, a little sugar, and cornstarch slurry in a bowl. Set aside ready to use.","time":null},{"title":"Bread and fry chicken","text":"Toss chicken in cornstarch with salt and pepper. Fry in 375\u00b0F oil in batches until golden and crispy, about 4\u20135 min. Drain.","time":"15 min"},{"title":"Steam broccoli","text":"Steam broccoli florets until just tender, about 4\u20135 min. Keep bright green.","time":"5 min"},{"title":"Stir-fry aromatics","text":"In a wok over high heat, quickly fry garlic, ginger, and dried chiles 30 seconds until fragrant. Don't burn.","time":"1 min"},{"title":"Sauce and serve","text":"Add sauce to the wok. It will bubble immediately. Add fried chicken and toss until every piece is coated and glazed. Plate over steamed rice with broccoli alongside.","time":"2 min"}],"Chicken Shawarma with Tahini":[{"title":"Marinate chicken","text":"Coat chicken thoroughly with shawarma spices, olive oil, and lemon. Marinate at least 30 min \u2014 an hour is better.","time":"30 min"},{"title":"Make tahini sauce","text":"Whisk tahini with minced garlic, lemon juice, and enough cold water to make a pourable sauce. It will seize up before it smooths out \u2014 keep whisking. Season well.","time":null},{"title":"Roast chicken","text":"Roast at 425\u00b0F for 20\u201325 min until caramelized and cooked through. Rest 5 min, then slice thin against the grain.","time":"25 min"},{"title":"Warm pita","text":"Char pitas briefly over a gas flame or in a dry pan until soft and slightly blistered.","time":null},{"title":"Assemble","text":"Lay chicken on warm pita, drizzle with tahini sauce, add diced red onion, parsley, and any pickled vegetables. Roll or eat open-faced.","time":null}],"Shrimp & Cod Stew with Gruy\u00e8re Toasts":[{"title":"Build the base","text":"Saut\u00e9 fennel and garlic in olive oil until soft. Add white wine and reduce. Add tomatoes, clam juice, and water to make a brothy stew. Simmer 20 min.","time":"25 min"},{"title":"Make rouille","text":"Mix mayonnaise with garlic, smoked paprika, and cayenne. This is the classic spread for the toasts.","time":null},{"title":"Cook seafood","text":"Add cod first and simmer 3 min. Add shrimp and cook 3\u20134 min more until both are just cooked through.","time":"7 min"},{"title":"Make cheese toasts","text":"Broil baguette slices with Gruy\u00e8re on top until golden and bubbling.","time":"4 min"},{"title":"Serve","text":"Ladle stew into wide bowls. Float a cheese toast on top. Rouille on the side for spreading on the toast.","time":null}],"Shrimp Pasta with Chili & Ink-Style Sauce":[{"title":"Cook pasta","text":"Cook pasta in very well-salted water until al dente. Reserve 1 cup pasta water.","time":"10 min"},{"title":"Build the sauce","text":"Saut\u00e9 garlic and shallots in olive oil until golden. Add red pepper flakes. Add white wine and reduce by half.","time":"6 min"},{"title":"Cook shrimp","text":"Add shrimp and cook 2 min per side until just pink and cooked through.","time":"4 min"},{"title":"Combine and finish","text":"Add pasta to the pan with shrimp. Toss with pasta water to create a loose, silky sauce. Finish with lemon juice and fresh parsley.","time":null}],"Pork Milanese with Arugula & Parmesan":[{"title":"Set up breading station","text":"Three shallow dishes: seasoned flour, beaten eggs, panko mixed with parmesan. Season at every stage.","time":null},{"title":"Bread the pork","text":"Dredge chops in flour, then egg, then panko-parmesan mix. Press firmly to adhere. Let rest 5 min.","time":null},{"title":"Fry the Milanese","text":"Heat a generous amount of olive oil in a large skillet. Fry 3\u20134 min per side until shatteringly golden and crispy. Drain briefly.","time":"8 min"},{"title":"Dress the salad","text":"Halve cherry tomatoes. Toss arugula and tomatoes with lemon juice, olive oil, salt, and shaved parmesan.","time":null},{"title":"Plate","text":"Place Milanese on the plate. Pile salad directly on top \u2014 the heat wilts it slightly, which is the right move.","time":null}],"Spiced Red Snapper with Coconut Rice & Mango":[{"title":"Make coconut rice","text":"Combine rice with half coconut milk and half water for 1.5 cups total liquid. Add a pinch of salt and sugar. Cook as normal.","time":"20 min"},{"title":"Make mango salsa","text":"Dice mango, slice jalape\u00f1o, chop cilantro, squeeze lime. Mix together and season. Heat should build gradually.","time":null},{"title":"Season and sear snapper","text":"Rub fillets with jerk seasoning on both sides. Sear in a hot skillet with olive oil skin-side down 4 min. Flip and cook 2 min.","time":"6 min"},{"title":"Plate","text":"Spoon coconut rice into bowls. Place snapper on top and add a generous spoonful of mango salsa. Extra lime on the side.","time":null}],"Beef Chuck Braised with Butter Beans":[{"title":"Brown the chuck","text":"Season beef aggressively. Brown all sides in batches in a Dutch oven over high heat until deeply caramelized.","time":"20 min"},{"title":"Build the braise","text":"Saut\u00e9 onion, carrots, and garlic. Add tomato paste and cook 2 min. Add wine and reduce. Add beef stock and return meat.","time":"10 min"},{"title":"Braise low and slow","text":"Cover and cook at 300\u00b0F for 3.5\u20134 hours until the beef is completely tender and falling apart.","time":"240 min"},{"title":"Add butter beans","text":"Remove beef and shred. Add drained butter beans to the braising liquid and simmer 10 min. Return beef.","time":"10 min"},{"title":"Gremolata and serve","text":"Combine minced garlic, lemon zest, and parsley. Plate beef and beans with braising sauce. Scatter gremolata over the top.","time":null}],"Roasted Cod with Tomato Confit & Pistou":[{"title":"Make tomato confit","text":"Toss cherry tomatoes with plenty of garlic, olive oil, and salt. Roast at 300\u00b0F for 45 min until collapsed, sweet, and jammy.","time":"45 min"},{"title":"Make pistou","text":"Blend fresh basil with garlic, parmesan, and olive oil until smooth. Season well.","time":null},{"title":"Roast cod","text":"Season cod fillets well. Place on an oiled baking sheet and roast at 400\u00b0F for 14\u201316 min until opaque through.","time":"16 min"},{"title":"Plate","text":"Spoon confit tomatoes onto the plate with their oil. Set cod on top. Drizzle pistou over and around. The oil from the confit is liquid gold.","time":null}],"Smoked Paprika Chicken with Romesco Rice":[{"title":"Season chicken","text":"Coat chicken legs with smoked paprika, olive oil, salt, and pepper. Let sit 20 min.","time":"20 min"},{"title":"Make romesco","text":"Blend roasted peppers, toasted almonds, garlic, sherry vinegar, and smoked paprika with olive oil until smooth.","time":"5 min"},{"title":"Sear chicken skin","text":"Brown chicken skin-side down in an oven-safe skillet 6\u20137 min until golden and fat has rendered.","time":"7 min"},{"title":"Make romesco rice","text":"In a pot, toast rice briefly. Add romesco sauce and chicken stock. Simmer 18 min until rice is cooked through.","time":"20 min"},{"title":"Finish chicken and serve","text":"Transfer skillet to 400\u00b0F oven for 20 min until cooked through. Plate romesco rice, add chicken on top with pan drippings over.","time":"20 min"}],"Beef Bulgogi with Sesame Spinach":[{"title":"Make marinade","text":"Blend pear with soy sauce, sesame oil, garlic, ginger, and sugar. Toss sliced beef and marinate 30 min. The pear enzymes tenderize the meat.","time":"30 min"},{"title":"Cook rice","text":"Cook short-grain rice per package.","time":"20 min"},{"title":"Make sesame spinach","text":"Blanch spinach 30 seconds, rinse cold, and squeeze completely dry. Toss with sesame oil, soy sauce, minced garlic, and sesame seeds.","time":"5 min"},{"title":"Grill bulgogi","text":"Get a grill pan or skillet very hot. Cook beef in thin batches \u2014 don't crowd. Sear 1\u20132 min per side. Caramelization is everything \u2014 small batches only.","time":"8 min"},{"title":"Plate","text":"Rice in a bowl. Bulgogi on top. Sesame spinach on the side. Drizzle any pan juices over the beef.","time":null}],"Tilapia Meuni\u00e8re with Brown Butter":[{"title":"Season and flour tilapia","text":"Season tilapia with salt and white pepper. Dredge in flour and shake off all excess \u2014 just the thinnest film.","time":null},{"title":"Sear in clarified butter","text":"Melt 3 tbsp butter in a skillet over medium-high until foaming. Add tilapia. Cook 2\u20133 min per side until lightly golden.","time":"5 min"},{"title":"Make beurre noisette","text":"Add remaining butter to the hot pan. Cook swirling constantly until golden brown and smells like hazelnuts \u2014 about 2 min. Watch carefully.","time":"2 min"},{"title":"Finish and serve","text":"Add lemon juice to the brown butter \u2014 it will sputter. Add parsley. Pour immediately over the fish. This dish is all about speed \u2014 serve at once.","time":null}],"Pork Shoulder Carnitas":[{"title":"Braise the pork","text":"Cut pork into large chunks. Season with cumin, oregano, and salt. Add orange juice, zest, and lime juice. Cook over medium-low heat 1.5\u20132 hours until very tender.","time":"120 min"},{"title":"Make salsa verde","text":"Broil tomatillos and jalape\u00f1os until charred. Blend with cilantro, garlic, lime juice, and salt.","time":"10 min"},{"title":"Shred and crisp","text":"Remove pork and shred roughly \u2014 not fine, leave big pieces. Spread on a foil-lined baking sheet. Broil 5\u20138 min until edges are crispy. This step makes carnitas, carnitas.","time":"8 min"},{"title":"Char tortillas","text":"Char corn tortillas directly over a gas flame or in a dry skillet until they have some char and are pliable.","time":null},{"title":"Build tacos","text":"Double-stack tortillas. Add carnitas, salsa verde, diced white onion, and fresh cilantro. Lime wedge on the side \u2014 squeeze before eating.","time":null}],"Chicken Cacciatore with Polenta":[{"title":"Brown the chicken","text":"Season chicken and brown skin-side down in olive oil until golden. Remove and set aside.","time":"10 min"},{"title":"Cook vegetables","text":"Saut\u00e9 onion, peppers, and mushrooms in the same pan until soft. Add garlic and cook 1 min.","time":"8 min"},{"title":"Build and braise","text":"Add red wine and reduce by half. Add tomatoes. Return chicken skin-side up. Simmer covered on low heat 40 min.","time":"45 min"},{"title":"Cook polenta","text":"Bring 4 cups salted water to a boil. Whisk in polenta slowly. Stir constantly over low heat 20\u201325 min. Finish with butter and parmesan.","time":"25 min"},{"title":"Serve","text":"Spoon polenta into deep bowls. Place chicken on top with plenty of sauce over everything.","time":null}],"Pesto Pork Chops with White Bean Rag\u00f9":[{"title":"Make bean rag\u00f9","text":"Saut\u00e9 garlic in olive oil. Add halved cherry tomatoes and cook until blistered. Add beans, chicken stock, and rosemary. Simmer 10 min until thick and creamy.","time":"15 min"},{"title":"Sear pork chops","text":"Season chops well. Sear in an oven-safe pan over high heat 3 min per side until golden.","time":"6 min"},{"title":"Crust and roast","text":"Spread pesto generously over the top of the chops. Roast at 400\u00b0F for 10\u201312 min until internal temperature reaches 145\u00b0F.","time":"12 min"},{"title":"Rest and serve","text":"Rest chops 3\u20134 min. Serve over the white bean rag\u00f9 with pan juices drizzled over everything.","time":null}],"Shrimp Bisque with Cream & Brandy":[{"title":"Cook and shell shrimp","text":"Boil shrimp until pink. Remove meat and chop. Reserve all the shells \u2014 they're the foundation of the bisque.","time":"5 min"},{"title":"Make shrimp stock","text":"Saut\u00e9 shells in butter 3 min until they turn coral. Add mirepoix, tomato paste, and brandy. Add water. Simmer 30 min. Strain through a fine sieve.","time":"35 min"},{"title":"Build the bisque","text":"In a clean pot, reduce strained stock by half. Add cream and dill. Simmer 10 min.","time":"15 min"},{"title":"Blend and finish","text":"Blend until very smooth. Return to pot. Adjust seasoning and consistency.","time":null},{"title":"Serve","text":"Ladle into warm bowls. Add shrimp meat. Top with a spoonful of sour cream and a dill frond.","time":null}],"Sesame-Crusted Salmon with Ponzu":[{"title":"Make ponzu sauce","text":"Combine rice vinegar, soy sauce, grated ginger, a dash of sesame oil, and lime juice. Should be bright and citrusy.","time":null},{"title":"Press sesame crust","text":"Mix white and black sesame seeds. Press firmly onto all sides of the salmon \u2014 the more pressure, the better the crust adheres.","time":null},{"title":"Sear in a dry pan","text":"Get a pan screaming hot with no oil \u2014 the sesame seeds have their own fat. Sear each side 45\u201360 seconds only. The center must remain rare to medium-rare.","time":"3 min"},{"title":"Slice and plate","text":"Slice salmon thinly against the grain. Fan on a plate with sliced avocado. Scatter scallions and sesame seeds. Serve ponzu on the side for dipping.","time":null}],"Massaman Curry with Chicken":[{"title":"Toast curry paste","text":"Add massaman paste to a dry pot and cook over medium heat 2\u20133 min, stirring, until fragrant and just starting to stick.","time":"3 min"},{"title":"Add coconut milk","text":"Pour in coconut milk and stir to combine. Bring to a gentle simmer.","time":null},{"title":"Add chicken and potatoes","text":"Add chicken thighs and potato cubes. Partially cover and simmer 30 min until chicken is cooked through and potatoes are tender.","time":"30 min"},{"title":"Season","text":"Add fish sauce and sugar. Taste \u2014 should be creamy, aromatic, slightly sweet with gentle warmth.","time":null},{"title":"Serve","text":"Serve over jasmine rice. Garnish with roasted peanuts, fresh cilantro, and a lime wedge.","time":null}],"Tilapia with Asparagus & Hollandaise":[{"title":"Clarify butter","text":"Melt butter slowly over low heat. Skim foam from surface. Carefully pour off clear golden butter, leaving milky solids behind.","time":"5 min"},{"title":"Make hollandaise","text":"Whisk egg yolks with a splash of water and reduction over barely simmering water until thick and pale. Very slowly whisk in clarified butter. Season with lemon, salt, and cayenne.","time":"10 min"},{"title":"Blanch asparagus","text":"Cook asparagus in boiling salted water 2\u20133 min. Drain and keep warm.","time":"3 min"},{"title":"Cook tilapia","text":"Season fillets well. Bake at 400\u00b0F for 10\u201312 min until just cooked through and flakes easily.","time":"12 min"},{"title":"Plate and sauce","text":"Arrange asparagus on the plate, set tilapia on top, and spoon hollandaise generously over both. Serve immediately.","time":null}],"Pasta e Fagioli with Bacon":[{"title":"Render bacon","text":"Cook diced bacon in olive oil until fat renders and meat is crispy. Remove and set aside.","time":"5 min"},{"title":"Build the base","text":"In same pot, cook garlic 1 min. Add tomatoes and cook 5 min. Add stock, beans, rosemary, and a parmesan rind.","time":"8 min"},{"title":"Simmer","text":"Simmer 20 min, allowing the parmesan rind to melt into the soup. Fish out the rind when done.","time":"20 min"},{"title":"Thicken with beans","text":"Roughly mash about a quarter of the beans against the side of the pot \u2014 this thickens the soup naturally.","time":null},{"title":"Cook pasta and serve","text":"Add ditalini directly to the soup. Cook 8\u201310 min until al dente. Ladle into bowls. Top with crispy bacon, parmesan, and a drizzle of good olive oil.","time":"10 min"}],"Grilled Porterhouse with Herb Butter":[{"title":"Make herb butter","text":"Mix softened butter with minced garlic, chopped thyme, salt, and cracked pepper. Roll in plastic wrap and refrigerate until firm.","time":null},{"title":"Season and rest steak","text":"Season porterhouse extremely generously on both sides. Rest at room temperature 45 min.","time":"45 min"},{"title":"Make crispy shallots","text":"Slice shallots into rings, toss in flour, fry in 375\u00b0F oil until golden. Drain immediately and season with salt.","time":"8 min"},{"title":"Grill over high heat","text":"Grill over very high heat 5\u20136 min per side for medium-rare.","time":"12 min"},{"title":"Rest and carve","text":"Top with herb butter coins and rest 10 min. Carve at the table \u2014 separate the strip from the tenderloin. Top with crispy shallots.","time":null}],"Shrimp Rolls with Brown Butter & Herbs":[{"title":"Cook the shrimp","text":"Boil or steam shrimp until just pink \u2014 2\u20133 min. Cool slightly, then chop into large chunks.","time":"5 min"},{"title":"Make brown butter","text":"Cook butter in a small pan until golden brown and nutty. Add chopped dill. Cool slightly.","time":"3 min"},{"title":"Dress the shrimp","text":"Toss shrimp with brown butter, a small amount of mayo for binding, diced celery, lemon juice, and salt.","time":null},{"title":"Toast buns","text":"Brush split-top buns with butter. Toast cut-sides down in a pan until golden.","time":"2 min"},{"title":"Fill and serve","text":"Fill toasted buns generously with the shrimp mixture. Serve immediately \u2014 shrimp rolls don't wait.","time":null}],"Mole Negro Chicken with Plantains":[{"title":"Brown the chicken","text":"Season chicken legs and sear skin-side down until golden, about 6\u20138 min. Flip and cook 3 min more. Remove.","time":"12 min"},{"title":"Build the mole","text":"Saut\u00e9 onion and garlic in the same pot. Add mole paste and toast 2 min. Add chicken stock and stir until paste dissolves into a sauce. Return chicken.","time":"7 min"},{"title":"Simmer low and slow","text":"Cover and cook on low heat 40 min until chicken is very tender and mole has deepened in flavor.","time":"40 min"},{"title":"Fry the plantains","text":"Peel ripe (very black) plantains and slice diagonally. Fry in butter or oil 2\u20133 min per side until golden and caramelized.","time":"6 min"},{"title":"Plate","text":"Serve chicken with mole sauce, fried plantains, and black beans alongside. Fresh cilantro on top.","time":null}],"Lamb Rag\u00f9 with Pappardelle & Pecorino":[{"title":"Brown the lamb","text":"Brown ground lamb in olive oil over high heat, breaking up clumps. Season well. Don't stir too much \u2014 you want color and caramelization.","time":"8 min"},{"title":"Build the sauce","text":"Add diced onion and garlic. Cook 5 min. Add red wine and cook until absorbed. Add tomatoes and rosemary.","time":"8 min"},{"title":"Simmer the rag\u00f9","text":"Cook uncovered over low heat 1 hour, stirring occasionally, until thick, rich, and deeply flavored.","time":"60 min"},{"title":"Cook pasta","text":"Cook pappardelle until al dente. Reserve 1 cup pasta water before draining.","time":"8 min"},{"title":"Finish and serve","text":"Toss pasta with rag\u00f9, adding pasta water to loosen. Remove rosemary stems. Plate with pecorino grated generously on top.","time":null}],"Miso-Glazed Salmon \u2014 Nobu Style":[{"title":"Make miso marinade","text":"Combine white miso, mirin, sake, and sugar in a small saucepan. Simmer 3\u20134 min until sugar dissolves and mixture is smooth and glossy. Cool completely.","time":"5 min"},{"title":"Marinate the fish","text":"Coat salmon completely in the cooled miso marinade. Marinate at least 2 days in the fridge. The longer, the better \u2014 this is what makes it restaurant quality.","time":"2880 min"},{"title":"Wipe and broil","text":"Wipe off excess marinade with paper towels \u2014 burnt miso is bitter. Broil on high for 8\u201310 min until the surface is lacquered and caramelized.","time":"10 min"},{"title":"Serve","text":"Plate with sliced scallions. Steamed rice is all you need alongside.","time":null}],"Chicken Proven\u00e7al":[{"title":"Brown the chicken","text":"Season chicken and brown skin-side down in olive oil 6\u20138 min until golden. Flip and cook 2 min. Remove.","time":"10 min"},{"title":"Build the sauce","text":"Cook shallots and garlic 3 min in the same pan. Add herbes de Provence and cook 1 min. Add white wine and reduce. Add tomatoes.","time":"6 min"},{"title":"Braise","text":"Return chicken skin-side up. Cover and simmer on low heat 35\u201340 min until very tender.","time":"40 min"},{"title":"Add olives and capers","text":"Add olives and capers in the last 10 min \u2014 adding them too early makes them bitter.","time":null},{"title":"Serve","text":"Serve directly from the pan with crusty bread or over pasta or rice.","time":null}],"Pan-Roasted Salmon with Lentils & Bacon Vinaigrette":[{"title":"Cook lentils","text":"Simmer lentils in chicken stock with thyme for 20\u201325 min until tender with a slight bite. Drain any excess liquid.","time":"25 min"},{"title":"Make warm vinaigrette","text":"Render bacon until very crispy. Remove. In the same pan, cook shallots 2 min. Add red wine vinegar and Dijon. Swirl in olive oil to emulsify.","time":"8 min"},{"title":"Dress lentils","text":"Toss warm lentils with the warm vinaigrette and crumbled bacon. Season generously.","time":null},{"title":"Sear salmon","text":"Season salmon well. Sear skin-side down in a very hot pan 4\u20135 min. Flip and cook 2 min. Rest 2 min before serving.","time":"7 min"},{"title":"Plate","text":"Mound dressed lentils on the plate. Place salmon skin-side up on top. Drizzle with good olive oil.","time":null}],"Cacio e Pepe with Crispy Bacon":[{"title":"Toast and grind pepper","text":"Toast whole peppercorns in a dry pan until fragrant. Crush coarsely in a mortar \u2014 you want texture, not fine powder.","time":"3 min"},{"title":"Render bacon","text":"Cook diced bacon in a skillet over medium heat until fat renders and meat is very crispy. Remove. Keep all fat in the pan.","time":"8 min"},{"title":"Cook pasta","text":"Cook pasta in well-salted water. Reserve 2 cups starchy pasta water \u2014 extra starchy water is key to the sauce.","time":"10 min"},{"title":"Build the sauce","text":"Toast pepper in the bacon fat. Add a generous ladle of starchy pasta water and let it reduce slightly. Add drained pasta and toss vigorously.","time":null},{"title":"Add cheese and serve","text":"Off heat, add cheese in two additions, tossing constantly and adding pasta water as needed until creamy and flowing. Top with crispy bacon and more pecorino. Serve immediately.","time":null}],"Herb-Crusted Salmon Baked in Salt":[{"title":"Make salt crust","text":"Mix kosher salt with egg whites until it resembles damp sand that holds together when squeezed.","time":null},{"title":"Encase salmon","text":"Place a thick bed of salt mixture on a baking sheet. Set salmon skin-side down. Cover completely with remaining salt, pressing firmly to seal.","time":null},{"title":"Bake","text":"Bake at 400\u00b0F for 20\u201325 min. The salt crust insulates the fish and creates perfectly even, moist cooking.","time":"25 min"},{"title":"Make salsa verde","text":"Finely chop parsley, capers, and garlic. Combine with olive oil and lemon juice.","time":null},{"title":"Crack and serve","text":"At the table, crack the salt crust with a mallet and peel away to reveal the salmon. Lift fillets away from skin and serve with salsa verde.","time":null}],"Chicken Thighs \u00e0 l'Orange with Roasted Potatoes":[{"title":"Make pommes sarladaises","text":"Slice potatoes thinly. Layer in a baking dish with garlic and thyme. Pour duck fat or olive oil over. Roast at 400\u00b0F for 45 min until golden and crispy on top.","time":"45 min"},{"title":"Render chicken skin","text":"Place thighs skin-side down in a cold pan. Heat slowly over medium heat. Render 12\u201315 min until skin is very golden and crispy.","time":"15 min"},{"title":"Finish in oven","text":"Flip thighs and transfer to 400\u00b0F oven for 12\u201315 min until cooked through. Rest 5 min.","time":"15 min"},{"title":"Make orange gastrique","text":"Make a caramel with sugar in the same pan. Add red wine vinegar to stop it, then orange juice and zest. Add chicken stock and reduce to a glossy sauce.","time":"10 min"},{"title":"Plate","text":"Serve chicken with potatoes alongside. Spoon orange sauce over the chicken.","time":null}],"Korean Army Stew \u2014 Budae Jjigae":[{"title":"Arrange the pot","text":"In a wide shallow pot, arrange Spam slices, sliced hot dogs, kimchi, and baked beans in sections \u2014 like a composed arrangement before cooking.","time":null},{"title":"Add broth and gochujang","text":"Pour in stock. Add gochujang and stir gently into the broth around the ingredients.","time":null},{"title":"Simmer","text":"Bring to a boil and cook 10 min. Everything gets better the longer it simmers and mingles.","time":"10 min"},{"title":"Add noodles and cheese","text":"Add ramen noodles, pushing into the broth. Cook per package, about 3 min. Lay American cheese slices over the top. Cover briefly to melt.","time":"4 min"},{"title":"Serve communally","text":"Bring the entire pot to the table. Serve from the pot directly. Scatter sliced scallions over the top.","time":null}],"Spicy Coconut Mussels":[{"title":"Clean mussels","text":"Scrub mussels under cold water and remove any beards. Discard any that don't close when tapped \u2014 they're dead.","time":null},{"title":"Build the broth","text":"Bruise lemongrass stalks by smashing with the back of a knife. Saut\u00e9 lemongrass, sliced chiles, garlic, and ginger in oil 1\u20132 min until fragrant.","time":"3 min"},{"title":"Add coconut milk","text":"Pour in coconut milk and bring to a simmer. Season with fish sauce and a squeeze of lime.","time":null},{"title":"Steam the mussels","text":"Add mussels to the pot, cover tightly, and cook over high heat 4\u20135 min until all mussels have opened.","time":"5 min"},{"title":"Serve","text":"Discard any mussels that didn't open. Ladle into deep bowls. Scatter fresh herbs. Grilled baguette for dipping into the coconut broth is essential.","time":null}],"Spring Lamb Rack with Mint & Pea Pur\u00e9e":[{"title":"Season and rest","text":"Remove lamb from fridge 40 min before cooking. Season all over with salt and pepper.","time":"40 min"},{"title":"Make herb crust","text":"Combine panko, minced garlic, chopped mint, olive oil, and salt.","time":null},{"title":"Sear and crust","text":"Sear meaty side of rack in a hot skillet 3\u20134 min until golden. Brush with Dijon, press herb crust firmly on. Roast at 400\u00b0F for 20\u201325 min for medium-rare (130\u00b0F). Rest 8 min.","time":"25 min"},{"title":"Make pea pur\u00e9e","text":"Blanch peas 2 min. Blend with butter, chicken stock, mint, and salt until silky smooth.","time":"5 min"},{"title":"Carve and serve","text":"Cut between ribs. Plate on the pea pur\u00e9e with fresh mint scattered over.","time":null}],"Seared Salmon with Asparagus Risotto":[{"title":"Make risotto base","text":"Saut\u00e9 shallots and garlic in butter. Toast arborio 2 min. Deglaze with white wine. Add warm stock ladle by ladle over 20\u201322 min, stirring constantly.","time":"25 min"},{"title":"Add asparagus and scallions","text":"Fold in sliced asparagus and chopped scallions in the last 5 min of cooking.","time":"5 min"},{"title":"Finish risotto","text":"Off heat, stir in butter and parmesan vigorously. Should flow like slow lava.","time":null},{"title":"Sear salmon","text":"Season salmon and sear skin-side down 4\u20135 min until crispy. Flip and cook 2 min. Rest 2 min.","time":"7 min"},{"title":"Plate","text":"Spoon risotto into wide bowls. Place salmon skin-side up on top. Drizzle with olive oil.","time":null}],"Honey-Glazed Ham with Scalloped Potatoes":[{"title":"Make scalloped potatoes","text":"Slice potatoes very thin. Layer in a baking dish alternating with garlic, cream, and cheese. Season each layer. Bake covered at 375\u00b0F for 45 min, then uncovered 20 min until golden and bubbling.","time":"65 min"},{"title":"Score and glaze ham","text":"Score the ham in a crosshatch pattern, cutting through fat but not into meat. Brush all over with honey-Dijon glaze.","time":null},{"title":"Roast the ham","text":"Roast at 325\u00b0F for 40\u201350 min, basting with more glaze every 15 min. Surface should be deeply caramelized.","time":"50 min"},{"title":"Rest and slice","text":"Rest ham 10 min before carving. Slice and serve alongside the scalloped potatoes.","time":null}],"Crispy Chicken Thighs with Mushroom Jus":[{"title":"Crisp the chicken skin","text":"Season chicken. Place skin-side down in a cold oven-safe skillet. Heat over medium. Render 15 min without moving until skin is deeply golden.","time":"15 min"},{"title":"Roast through","text":"Flip and transfer to 400\u00b0F oven for 15 min until fully cooked through.","time":"15 min"},{"title":"Make mushroom jus","text":"In the same pan, saut\u00e9 shallots and mushrooms over medium-high. Add white wine and reduce. Add stock and reduce to a glassy jus. Swirl in butter.","time":"10 min"},{"title":"Plate","text":"Place chicken skin-side up. Spoon mushroom jus over and around.","time":null}],"Shrimp Scampi with Linguine":[{"title":"Cook linguine","text":"Cook pasta in very well-salted water until al dente. Reserve 1 cup pasta water.","time":"10 min"},{"title":"Saut\u00e9 garlic","text":"Cook garlic in butter and olive oil over medium heat until golden \u2014 not browned. This is the flavor base.","time":"2 min"},{"title":"Cook shrimp","text":"Add shrimp in a single layer. Cook 1\u20132 min per side until pink and just cooked through. Don't go further \u2014 overcooked shrimp are rubbery.","time":"4 min"},{"title":"Deglaze and build sauce","text":"Add white wine and lemon juice. Simmer 2 min. Add cherry tomato halves and toss to combine.","time":"3 min"},{"title":"Finish and serve","text":"Add pasta and toss with pasta water as needed until glossy. Finish with parsley and red pepper flakes.","time":null}],"Pork Belly Bao with Quick-Pickled Daikon":[{"title":"Quick-pickle daikon","text":"Julienne daikon. Toss with rice vinegar, sugar, and salt. Let pickle at least 30 min.","time":"30 min"},{"title":"Braise pork belly","text":"Score pork belly and season with five-spice, soy sauce, and a pinch of sugar. Braise in water or stock at 325\u00b0F for 1.5 hours until very tender.","time":"90 min"},{"title":"Slice and sear","text":"Remove pork and slice into bun-sized pieces. Sear cut faces in a very hot pan until caramelized and crispy on the surface.","time":"4 min"},{"title":"Steam bao","text":"Steam frozen bao per package instructions \u2014 usually 8\u201310 min in a steamer basket.","time":"8 min"},{"title":"Assemble","text":"Spread hoisin inside bao. Add a piece of seared pork belly. Top with pickled daikon, cucumber slices, and sliced scallions.","time":null}],"Roasted Leg of Lamb with Tzatziki & Pita":[{"title":"Marinate the lamb","text":"Stud lamb with garlic slivers. Rub with oregano, olive oil, lemon zest, salt, and pepper. Marinate at least 2 hours.","time":"120 min"},{"title":"Make tzatziki","text":"Grate cucumber and squeeze absolutely dry in a towel. Mix with Greek yogurt, minced garlic, dill, lemon juice, and olive oil.","time":null},{"title":"Roast the lamb","text":"Roast at 400\u00b0F for 40\u201350 min for medium (145\u00b0F internal temperature). Rest 15 min before carving.","time":"50 min"},{"title":"Warm pita","text":"Char pitas directly over a gas flame until soft with some char.","time":null},{"title":"Serve","text":"Carve lamb and serve with tzatziki, warm pita, and a simple tomato-cucumber salad.","time":null}],"Grilled Red Snapper with Fresh Tomato Salsa":[{"title":"Make the salsa","text":"Dice tomatoes. Mix with torn fresh basil, minced shallots, olive oil, and salt. Let sit 20 min \u2014 the salt draws out the tomato juices.","time":"20 min"},{"title":"Make soft polenta","text":"Bring salted water to a boil. Whisk in polenta. Cook over low heat stirring often. Finish with butter and parmesan.","time":"25 min"},{"title":"Grill snapper","text":"Oil the snapper well. Grill over high heat 4 min per side until cooked through and skin has char.","time":"8 min"},{"title":"Plate","text":"Spoon polenta onto the plate, place snapper alongside, and generously spoon fresh tomato salsa over the fish. Squeeze lemon.","time":null}],"Chicken Souvlaki with Flatbread":[{"title":"Marinate chicken","text":"Toss cubed chicken with olive oil, lemon juice, oregano, garlic, and salt. Marinate 30 min minimum.","time":"30 min"},{"title":"Make feta salad","text":"Combine halved cherry tomatoes, olives, sliced cucumber, red onion, and crumbled feta. Dress with olive oil and lemon.","time":null},{"title":"Skewer and grill","text":"Thread chicken tightly onto skewers. Grill over high heat 3\u20134 min per side until cooked through with good grill marks.","time":"8 min"},{"title":"Warm flatbread","text":"Warm flatbread in a dry pan or oven until soft and pliable.","time":null},{"title":"Serve","text":"Slide chicken off skewers onto warm flatbread. Top with feta salad and a squeeze of lemon.","time":null}],"Wild Salmon with Spring Vegetable Saut\u00e9":[{"title":"Prep and blanch vegetables","text":"Blanch asparagus and edamame separately in salted water. Cook shiitakes in butter over high heat until golden. Thaw frozen peas.","time":"10 min"},{"title":"Make the vegetable saut\u00e9","text":"Cook shallots in butter until soft. Add stock, dill, and all vegetables. Toss gently and simmer 3 min to warm through.","time":"6 min"},{"title":"Sear salmon","text":"Season salmon and sear skin-side down 4\u20135 min in a hot pan. Flip and cook 2 min. Rest briefly.","time":"7 min"},{"title":"Plate","text":"Spoon the spring vegetable saut\u00e9 into shallow bowls. Place salmon on top, skin-side up. Drizzle with the buttery cooking juices.","time":null}],"Beef Tenderloin Stroganoff":[{"title":"Cook egg noodles","text":"Cook egg noodles per package. Toss with a knob of butter while warm.","time":"10 min"},{"title":"Sear the beef","text":"Season tenderloin tips and sear over high heat in batches until browned on the outside but still rare inside. Set aside.","time":"6 min"},{"title":"Cook mushrooms and shallots","text":"Saut\u00e9 shallots and mushrooms in butter over high heat until deeply golden. Add garlic.","time":"6 min"},{"title":"Build the sauce","text":"Add Worcestershire and Dijon. Add beef stock and simmer 5 min. Off heat, stir in sour cream \u2014 never boil after adding or it will curdle.","time":"8 min"},{"title":"Combine and serve","text":"Return beef to the sauce just to warm through \u2014 about 2 min. Serve over buttered egg noodles with fresh parsley.","time":"2 min"}],"Spicy Shrimp Pasta with Calabrian Chili":[{"title":"Cook spaghetti","text":"Cook pasta in very well-salted water until al dente. Reserve 1 cup pasta water.","time":"10 min"},{"title":"Build the sauce","text":"Saut\u00e9 garlic in olive oil until golden. Add Calabrian chili paste and cook 1 min. Add white wine and reduce.","time":"5 min"},{"title":"Cook shrimp","text":"Add shrimp and cook 2 min per side until just pink.","time":"4 min"},{"title":"Combine and finish","text":"Add pasta and toss with pasta water and lemon juice to create a loose sauce. Finish with fresh parsley and lemon zest.","time":null}],"Braised Beef Chuck with Gnocchi & Gremolata":[{"title":"Trim and sear beef","text":"Cut chuck into 2-inch cubes. Season aggressively. Sear in batches over high heat until deeply browned on all sides.","time":"12 min"},{"title":"Braise","text":"Build braise with mirepoix, red wine, and beef stock. Return chuck. Cover and cook at 325\u00b0F for 2.5 hours until very tender.","time":"150 min"},{"title":"Reduce the braising liquid","text":"Remove chuck. Boil braising liquid until reduced and glossy. Shred chuck back into the sauce.","time":"10 min"},{"title":"Cook gnocchi","text":"Boil gnocchi until they float. Pan-fry in butter until golden and crispy on the outside.","time":"8 min"},{"title":"Make gremolata and serve","text":"Combine lemon zest, minced garlic, and parsley. Plate crispy gnocchi, add braised beef and sauce, scatter gremolata on top.","time":null}],"Miso Butter Shrimp with Charred Corn & Chili":[{"title":"Make miso butter","text":"Blend softened butter with miso paste until completely smooth and uniform.","time":null},{"title":"Char the corn","text":"Grill or broil corn until charred on all sides. Cut kernels off the cob.","time":"8 min"},{"title":"Sear shrimp","text":"Pat shrimp completely dry. Season. Sear in a smoking hot pan with oil \u2014 2 min untouched. Flip and cook 90 seconds.","time":"4 min"},{"title":"Glaze with miso butter","text":"Add miso butter to the pan with shrimp. Baste as it foams and turns golden.","time":"1 min"},{"title":"Plate","text":"Arrange charred corn with diced jalape\u00f1o and scallions on the plate. Place shrimp on top. Squeeze lime over everything.","time":null}],"Chicken Thigh Carnitas Tacos":[{"title":"Braise chicken","text":"Season thighs with chipotle, cumin, salt, and pepper. Add orange juice, lime juice, and enough water to come halfway up. Braise at 325\u00b0F covered for 1.5 hours until tender.","time":"90 min"},{"title":"Crisp the chicken","text":"Remove thighs and shred roughly. Spread on a foil-lined baking sheet. Broil 5\u20138 min until edges are caramelized and crispy.","time":"8 min"},{"title":"Make quick pickled cabbage","text":"Shred cabbage and toss with red wine vinegar, salt, and a pinch of sugar. Let sit while chicken cooks.","time":"15 min"},{"title":"Make guacamole","text":"Mash avocados with lime juice, salt, and minced cilantro. Keep chunky.","time":null},{"title":"Build tacos","text":"Char tortillas. Double-stack and fill with chicken, pickled cabbage, guacamole, and fresh cilantro. Lime on the side.","time":null}],"Roasted Red Snapper with Romesco":[{"title":"Make romesco","text":"Toast almonds until golden. Blend roasted peppers, almonds, garlic, sherry vinegar, and smoked paprika with olive oil. Season assertively.","time":"5 min"},{"title":"Char spring onions","text":"Grill or broil spring onions until charred and tender throughout.","time":"6 min"},{"title":"Roast snapper","text":"Season fillets well. Roast at 400\u00b0F for 14\u201316 min until just cooked through.","time":"16 min"},{"title":"Plate","text":"Spread romesco on the plate, place snapper on top, charred onions alongside. A drizzle of olive oil finishes it.","time":null}],"Lamb Meatballs in Spiced Tomato Sauce with Orzo":[{"title":"Mix and form meatballs","text":"Combine lamb with cumin, cinnamon, minced garlic, fresh mint, salt, and pepper. Form into 1.5-inch balls.","time":null},{"title":"Brown meatballs","text":"Brown in olive oil over medium-high heat on all sides. Remove.","time":"8 min"},{"title":"Make spiced sauce","text":"Cook onion and garlic in the same pan. Add tomatoes, cinnamon, cumin, and salt. Simmer 10 min.","time":"12 min"},{"title":"Finish meatballs in sauce","text":"Return meatballs to sauce. Simmer covered 15 min until cooked through.","time":"15 min"},{"title":"Cook orzo and serve","text":"Cook orzo in salted water, drain. Plate with meatballs and sauce. Crumble feta and scatter fresh mint on top.","time":"10 min"}],"Pork Ribs with Char Siu Glaze":[{"title":"Make char siu marinade","text":"Combine hoisin, soy sauce, honey, five-spice, minced garlic, and sesame oil. This is the whole flavor profile.","time":null},{"title":"Marinate ribs","text":"Coat ribs in marinade and marinate at least 1 hour \u2014 overnight is much better.","time":"60 min"},{"title":"Slow roast","text":"Roast at 325\u00b0F for 1.5 hours, turning and basting with more marinade every 30 min.","time":"90 min"},{"title":"Glaze and finish","text":"Increase oven to 450\u00b0F. Brush with additional glaze. Roast 10 min until lacquered and caramelized with some char.","time":"10 min"},{"title":"Serve","text":"Slice between ribs. Serve over steamed jasmine rice with sliced scallions and sesame seeds.","time":null}],"Chicken Paillard with Arugula & Parmesan":[{"title":"Pound the chicken","text":"Place chicken between plastic wrap. Pound to an even quarter-inch thickness \u2014 uniform thickness means even cooking.","time":null},{"title":"Season and flour","text":"Season well with salt and pepper. Dredge lightly in flour.","time":null},{"title":"Sear quickly","text":"Cook in olive oil over high heat 2\u20133 min per side until golden and cooked through. It cooks fast because it's thin.","time":"5 min"},{"title":"Dress the salad","text":"Toss arugula and halved cherry tomatoes with lemon juice, olive oil, and salt.","time":null},{"title":"Plate","text":"Place hot chicken on the plate. Pile salad directly on top \u2014 the heat wilts the arugula just slightly. Shave parmesan over everything.","time":null}],"Whole Roasted Red Snapper with Chermoula":[{"title":"Make chermoula","text":"Blend cilantro, parsley, garlic, lemon juice, cumin, paprika, and olive oil until smooth. Reserve half for serving.","time":null},{"title":"Score and marinate fish","text":"Score the fish diagonally 3\u20134 times on each side. Coat all over with half the chermoula. Marinate 20 min.","time":"20 min"},{"title":"Roast","text":"Roast at 425\u00b0F for 18\u201320 min until cooked through \u2014 the flesh should flake easily at the thickest point.","time":"20 min"},{"title":"Serve","text":"Plate whole fish and spoon reserved fresh chermoula generously over the top.","time":null}],"Beef Bibimbap with Gochujang & Egg":[{"title":"Season and cook vegetables","text":"Blanch spinach, saut\u00e9 carrots, blanch bean sprouts. Season each separately with sesame oil, garlic, soy, and a pinch of salt \u2014 each component should taste good on its own.","time":"15 min"},{"title":"Cook beef","text":"Marinate sliced beef in soy, sesame oil, garlic, and sugar. Stir-fry over high heat 2\u20133 min until caramelized.","time":"5 min"},{"title":"Cook rice with crispy bottom","text":"Cook short-grain rice. For crispy bottom (dolsot style), heat in a stone bowl or skillet with sesame oil until you hear crackling.","time":"20 min"},{"title":"Fry eggs","text":"Fry eggs sunny-side up \u2014 the runny yolk becomes the sauce when mixed.","time":"3 min"},{"title":"Assemble and serve","text":"Place rice in a bowl. Arrange each topping in its own section. Add egg on top. Mix everything with gochujang before eating.","time":null}],"Shrimp & Cod Stew with Fennel":[{"title":"Saut\u00e9 aromatics","text":"Cook diced fennel and shallots in olive oil until soft and beginning to caramelize. Add garlic and cook 1 min.","time":"8 min"},{"title":"Add wine and tomatoes","text":"Add white wine and reduce. Add canned tomatoes. Simmer 15 min until the base is thick and flavorful.","time":"15 min"},{"title":"Add seafood in stages","text":"Add cubed cod first and simmer 3 min. Add shrimp and cook 3\u20134 min more until both are just cooked through.","time":"7 min"},{"title":"Season and serve","text":"Season generously. Ladle into bowls with grilled crusty bread alongside for dipping.","time":null}],"Sichuan Mapo Tofu with Ground Pork":[{"title":"Brown the pork","text":"Cook ground pork in oil, breaking up completely. Season well and cook until fully browned.","time":"5 min"},{"title":"Add doubanjiang","text":"Add doubanjiang chili bean paste and garlic and ginger. Cook 2 min until the oil turns red and aromatics are fragrant.","time":"2 min"},{"title":"Add tofu gently","text":"Cut tofu into cubes. Add to the pan carefully \u2014 shake the pan to move the tofu rather than stirring. Add soy sauce and sesame oil.","time":"3 min"},{"title":"Simmer","text":"Add a splash of stock or water. Simmer 5 min. The sauce should be red, glossy, and coat everything.","time":"5 min"},{"title":"Finish and serve","text":"Top with toasted Sichuan peppercorn oil if available. Add scallions and serve over steamed rice.","time":null}],"Salmon with Chimichurri & Roasted Broccolini":[{"title":"Make chimichurri","text":"Finely chop parsley, oregano, and garlic. Mix with red wine vinegar, olive oil, minced shallots, and red pepper flakes. Season well. Make 30 min ahead if possible.","time":null},{"title":"Roast broccolini","text":"Toss broccolini with olive oil and salt. Roast at 425\u00b0F or broil until stems are tender and florets are charred \u2014 about 8\u201310 min.","time":"10 min"},{"title":"Sear salmon","text":"Pat salmon dry and season well. Sear skin-side down in a hot skillet 4\u20135 min until skin is crispy. Flip and cook 2 min.","time":"7 min"},{"title":"Plate","text":"Place salmon with broccolini. Spoon chimichurri generously over both. The bright acidity cuts through the richness of the salmon.","time":null}],"Spring Pea & Ricotta Risotto":[{"title":"Make mint oil","text":"Blanch mint briefly, blend with olive oil and salt until bright green. Strain and set aside.","time":"5 min"},{"title":"Make risotto","text":"Standard risotto technique \u2014 toast arborio in butter with shallots, deglaze with white wine, add warm stock ladle by ladle over 20\u201322 min, stirring constantly.","time":"25 min"},{"title":"Finish with peas","text":"Stir most of the peas into the finished risotto. Blend remaining peas with a splash of stock for a smooth, bright swirl.","time":null},{"title":"Plate","text":"Spoon risotto into bowls. Tear fresh mozzarella or burrata over the top \u2014 it melts into the hot rice. Drizzle mint oil. Scatter remaining whole peas.","time":null}],"Chicken Thighs with Cherry & Thyme Jus":[{"title":"Render and crisp skin","text":"Pat chicken dry. Place skin-side down in a cold pan. Heat slowly over medium 12\u201315 min until deeply golden and rendered.","time":"15 min"},{"title":"Finish in oven","text":"Flip and roast at 400\u00b0F for 15 min until cooked through. Rest 5 min.","time":"15 min"},{"title":"Make cherry and thyme jus","text":"In the same pan, make a quick caramel with honey. Add red wine vinegar to stop it. Add red wine, chicken stock, dried cherries, and thyme. Reduce to a glossy sauce.","time":"10 min"},{"title":"Finish sauce and serve","text":"Swirl cold butter into the sauce off heat. Season. Plate chicken skin-side up and spoon cherry jus over generously.","time":null}],"Grilled Lamb Kofta with Fattoush & Hummus":[{"title":"Mix the kofta","text":"Combine lamb with allspice, garlic, fresh parsley, salt, and pepper. Mix until evenly distributed. Form into elongated cylinders around flat skewers.","time":null},{"title":"Make fattoush","text":"Break toasted pita into pieces. Combine with diced tomatoes, cucumber, sumac, lemon juice, and olive oil. The pita absorbs the dressing \u2014 this is the whole point.","time":null},{"title":"Grill kofta","text":"Grill over high heat 3\u20134 min per side until charred and cooked through.","time":"8 min"},{"title":"Plate","text":"Spread hummus generously on the plate. Add kofta. Pile fattoush alongside. Extra lemon on the side.","time":null}],"Cod with Mushroom Cream Sauce & Asparagus":[{"title":"Blanch asparagus","text":"Blanch asparagus in boiling salted water 2\u20133 min until just tender. Drain and keep warm.","time":"3 min"},{"title":"Saut\u00e9 mushrooms","text":"Cook mushrooms in butter over high heat until golden and most of their moisture has evaporated. Season well.","time":"6 min"},{"title":"Make cream sauce","text":"Add shallots and cook 1 min. Add sherry or wine and reduce. Add stock and cream. Simmer until slightly thickened.","time":"6 min"},{"title":"Cook cod","text":"Season cod. Sear in a separate hot pan 3\u20134 min per side until golden and cooked through.","time":"8 min"},{"title":"Plate","text":"Arrange asparagus, place cod on top, spoon mushroom cream sauce generously over everything.","time":null}],"Roasted Chicken with Spring Herb Pan Sauce":[{"title":"Season and roast chicken","text":"Season chicken breasts well with salt, pepper, and fresh thyme. Roast at 400\u00b0F for 30\u201335 min until golden and cooked through (165\u00b0F). Rest while making sauce.","time":"35 min"},{"title":"Deglaze the pan","text":"Add white wine to the roasting pan and scrape up all the fond from the bottom. Add chicken stock and shallots. Reduce by half.","time":"6 min"},{"title":"Finish herb sauce","text":"Swirl cold butter into the sauce off heat. Add all the fresh herbs \u2014 tarragon, chives, and parsley. The herbs go in raw at the end to preserve their freshness and color.","time":null},{"title":"Plate","text":"Place chicken on the plate and spoon the bright green herb sauce over generously.","time":null}],"Lamb Chops with Salsa Verde & White Beans":[{"title":"Make salsa verde","text":"Blend parsley, capers, anchovies, garlic, lemon zest, and olive oil. Keep it slightly chunky \u2014 not a smooth pur\u00e9e.","time":null},{"title":"Warm white beans","text":"Warm beans with a rosemary sprig, smashed garlic, and olive oil over medium heat. Season very generously with salt.","time":"6 min"},{"title":"Grill lamb chops","text":"Season chops with salt and pepper. Grill over high heat 3 min per side for medium-rare. Don't overcook \u2014 lamb chops are best pink.","time":"6 min"},{"title":"Rest and plate","text":"Rest chops 3 min. Plate on warm white beans. Drizzle salsa verde over both the chops and beans.","time":null}],"Bucatini all'Amatriciana with Bacon":[{"title":"Cook bacon low and slow","text":"Cut bacon into large lardons. Cook in a cold pan over medium heat until fat renders and meat is very crispy. Add red onion and cook until translucent.","time":"12 min"},{"title":"Deglaze with wine","text":"Add white wine and let it reduce completely \u2014 this adds acidity and pulls all the fond up.","time":"2 min"},{"title":"Add tomatoes","text":"Crush canned tomatoes and add with red pepper flakes. Simmer 15 min until thick and intensely flavored.","time":"15 min"},{"title":"Cook bucatini","text":"Cook in very well-salted water. Reserve pasta water. Drain al dente \u2014 bucatini takes longer than spaghetti.","time":"12 min"},{"title":"Combine and serve","text":"Toss pasta in the sauce with pasta water as needed. Plate with bacon pieces and a generous amount of pecorino.","time":null}],"Shrimp with Tomatoes, White Wine & Herbs":[{"title":"Build the sauce base","text":"Saut\u00e9 shallots and garlic in olive oil until soft. Add white wine and reduce by half.","time":"5 min"},{"title":"Add tomatoes","text":"Add crushed tomatoes with thyme. Season well and simmer 10 min until thickened.","time":"10 min"},{"title":"Add shrimp","text":"Add shrimp to the tomato sauce and cook 3\u20134 min until pink and just cooked through.","time":"4 min"},{"title":"Finish and serve","text":"Scatter fresh basil over. Drizzle with good olive oil. Bring the pan to the table with grilled baguette for mopping up the sauce.","time":null}],"Thai Poached Chicken & Rice \u2014 Khao Man Gai":[{"title":"Poach chicken and make stock","text":"Simmer chicken legs with smashed garlic, ginger, and salt in water for 30\u201335 min. Remove chicken and reserve the stock.","time":"35 min"},{"title":"Cook rice in chicken stock","text":"Toast jasmine rice briefly in a little oil. Add 2.5 cups of the reserved chicken stock. Cook covered 18 min.","time":"20 min"},{"title":"Make the dipping sauce","text":"Combine soy sauce, oyster sauce, a splash of sesame oil, and some of the chicken stock into a savory dipping sauce.","time":null},{"title":"Shred the chicken","text":"Remove meat from bones and shred into large pieces.","time":null},{"title":"Plate","text":"Mound rice in a bowl. Arrange chicken on top. Garnish with sliced cucumber and fresh cilantro. Serve dipping sauce on the side.","time":null}],"Roasted Lamb with Spring Root Vegetables":[{"title":"Marinate lamb","text":"Stud lamb with garlic slivers. Rub all over with olive oil, rosemary, lemon zest, salt, and pepper. Marinate at least 2 hours.","time":"120 min"},{"title":"Prep vegetables","text":"Cut carrots, parsnips, and potatoes into large chunks. Toss with olive oil and season.","time":null},{"title":"Roast together","text":"Place lamb on a rack over the vegetables. Roast at 400\u00b0F for 40\u201350 min for medium (145\u00b0F). The vegetables roast in the lamb drippings.","time":"50 min"},{"title":"Rest the lamb","text":"Rest 15 min before carving \u2014 essential for a large roast. Temperature continues to rise slightly.","time":"15 min"},{"title":"Carve and serve","text":"Carve lamb and serve with the roasted vegetables and any pan juices.","time":null}],"Roasted Salmon with Asparagus & Herb Butter":[{"title":"Make herb butter","text":"Mix softened butter with minced garlic, chopped dill, chopped parsley, lemon zest, salt, and pepper.","time":null},{"title":"Roast salmon","text":"Place center-cut salmon fillet on an oiled baking sheet. Season well. Roast at 400\u00b0F for 12\u201314 min until opaque but still slightly translucent at the very center.","time":"14 min"},{"title":"Roast asparagus","text":"Toss asparagus with olive oil and roast at 425\u00b0F for 10\u201312 min alongside the salmon.","time":"12 min"},{"title":"Plate with herb butter","text":"Place salmon and asparagus on the plate. Top the hot salmon with a generous amount of herb butter \u2014 it will melt into a natural sauce.","time":null}],"Spring Vegetable Frittata with Goat Cheese":[{"title":"Prep the vegetables","text":"Snap tough ends from asparagus and cut into pieces. Halve cherry tomatoes. Mince shallots and fresh herbs.","time":null},{"title":"Saut\u00e9 vegetables","text":"Cook shallots in olive oil in an oven-safe skillet 2 min. Add asparagus and cook 3 min. Add tomatoes and cook 1 min.","time":"6 min"},{"title":"Add eggs","text":"Whisk eggs with salt and pepper. Pour over the vegetables. Cook on the stovetop over medium heat 2\u20133 min until edges are just set.","time":"3 min"},{"title":"Add goat cheese and bake","text":"Crumble goat cheese over the top. Transfer to 375\u00b0F oven and bake 10\u201312 min until puffed and just set in the center.","time":"12 min"},{"title":"Serve","text":"Let rest 2 min before slicing. Serve directly from the skillet at the table.","time":null}],"Grilled Salmon with Mango Salsa & Coconut Rice":[{"title":"Make coconut rice","text":"Replace half the water with coconut milk when cooking jasmine rice. Add a pinch of salt and sugar. Cook as normal.","time":"20 min"},{"title":"Make mango salsa","text":"Dice mango, slice jalape\u00f1o, chop cilantro, squeeze lime. Mix. Let sit 15 min.","time":"15 min"},{"title":"Grill salmon","text":"Season fillets with salt, pepper, and a drizzle of oil. Grill skin-side down over high heat 4\u20135 min. Flip and cook 2\u20133 min.","time":"8 min"},{"title":"Plate","text":"Spoon coconut rice into a bowl, place salmon on top, and spoon mango salsa generously over everything. Extra lime on the side.","time":null}],"Chicken with Artichokes, Lemon & Olives":[{"title":"Brown chicken","text":"Season thighs and brown skin-side down in olive oil until golden. Remove.","time":"8 min"},{"title":"Build the braise","text":"In same pan, saut\u00e9 garlic 1 min. Add white wine and reduce. Add stock, artichoke hearts, and olives. Return chicken skin-side up.","time":"5 min"},{"title":"Braise","text":"Cover and simmer on low heat 35\u201340 min until chicken is very tender.","time":"40 min"},{"title":"Add lemon","text":"Add fresh lemon juice in the last 5 min \u2014 adding it too early makes it bitter.","time":"5 min"},{"title":"Serve","text":"Serve directly from the pan with crusty bread or over orzo to soak up the briny, lemony braising liquid.","time":null}],"Short Rib Bibimbap with Rainbow Veg":[{"title":"Braise short ribs","text":"Season and sear ribs deeply. Braise in beef stock with soy sauce and garlic at 325\u00b0F for 2.5 hours until falling off the bone. Shred meat.","time":"180 min"},{"title":"Season vegetables","text":"Saut\u00e9 carrots and zucchini separately. Blanch spinach. Season each with sesame oil, garlic, soy, and salt \u2014 each component needs its own seasoning.","time":"15 min"},{"title":"Cook rice with crispy bottom","text":"Cook short-grain rice. For dolsot style, heat in a stone bowl with sesame oil until you hear crackling at the bottom.","time":"20 min"},{"title":"Fry eggs","text":"Fry eggs sunny-side up. The runny yolk becomes the sauce.","time":"3 min"},{"title":"Assemble","text":"Arrange rice in a bowl with each topping in its own section. Add short rib, top with egg. Mix with gochujang before eating.","time":null}],"Salmon Cakes with Herb Cream Sauce":[{"title":"Make herb cream sauce","text":"Mix sour cream with chopped dill, capers, lemon juice, and salt. Refrigerate while you make the cakes.","time":null},{"title":"Make salmon cakes","text":"Flake salmon and gently combine with panko, beaten egg, shallot, dill, and lemon zest. Mix as little as possible \u2014 overworking makes them dense.","time":null},{"title":"Form and chill","text":"Shape into 4 patties. Refrigerate 20 min so they hold together better when cooked.","time":"20 min"},{"title":"Sear cakes","text":"Cook in butter over medium heat 3\u20134 min per side until golden. Flip gently only once.","time":"8 min"},{"title":"Plate","text":"Serve with herb cream sauce drizzled over. A simple green salad alongside.","time":null}],"Lamb Tajine with Dates & Almonds":[{"title":"Brown lamb","text":"Season lamb and sear all sides deeply in olive oil over high heat.","time":"10 min"},{"title":"Build the tagine","text":"Cook onion and garlic 4 min. Add ras el hanout and cook 1 min. Add chicken stock and dates. Return lamb.","time":"6 min"},{"title":"Simmer","text":"Cover and simmer on low heat 1.5 hours until lamb is very tender. The dates will dissolve into the sauce.","time":"90 min"},{"title":"Toast almonds","text":"Toast sliced almonds in a dry pan until golden. Watch carefully \u2014 they burn fast.","time":"3 min"},{"title":"Make couscous and serve","text":"Steam couscous in hot stock. Fluff and plate. Add lamb and sauce over. Scatter toasted almonds and fresh cilantro.","time":null}],"Shrimp & Gratin with Dijon Cream Sauce":[{"title":"Make gratin dauphinois","text":"Slice potatoes very thin. Layer in a baking dish with cream, garlic, and salt. Bake covered at 375\u00b0F for 45 min, uncovered 20 min until golden.","time":"65 min"},{"title":"Cook shrimp","text":"Season shrimp and saut\u00e9 in butter over high heat 1\u20132 min per side until just pink. Remove.","time":"4 min"},{"title":"Make Dijon cream sauce","text":"In the same pan, cook shallots 2 min. Add sherry and reduce. Add cream and Dijon. Simmer until slightly thick.","time":"6 min"},{"title":"Add cheese and broil","text":"Return shrimp to sauce. Transfer to a gratin dish. Top with Gruy\u00e8re. Broil 3\u20134 min until golden and bubbling.","time":"4 min"},{"title":"Serve","text":"Serve directly from the gratin dish alongside the potato gratin.","time":null}],"Spicy Shrimp Crispy Rice":[{"title":"Cook and press rice","text":"Cook sushi rice with a little rice vinegar. While warm, press into a parchment-lined pan about 1-inch thick. Refrigerate until cold and firm \u2014 at least 1 hour.","time":"60 min"},{"title":"Fry the rice cakes","text":"Cut cold rice into rectangles. Fry in 350\u00b0F oil 2\u20133 min per side until deeply golden and crispy on the outside.","time":"6 min"},{"title":"Cook shrimp","text":"Season shrimp with salt and a pinch of chili. Sear in a hot pan 1\u20132 min per side until pink.","time":"4 min"},{"title":"Make spicy mayo","text":"Mix sriracha mayo with a squeeze of lemon. Drizzle over shrimp.","time":null},{"title":"Assemble","text":"Place a crispy rice cake on each plate. Top with avocado slices, then shrimp with spicy mayo, scallions, and sesame seeds.","time":null}],"Stuffed Chicken Breasts with Spinach & Ricotta":[{"title":"Make the filling","text":"Wilt spinach in a hot pan, squeeze completely dry, and chop. Mix with ricotta, parmesan, minced garlic, thyme, salt, and pepper.","time":"5 min"},{"title":"Butterfly and fill chicken","text":"Butterfly each breast by cutting horizontally, not all the way through. Open like a book. Spread filling inside. Fold closed and secure with toothpicks.","time":null},{"title":"Sear the chicken","text":"Sear stuffed breasts in an oven-safe pan over medium-high heat 3 min per side until golden.","time":"6 min"},{"title":"Finish in oven","text":"Transfer to 375\u00b0F oven for 20\u201325 min until internal temperature reaches 165\u00b0F. Rest 5 min and remove toothpicks.","time":"25 min"},{"title":"Make pan sauce and serve","text":"Deglaze pan with wine and stock. Reduce. Slice chicken and serve with the pan sauce.","time":null}],"Italian Sausage with Broccolini Orecchiette":[{"title":"Cook orecchiette","text":"Cook pasta in very well-salted water until al dente. Reserve 1 cup pasta water. In the last 2 min, add broccolini to the pasta water.","time":"12 min"},{"title":"Brown sausage","text":"Remove sausage from casing and crumble into a wide pan. Brown over medium-high heat until caramelized.","time":"7 min"},{"title":"Add aromatics","text":"Add garlic and red pepper flakes. Cook 1 min. Add white wine and reduce.","time":"2 min"},{"title":"Combine","text":"Add pasta and broccolini to the pan with pasta water. Toss vigorously.","time":null},{"title":"Finish and serve","text":"Off heat, add parmesan and toss to combine. Plate with more parmesan on top.","time":null}],"Miso-Glazed Eggplant with Soba Noodles":[{"title":"Make miso glaze","text":"Whisk miso paste, mirin, and a splash of soy sauce until smooth.","time":null},{"title":"Score and glaze eggplant","text":"Halve eggplant lengthwise. Score the flesh in a crosshatch. Brush generously with miso glaze.","time":null},{"title":"Roast or broil eggplant","text":"Roast at 425\u00b0F or broil 15\u201320 min until the flesh is very soft and the glaze is caramelized and starting to char at the edges.","time":"20 min"},{"title":"Cook soba","text":"Cook soba noodles per package (usually 4\u20135 min). Drain and rinse with cold water immediately.","time":"5 min"},{"title":"Season and serve","text":"Toss noodles with soy sauce and sesame oil. Plate with eggplant on top. Scatter sesame seeds and sliced scallions.","time":null}],"Pan-Seared Tilapia with Salsa Verde":[{"title":"Make salsa verde","text":"Finely chop parsley and capers. Mince garlic. Combine with olive oil and lemon juice. Season assertively \u2014 this sauce should be punchy.","time":null},{"title":"Score and dry tilapia","text":"Score the skin lightly 2\u20133 times to prevent curling. Pat fillets completely dry.","time":null},{"title":"Sear skin-side down","text":"Heat oil in a pan over medium-high. Lay tilapia skin-side down. Press gently with a spatula to keep contact. Cook 3\u20134 min until skin is crispy.","time":"4 min"},{"title":"Flip and finish","text":"Flip and cook 1\u20132 min more. Tilapia cooks quickly \u2014 don't overcook.","time":"2 min"},{"title":"Plate","text":"Place tilapia skin-side up. Spoon salsa verde generously over. The skin stays crispier this way.","time":null}],"Smoky Pulled Pork with Slaw & Cornbread":[{"title":"Season the pork","text":"Rub pork shoulder all over with smoked paprika, brown sugar, salt, and pepper. Let sit 30 min.","time":"30 min"},{"title":"Slow cook low and slow","text":"Roast at 275\u00b0F for 4 hours until completely tender and falling apart when you push it with a fork.","time":"240 min"},{"title":"Pull the pork","text":"Rest 15 min, then pull with two forks into large pieces. Toss with a splash of apple cider vinegar and BBQ sauce.","time":null},{"title":"Make slaw","text":"Shred cabbage and carrots. Toss with apple cider vinegar, a little sugar, salt, and a drizzle of oil.","time":"10 min"},{"title":"Serve","text":"Pile pulled pork on cornbread. Top with slaw. Extra BBQ sauce on the side.","time":null}],"Salmon with Brown Butter & Caper Berries":[{"title":"Season and sear salmon","text":"Pat fillets dry. Season well. Sear skin-side down in olive oil over medium-high heat 4\u20135 min. Flip and cook 2 min. Rest on a warm plate.","time":"7 min"},{"title":"Make beurre noisette","text":"Add butter to the hot pan. Cook, swirling constantly, until it turns golden brown and smells of hazelnuts. About 3 min.","time":"3 min"},{"title":"Add capers and shallots","text":"Add capers \u2014 they'll sputter. Add thinly sliced shallots and let them wilt briefly in the butter.","time":"1 min"},{"title":"Finish and plate","text":"Add lemon juice to the brown butter. Pour immediately over salmon. Scatter parsley and serve at once.","time":null}],"Lamb Shoulder with Pomegranate & Walnut":[{"title":"Season and brown","text":"Season lamb shoulder all over. Sear deeply in oil on all sides in a heavy pot over high heat.","time":"12 min"},{"title":"Build the braise","text":"Add onion, garlic, za'atar, pomegranate molasses, and chicken stock. The pomegranate provides acidity that tenderizes the lamb.","time":"5 min"},{"title":"Braise","text":"Cover and cook at 325\u00b0F for 2.5\u20133 hours until completely tender and falling apart.","time":"180 min"},{"title":"Toast walnuts","text":"Toast walnuts in a dry pan until fragrant and just golden.","time":"4 min"},{"title":"Shred and serve","text":"Shred lamb. Serve with the braising sauce spooned over. Top with toasted walnuts, pomegranate seeds if available, and fresh parsley.","time":null}],"Spaghetti with Shrimp & White Wine Clam Sauce":[{"title":"Cook spaghetti","text":"Cook pasta in well-salted water until al dente. Reserve 1 cup pasta water.","time":"10 min"},{"title":"Build the briny base","text":"Saut\u00e9 garlic in olive oil until golden. Add red pepper flakes. Add white wine and clam juice. Bring to a simmer.","time":"5 min"},{"title":"Cook shrimp","text":"Add shrimp and cook 2\u20133 min until just pink and cooked through.","time":"3 min"},{"title":"Combine and finish","text":"Add drained pasta and toss with pasta water to create a loose, glossy sauce. Finish with lemon juice and fresh parsley.","time":null}],"Chicken Cordon Bleu with Dijon Cream Sauce":[{"title":"Stuff and roll","text":"Place ham and cheese on each pounded breast. Roll tightly, tucking the ends in. Secure with toothpicks.","time":null},{"title":"Bread the chicken","text":"Dredge rolls in flour, then beaten egg, then panko. Press panko firmly to adhere.","time":null},{"title":"Pan-fry until golden","text":"Cook in butter and oil over medium heat 4\u20135 min per side until golden all around.","time":"10 min"},{"title":"Finish in oven","text":"Transfer to 375\u00b0F oven for 15 min until internal temperature reaches 165\u00b0F. Remove toothpicks and rest.","time":"15 min"},{"title":"Make Dijon cream sauce","text":"Deglaze the pan with white wine. Add cream and Dijon. Simmer until slightly thick. Serve over sliced chicken.","time":"5 min"}],"Blackened Salmon with Mango Avocado Salsa":[{"title":"Make the salsa","text":"Dice mango and avocado. Mix with diced red onion, lime juice, cilantro, and salt. Make first so it can sit and develop.","time":"10 min"},{"title":"Season salmon heavily","text":"Coat salmon fillets generously on both sides with Cajun seasoning. Press firmly to adhere.","time":null},{"title":"Blacken in butter","text":"Heat butter in a cast iron skillet until smoking. Add salmon. Cook 3\u20134 min per side. The outside should be deeply charred \u2014 that's blackening, not burning.","time":"8 min"},{"title":"Rest and plate","text":"Rest salmon 2 min. Plate and spoon mango avocado salsa generously over the top. Lime wedge on the side.","time":null}],"Braised Pork Belly with Kimchi & Rice":[{"title":"Score and season pork belly","text":"Score the skin in a crosshatch pattern. Season with salt, soy sauce, gochujang, and garlic. Marinate 30 min.","time":"30 min"},{"title":"Sear skin until golden","text":"Place skin-side down in a cold pan. Heat slowly and render 15 min until skin is golden and crispy.","time":"15 min"},{"title":"Braise the pork","text":"Add kimchi, ginger, and enough stock to come halfway up the pork. Cover and braise at 325\u00b0F for 1 hour until tender.","time":"60 min"},{"title":"Cook rice","text":"Cook short-grain rice and keep warm.","time":"20 min"},{"title":"Serve","text":"Slice pork belly thick. Serve over rice with braising liquid and kimchi spooned over. Drizzle with sesame oil.","time":null}],"Whole Roasted Red Snapper with Herbs & Lemon":[{"title":"Prep the fish","text":"Score the snapper diagonally 3\u20134 times on each side. Stuff the cavity with lemon slices, thyme, and rosemary sprigs.","time":null},{"title":"Season and oil","text":"Drizzle generously with olive oil inside and out. Season with salt and pepper all over and inside the cavity.","time":null},{"title":"Roast at high heat","text":"Roast at 425\u00b0F for 18\u201322 min until the thickest part of the fish flakes easily when tested with a fork.","time":"22 min"},{"title":"Rest and serve","text":"Rest 5 min. Serve whole at the table with extra lemon wedges and olive oil.","time":null}],"Slow-Roasted Pork Shoulder with Chimichurri":[{"title":"Season overnight","text":"Make deep cuts all over pork. Push garlic slivers into cuts. Rub with salt and pepper. Refrigerate overnight uncovered for best skin.","time":"480 min"},{"title":"Slow roast","text":"Roast at 275\u00b0F for 4+ hours until completely tender and falling apart. Internal should reach 195\u00b0F.","time":"240 min"},{"title":"Rest the pork","text":"Rest 20 min before shredding \u2014 it reabsorbs juices dramatically during this rest.","time":"20 min"},{"title":"Make chimichurri","text":"Finely chop parsley, oregano, garlic, and shallots. Mix with red wine vinegar, olive oil, and jalape\u00f1o. Let sit 30 min.","time":null},{"title":"Shred and serve","text":"Shred pork into large pieces. Serve with chimichurri spooned generously over the top.","time":null}],"Shrimp & Crab Pasta in Garlic Cream":[{"title":"Cook pasta","text":"Cook pasta in well-salted water until al dente. Reserve 1 cup pasta water.","time":"10 min"},{"title":"Build garlic cream","text":"Saut\u00e9 garlic in butter over medium heat until soft but not browned. Add white wine and reduce. Add cream and simmer until slightly thick.","time":"8 min"},{"title":"Add seafood","text":"Add shrimp and cook 2 min per side until pink. Fold in crab meat gently \u2014 it's already cooked, just needs warming.","time":"5 min"},{"title":"Combine and finish","text":"Add pasta and toss with pasta water as needed to loosen. Finish with lemon juice and parsley.","time":null}],"Shakshuka Verde with Feta":[{"title":"Char the tomatillos","text":"Place tomatillos under the broiler until charred and softened. This develops sweetness and depth.","time":"8 min"},{"title":"Build the verde base","text":"Saut\u00e9 onion in olive oil until soft. Add garlic, jalape\u00f1os, and cumin. Cook 2 min.","time":"5 min"},{"title":"Add tomatillos and simmer","text":"Add charred tomatillos and cook 10 min, mashing slightly, until the sauce thickens. Season generously.","time":"10 min"},{"title":"Poach eggs","text":"Create wells in the sauce, crack eggs in, and cover. Cook 5\u20136 min for runny yolks, 7\u20138 for set.","time":"6 min"},{"title":"Serve","text":"Crumble feta generously over the top. Finish with cilantro and drizzle of olive oil. Serve with sourdough bread for dipping.","time":null}],"NY Strip Steak with Herb Butter & Green Beans":[{"title":"Make herb butter","text":"Mix softened butter with minced garlic, thyme, salt, and pepper.","time":null},{"title":"Season and rest steak","text":"Season strip steak very generously with kosher salt and cracked pepper. Rest at room temperature 20 min.","time":"20 min"},{"title":"Sear in cast iron","text":"Heat cast iron until smoking. Add oil. Sear steak 3\u20134 min per side for medium-rare. Baste with butter in the last minute.","time":"8 min"},{"title":"Rest with herb butter","text":"Top with herb butter and rest 5 min. The butter melts into a sauce.","time":"5 min"},{"title":"Blanch green beans and serve","text":"Blanch green beans in boiling salted water 3 min. Drain and season. Slice steak against the grain and serve with green beans.","time":"3 min"}],"Seared Cod with Romesco & Fingerling Potatoes":[{"title":"Roast fingerlings","text":"Halve fingerling potatoes and toss with olive oil and salt. Roast at 425\u00b0F for 25 min until golden and crispy.","time":"25 min"},{"title":"Make romesco","text":"Blend roasted peppers, toasted almonds, garlic, smoked paprika, and sherry vinegar with olive oil. Season well.","time":"5 min"},{"title":"Sear the cod","text":"Pat cod completely dry. Season. Sear in oil over high heat 3\u20134 min per side until golden and just cooked through.","time":"8 min"},{"title":"Plate","text":"Spread romesco on the plate. Add roasted fingerlings. Set cod on top. A drizzle of olive oil finishes it.","time":null}],"Pork Tenderloin with Cider Glaze & Greens":[{"title":"Make cider glaze","text":"Reduce apple cider with honey and Dijon in a small saucepan until syrupy and reduced by half.","time":"8 min"},{"title":"Sear tenderloin","text":"Season pork and sear all sides in a hot oven-safe pan until golden brown.","time":"6 min"},{"title":"Glaze and roast","text":"Brush with cider glaze. Roast at 400\u00b0F for 15\u201318 min until internal temperature reaches 145\u00b0F. Rest 5 min.","time":"18 min"},{"title":"Wilt the greens","text":"In the same pan, cook Swiss chard or kale with garlic until wilted. Season with salt and a splash of cider vinegar.","time":"5 min"},{"title":"Slice and serve","text":"Slice tenderloin and serve with wilted greens. Drizzle any remaining glaze over the pork.","time":null}],"Whole Roasted Cauliflower with Chermoula & Feta":[{"title":"Make chermoula","text":"Blend cilantro, parsley, garlic, lemon juice, cumin, paprika, and olive oil until smooth. Reserve half for serving.","time":null},{"title":"Prepare and roast cauliflower","text":"Trim the bottom so it sits flat. Coat all over with half the chermoula. Roast at 400\u00b0F for 45\u201350 min until deeply golden and a knife slides in easily.","time":"50 min"},{"title":"Serve whole","text":"Place cauliflower on a platter. Drizzle with reserved chermoula. Crumble feta generously over the top. Serve at the table and cut into wedges.","time":null}],"Shrimp & Chorizo Paella":[{"title":"Build the sofrito","text":"Cook onion, garlic, and bell pepper in olive oil in a wide flat pan until soft and sweet. Add tomatoes and cook down 5 min.","time":"12 min"},{"title":"Toast rice in the pan","text":"Add rice and stir into the sofrito until every grain is coated. Toast 2 min.","time":"2 min"},{"title":"Add stock and saffron","text":"Add hot stock with smoked paprika. Add sliced chorizo. Distribute evenly and don't stir again \u2014 paella develops a crust (socarrat) on the bottom.","time":null},{"title":"Add shrimp and cook without stirring","te
