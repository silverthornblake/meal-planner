<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dinner — Mar & Apr</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f0e8;--cream2:#ede7d9;--cream3:#e4dccb;
  --ink:#1a1814;--ink2:#3a3530;--ink3:#6a6358;--ink4:#9a9088;
  --rust:#b84a2e;--rust-lt:#f0e8e4;--rust-mid:rgba(184,74,46,0.12);
  --sage:#4a6650;--ochre:#c27820;--ochre-lt:#f5ede0;--gold:#d4a843;
  --border:#cec5b2;--border2:#ddd6c8;
  --nav-h:52px;--bot-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--cream);color:var(--ink);font-family:'Barlow',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}

/* ── TOP NAV ── */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--ink);z-index:200;display:flex;align-items:center;padding:0 16px;gap:10px;}
.topnav-brand{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--cream);flex:1;}
.topnav-meta{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.1em;color:rgba(245,240,232,0.45);}
.topnav-meta span{color:var(--gold);font-weight:600;}

/* ── BOTTOM BAR ── */
.botbar{position:fixed;bottom:0;left:0;right:0;height:var(--bot-h);background:var(--ink);display:flex;align-items:stretch;border-top:1px solid rgba(255,255,255,0.08);z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:rgba(245,240,232,0.38);transition:color 0.15s;padding-bottom:2px;}
.btab.active{color:var(--cream);}
.btab-icon{font-size:18px;line-height:1;}
.btab-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;}

/* ── SCROLL WRAP ── */
.page-wrap{position:fixed;top:var(--nav-h);left:0;right:0;bottom:var(--bot-h);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page-wrap::-webkit-scrollbar{display:none;}
.panel{display:none;}.panel.active{display:block;}

/* ── WEEK HEADER ── */
.week-header{padding:0 16px;position:sticky;top:0;background:var(--cream);z-index:10;border-bottom:2px solid var(--ink);}
.week-nav{display:flex;align-items:center;gap:0;padding:12px 0 10px;}
.week-nav-btn{background:none;border:1px solid var(--border);color:var(--ink3);width:34px;height:34px;border-radius:4px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.week-nav-btn:active{background:var(--cream2);}
.week-label-wrap{flex:1;text-align:center;padding:0 10px;}
.week-label{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink);line-height:1;}
.week-sublabel{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.15em;color:var(--ink4);margin-top:2px;}
.week-progress{display:flex;gap:3px;justify-content:center;margin-top:8px;padding-bottom:10px;}
.week-prog-dot{width:10px;height:10px;border-radius:50%;background:var(--border);border:1.5px solid var(--border);transition:all 0.2s;cursor:pointer;}
.week-prog-dot.done{background:var(--rust);border-color:var(--rust);}
.week-prog-dot.today{border-color:var(--rust);}

/* ── ADD NEXT WEEK BUTTON ── */
.add-week-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px 16px;padding:14px;border:1.5px dashed var(--border);border-radius:4px;cursor:pointer;background:none;font-family:'Barlow',sans-serif;font-size:13px;color:var(--ink4);letter-spacing:0.05em;transition:all 0.15s;width:calc(100% - 32px);}
.add-week-btn:active{background:var(--cream2);border-color:var(--ink3);color:var(--ink);}
.add-week-btn-icon{font-size:16px;}

/* ── WEEK SECTION ── */
.week-section{padding-bottom:4px;}
.week-section-label{padding:10px 16px 6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink4);}

/* ── DAY ROW ── */
.day-row{display:flex;align-items:center;gap:0;margin:0 16px 8px;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;background:white;transition:all 0.12s;position:relative;}
.day-row:active{transform:scale(0.985);}
.day-row.selected{border-color:var(--rust);background:var(--rust-lt);}
.day-row.today-row{border-color:var(--ink2);}
.day-col{flex-shrink:0;width:56px;padding:12px 8px;text-align:center;border-right:1px solid var(--border2);background:var(--cream2);}
.day-row.selected .day-col{background:rgba(184,74,46,0.08);border-right-color:rgba(184,74,46,0.2);}
.day-row.today-row .day-col{background:var(--ink);border-right-color:var(--ink);}
.day-dow{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);line-height:1;}
.day-row.today-row .day-dow{color:rgba(245,240,232,0.6);}
.day-num-big{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--ink);line-height:1;margin-top:2px;}
.day-row.selected .day-num-big{color:var(--rust);}
.day-row.today-row .day-num-big{color:var(--cream);}
.day-content{flex:1;padding:10px 12px;min-width:0;}
.day-empty-label{font-size:12px;color:var(--ink4);font-style:italic;}
.day-meal-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:3px;}
.day-row.selected .day-meal-name{color:var(--rust);}
.day-meal-meta{display:flex;gap:10px;flex-wrap:wrap;}
.day-meta-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--ink4);}
.day-row.selected .day-meta-pill{color:rgba(184,74,46,0.7);}
.day-arrow{padding:0 12px;font-size:14px;color:var(--ink4);flex-shrink:0;}
.day-row.selected .day-arrow{color:var(--rust);}
.day-fav-badge{position:absolute;top:6px;right:36px;font-size:10px;color:var(--gold);}
.day-today-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rust);border-radius:3px 0 0 3px;}

/* ── REMOVE WEEK BTN ── */
.remove-week-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:4px 16px 16px;padding:8px;background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:11px;color:var(--ink4);letter-spacing:0.1em;text-transform:uppercase;transition:color 0.15s;}
.remove-week-btn:active{color:var(--rust);}

/* ── SLIDE PANEL ── */
.slide-panel{position:fixed;inset:0;z-index:300;background:var(--cream);transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;}
.slide-panel.open{transform:translateX(0);}
.slide-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px 12px;background:var(--ink);flex-shrink:0;}
.slide-back{background:none;border:none;color:rgba(245,240,232,0.7);font-size:24px;cursor:pointer;padding:2px 6px 2px 0;line-height:1;}
.slide-date{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--cream);flex:1;}
.slide-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.slide-body::-webkit-scrollbar{display:none;}

/* ── OPTION CARDS ── */
.opts-wrap{padding:12px;}
.opts-hdr{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink4);padding:4px 0 10px;}
.opt-card{border:1.5px solid var(--border);border-radius:4px;margin-bottom:10px;cursor:pointer;overflow:hidden;background:white;transition:all 0.15s;position:relative;}
.opt-card:active{transform:scale(0.985);}
.opt-card.selected{border-color:var(--rust);background:var(--rust-lt);}
.opt-top{padding:13px 44px 10px 14px;}
.opt-num{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.25em;color:var(--ink4);margin-bottom:3px;text-transform:uppercase;}
.opt-card.selected .opt-num{color:var(--rust);}
.opt-name{font-size:15px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:7px;}
.opt-card.selected .opt-name{color:var(--rust);}
.opt-stats{display:flex;gap:14px;flex-wrap:wrap;}
.stp{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--ink3);}
.stp strong{color:var(--ink);}
.opt-card.selected .stp,.opt-card.selected .stp strong{color:var(--rust);}
.opt-chk{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;background:white;transition:all 0.18s;}
.opt-card.selected .opt-chk{background:var(--rust);border-color:var(--rust);color:white;}
.opt-fav{position:absolute;bottom:10px;right:12px;font-size:18px;cursor:pointer;padding:4px;z-index:2;opacity:0.35;transition:all 0.15s;background:none;border:none;}
.opt-fav.on{opacity:1;}
.opt-divider{height:1px;background:var(--cream2);margin:0 14px;}
.opt-ings{padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:4px;}
.ing-chip{font-size:10px;color:var(--ink3);background:var(--cream2);border:1px solid var(--border2);padding:2px 7px;border-radius:2px;}
.opt-card.selected .ing-chip{background:var(--rust-lt);border-color:rgba(184,74,46,0.2);color:var(--rust);}

/* ── RECIPE VIEW ── */
.recipe-wrap{padding-bottom:32px;}
.recipe-hero{background:var(--ink);padding:16px 16px 14px;position:relative;}
.recipe-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:rgba(245,240,232,0.4);margin-bottom:4px;}
.recipe-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--cream);letter-spacing:0.03em;line-height:1.15;padding-right:42px;}
.recipe-fav{position:absolute;top:14px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;opacity:0.4;transition:all 0.18s;}
.recipe-fav.on{opacity:1;}
.recipe-stats{display:flex;border-bottom:1px solid var(--border);}
.rstat{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border);}
.rstat:last-child{border-right:none;}
.rstat-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--ink);line-height:1;}
.rstat-lbl{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink4);margin-top:2px;}
.diff-pips{display:flex;gap:2px;justify-content:center;margin-top:3px;}
.pip{width:16px;height:3px;border-radius:1px;background:var(--cream3);}
.pip.on{background:var(--ink2);}
.recipe-sec{padding:14px 16px 0;}
.recipe-sec-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--ink);}
.ing-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border2);}
.ing-row:last-child{border-bottom:none;}
.ing-name{font-size:13px;color:var(--ink2);}
.ing-qty{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--ink4);}
.step-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border2);align-items:flex-start;}
.step-row:last-child{border-bottom:none;}
.step-n{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--cream3);line-height:1;flex-shrink:0;min-width:26px;}
.step-body{flex:1;}
.step-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.step-text{font-size:12px;color:var(--ink3);line-height:1.6;}
.step-time{display:inline-block;margin-top:5px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ochre);background:var(--ochre-lt);padding:2px 7px;border-radius:2px;}

/* ── LOADING RECIPE ── */
.recipe-loading{padding:40px 24px;text-align:center;}
.recipe-loading-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:8px;text-transform:uppercase;}
.recipe-loading-sub{font-size:12px;color:var(--ink4);margin-bottom:32px;}
.skeleton{background:linear-gradient(90deg,var(--cream2) 25%,var(--cream3) 50%,var(--cream2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:3px;margin-bottom:10px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── CHANGE OPTIONS BTN ── */
.change-opts-btn{margin:16px 16px 0;display:flex;align-items:center;justify-content:center;gap:8px;background:none;border:1.5px solid var(--border);color:var(--ink3);padding:12px;border-radius:4px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;width:calc(100% - 32px);transition:all 0.15s;}
.change-opts-btn:active{background:var(--cream2);}

/* ── SELECTED BAR ── */
.sel-bar{margin:12px 16px 0;background:var(--rust);color:white;border-radius:4px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.sel-bar-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;opacity:0.75;margin-bottom:2px;}
.sel-bar-name{font-size:13px;font-weight:500;}
.sel-bar-rm{background:none;border:none;color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;padding:0 0 0 8px;line-height:1;}

/* ── GROCERY TAB ── */
.groc-toolbar{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
.groc-h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.groc-sub{font-size:11px;color:var(--ink4);margin-top:2px;letter-spacing:0.08em;}
.groc-actions{display:flex;gap:8px;margin-top:10px;}
.g-btn{background:none;border:1px solid var(--border);color:var(--ink3);padding:7px 14px;border-radius:2px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.15s;flex:1;}
.g-btn:active{background:var(--cream2);}
.groc-empty{text-align:center;padding:60px 24px;}
.groc-empty-h{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;}
.groc-empty-p{font-size:13px;color:var(--ink4);line-height:1.6;}
.meal-chips{padding:12px 16px;border-bottom:1px solid var(--border2);}
.meal-chip-row{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--border2);}
.meal-chip-row:last-child{border-bottom:none;}
.chip-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;color:var(--rust);text-transform:uppercase;min-width:48px;}
.chip-name{font-size:12px;color:var(--ink3);}
.groc-sec{padding:14px 16px 0;}
.groc-sec-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--ink);}
.groc-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border2);cursor:pointer;transition:opacity 0.15s;}
.groc-item:last-child{border-bottom:none;}
.groc-item.ckd{opacity:0.35;}
.g-cb{width:17px;height:17px;flex-shrink:0;border:1.5px solid var(--border);border-radius:2px;background:white;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all 0.15s;margin-top:1px;}
.groc-item.ckd .g-cb{background:var(--sage);border-color:var(--sage);color:white;}
.groc-item-r{flex:1;min-width:0;}
.groc-item-name{font-size:13px;color:var(--ink2);margin-bottom:2px;}
.groc-item.ckd .groc-item-name{text-decoration:line-through;color:var(--ink4);}
.groc-item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.groc-qty{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--ink4);}
.groc-multi{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;background:var(--ochre-lt);color:var(--ochre);padding:1px 5px;border-radius:2px;letter-spacing:0.1em;}
.groc-for{font-size:10px;color:var(--rust);font-style:italic;}

/* ── FAVORITES TAB ── */
.favs-toolbar{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
.favs-h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.favs-sub{font-size:11px;color:var(--ink4);margin-top:2px;}
.favs-empty{text-align:center;padding:60px 24px;}
.favs-empty-h{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;}
.favs-empty-p{font-size:13px;color:var(--ink4);line-height:1.6;}
.fav-card{border:1.5px solid var(--border);border-radius:4px;background:white;margin:0 16px 10px;overflow:hidden;cursor:pointer;}
.fav-card-top{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px;}
.fav-body{flex:1;}
.fav-cuisine{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--rust);margin-bottom:3px;}
.fav-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:6px;}
.fav-stats{display:flex;gap:12px;}
.fav-stat{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--ink3);}
.fav-stat strong{color:var(--ink);}
.fav-rm{background:none;border:none;font-size:18px;cursor:pointer;color:var(--gold);padding:2px;flex-shrink:0;}

/* ── ANIM ── */
@keyframes popIn{0%{transform:scale(0.5);}70%{transform:scale(1.25);}100%{transform:scale(1);}}
.opt-chk.pop{animation:popIn 0.22s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.recipe-wrap{animation:fadeUp 0.22s ease;}
</style>
</head>
<body>

<div class="topnav">
  <div class="topnav-brand">Dinner Planner</div>
  <div class="topnav-meta" id="topMeta">No meals selected</div>
</div>

<div class="page-wrap" id="pageWrap">
  <div class="panel active" id="panel-plan">
    <div class="week-header">
      <div class="week-nav">
        <button class="week-nav-btn" onclick="shiftWeek(-1)">‹</button>
        <div class="week-label-wrap">
          <div class="week-label" id="weekLabel">—</div>
          <div class="week-sublabel" id="weekSublabel">—</div>
        </div>
        <button class="week-nav-btn" onclick="shiftWeek(1)">›</button>
      </div>
      <div class="week-progress" id="weekProgress"></div>
    </div>
    <div id="planBody"></div>
  </div>
  <div class="panel" id="panel-grocery">
    <div class="groc-toolbar">
      <div class="groc-h1">Grocery List</div>
      <div class="groc-sub" id="grocSub">Select dinners to build your list</div>
      <div class="groc-actions">
        <button class="g-btn" onclick="clearChecked()">Clear Checked</button>
        <button class="g-btn" onclick="clearAllMeals()">Clear All</button>
      </div>
    </div>
    <div id="grocContent"></div>
  </div>
  <div class="panel" id="panel-favs">
    <div class="favs-toolbar">
      <div class="favs-h1">Favorites</div>
      <div class="favs-sub" id="favsSub">Recipes you've saved</div>
    </div>
    <div id="favsContent" style="padding-top:12px;"></div>
  </div>
</div>

<div class="slide-panel" id="slidePanel">
  <div class="slide-hdr">
    <button class="slide-back" onclick="closeSlide()">‹</button>
    <div class="slide-date" id="slideDate">—</div>
  </div>
  <div class="slide-body" id="slideBody"></div>
</div>

function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.btab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');

  if (id === 'grocery') renderGrocery();
  if (id === 'favs') renderFavs();
}

// ═══════════════════════════════════════════════════════════════
// WEEK HELPERS
// ═══════════════════════════════════════════════════════════════
// weekOffset: 0 = current week, 1 = next week, -1 = last week
let weekOffset = 0;
let extraWeeks = []; // array of offsets for additional planned weeks, e.g. [1]

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const diff = now.getDate() - day + (day === 0 ? -6 : 1); // Monday start
  const mon = new Date(now.setDate(diff));
  mon.setHours(0,0,0,0);
  mon.setDate(mon.getDate() + offset * 7);
  return new Date(mon);
}

function getWeekDates(offset) {
  const start = getWeekStart(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    return d.toISOString().slice(0,10);
  });
}

function fmtWeekLabel(offset) {
  const dates = getWeekDates(offset);
  const s = new Date(dates[0]+'T12:00:00');
  const e = new Date(dates[6]+'T12:00:00');
  const mo1 = s.toLocaleDateString('en-US',{month:'short'});
  const mo2 = e.toLocaleDateString('en-US',{month:'short'});
  const y = s.getFullYear();
  if (offset === 0) return { label: 'This Week', sub: `${mo1} ${s.getDate()} – ${mo2} ${e.getDate()}, ${y}` };
  if (offset === 1) return { label: 'Next Week', sub: `${mo1} ${s.getDate()} – ${mo2} ${e.getDate()}, ${y}` };
  if (offset === -1) return { label: 'Last Week', sub: `${mo1} ${s.getDate()} – ${mo2} ${e.getDate()}, ${y}` };
  const diff = offset > 0 ? `+${offset} weeks` : `${offset} weeks`;
  return { label: `${mo1} ${s.getDate()} – ${mo2} ${e.getDate()}`, sub: `${y}` };
}

function shiftWeek(dir) {
  weekOffset += dir;
  extraWeeks = []; // reset extra weeks when navigating
  renderPlan();
}

function addNextWeek() {
  // find the highest offset shown and add one more
  const allOffsets = [weekOffset, ...extraWeeks];
  const max = Math.max(...allOffsets);
  extraWeeks.push(max + 1);
  renderPlan();
  // scroll to bottom after render
  setTimeout(() => {
    const pw = document.getElementById('pageWrap');
    pw.scrollTop = pw.scrollHeight;
  }, 100);
}

function removeExtraWeek(offset) {
  extraWeeks = extraWeeks.filter(o => o !== offset);
  renderPlan();
}

// ═══════════════════════════════════════════════════════════════
// PLAN RENDER
// ═══════════════════════════════════════════════════════════════
function renderPlan() {
  const { label, sub } = fmtWeekLabel(weekOffset);
  document.getElementById('weekLabel').textContent = label;
  document.getElementById('weekSublabel').textContent = sub;

  // Progress dots for current week
  const dates = getWeekDates(weekOffset);
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let dots = '';
  dates.forEach((ds, i) => {
    const isSel = sel[ds] !== undefined;
    const isToday = ds === TODAY;
    dots += `<div class="week-prog-dot${isSel?' done':''}${isToday?' today':''}" title="${DAYS[i]}"></div>`;
  });
  document.getElementById('weekProgress').innerHTML = dots;

  // Render week sections
  const allOffsets = [weekOffset, ...extraWeeks].sort((a,b) => a-b);
  let html = '';
  allOffsets.forEach((off, idx) => {
    html += renderWeekSection(off, idx > 0);
  });

  // Add next week button — only show if next adjacent week isn't already shown
  const maxShown = Math.max(...allOffsets);
  html += `<button class="add-week-btn" onclick="addNextWeek()">
    <span class="add-week-btn-icon">+</span> Plan ${maxShown === weekOffset ? 'Next' : 'Another'} Week
  </button>`;

  html += `<div style="height:20px;"></div>`;
  document.getElementById('planBody').innerHTML = html;
  updateMeta();
}

function renderWeekSection(offset, showRemove) {
  const dates = getWeekDates(offset);
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const { label, sub } = fmtWeekLabel(offset);
  const selCount = dates.filter(ds => sel[ds] !== undefined).length;

  let html = `<div class="week-section">`;
  if (offset !== weekOffset) {
    html += `<div class="week-section-label">${label} &nbsp;·&nbsp; ${sub} &nbsp;·&nbsp; <span style="color:var(--rust)">${selCount}/7</span></div>`;
  } else {
    html += `<div style="height:10px;"></div>`;
  }

  dates.forEach((ds, i) => {
    const hasMeals = !!MEALS[ds];
    const isSel = sel[ds] !== undefined;
    const isToday = ds === TODAY;
    const meal = isSel ? MEALS[ds][sel[ds]] : null;
    const isFav = meal && favs[meal.name];
    const d = new Date(ds + 'T12:00:00');
    const dayNum = d.getDate();
    const timeStr = meal ? (meal.time >= 120 ? `${Math.round(meal.time/60)}h` : `${meal.time}m`) : '';
    const diffLbl = meal ? ['Easy','Easy','Medium','Medium','Hard','Hard'][meal.diff] : '';

    html += `<div class="day-row${isSel?' selected':''}${isToday?' today-row':''}"
      id="dayrow-${ds}"
      onclick="${hasMeals ? `openDay('${ds}')` : ''}">
      ${isToday ? '<div class="day-today-bar"></div>' : ''}
      <div class="day-col">
        <div class="day-dow">${DAYS[i]}</div>
        <div class="day-num-big">${dayNum}</div>
      </div>
      <div class="day-content">
        ${isSel
          ? `<div class="day-meal-name">${meal.name}</div>
             <div class="day-meal-meta">
               <span class="day-meta-pill">${meal.cuisine}</span>
               <span class="day-meta-pill">${meal.cal} cal</span>
               <span class="day-meta-pill">${timeStr}</span>
               <span class="day-meta-pill">${diffLbl}</span>
             </div>`
          : hasMeals
            ? `<div class="day-empty-label">Tap to choose dinner</div>`
            : `<div class="day-empty-label" style="opacity:0.4;">No options available</div>`
        }
      </div>
      ${isFav ? `<div class="day-fav-badge">★</div>` : ''}
      ${hasMeals ? `<div class="day-arrow">›</div>` : ''}
    </div>`;
  });

  if (showRemove) {
    html += `<button class="remove-week-btn" onclick="removeExtraWeek(${offset})">✕ Remove this week</button>`;
  }

  html += `</div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════════
// DAY SLIDE
// ═══════════════════════════════════════════════════════════════
function openDay(ds) {
  activeDate = ds;
  const d = new Date(ds + 'T12:00:00');
  document.getElementById('slideDate').textContent = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  viewingRecipe = sel[ds] !== undefined;
  renderSlideBody();
  document.getElementById('slidePanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderSlideBody() {
  const ds = activeDate;
  const body = document.getElementById('slideBody');
  if (viewingRecipe && sel[ds] !== undefined) {
    renderRecipeView(ds, sel[ds]);
  } else {
    renderOptionsView(ds);
  }
}

function renderOptionsView(ds) {
  const meals = MEALS[ds];
  const curSel = sel[ds];
  const body = document.getElementById('slideBody');

  let html = `<div class="opts-wrap"><div class="opts-hdr">Choose your dinner</div>`;
  meals.forEach((m, i) => {
    const isSel = curSel === i;
    const timeStr = m.time >= 120 ? `${Math.round(m.time/60)}h` : `${m.time}m`;
    const diffLbl = ['Easy','Easy','Medium','Medium','Hard','Hard'][m.diff] || 'Medium';
    const keyIngs = m.ingredients.slice(0,4).map(ing => `<span class="ing-chip">${ing.n}</span>`).join('');
    const isFav = !!favs[m.name];

    html += `<div class="opt-card${isSel?' selected':''}" id="optcard-${i}" onclick="selectMeal(${i})">
      <div class="opt-chk">${isSel?'✓':''}</div>
      <button class="opt-fav${isFav?' on':''}" onclick="event.stopPropagation();toggleFav('${ds}',${i})">${isFav?'★':'☆'}</button>
      <div class="opt-top">
        <div class="opt-num">${m.cuisine} · Option ${i+1}</div>
        <div class="opt-name">${m.name}</div>
        <div class="opt-stats">
          <span class="stp"><strong>${m.cal}</strong> cal</span>
          <span class="stp"><strong>${m.protein}g</strong> protein</span>
          <span class="stp"><strong>${timeStr}</strong></span>
          <span class="stp"><strong>${diffLbl}</strong></span>
        </div>
      </div>
      <div class="opt-divider"></div>
      <div class="opt-ings">${keyIngs}${m.ingredients.length>4?`<span class="ing-chip" style="color:var(--ink4)">+${m.ingredients.length-4} more</span>`:''}</div>
    </div>`;
  });
  html += `</div>`;
  body.innerHTML = html;
}

function selectMeal(mi) {
  const ds = activeDate;
  sel[ds] = mi;
  save();

  // Animate check on option cards
  document.querySelectorAll('.opt-card').forEach((card, i) => {
    card.classList.toggle('selected', i === mi);
    const chk = card.querySelector('.opt-chk');
    if (chk) { chk.textContent = i === mi ? '✓' : ''; if (i === mi) chk.classList.add('pop'); }
  });

  updateMeta();

  // After short delay, show recipe
  setTimeout(() => {
    viewingRecipe = true;
    renderSlideBody();
  }, 350);
}

// ═══════════════════════════════════════════════════════════════
// RECIPE VIEW — uses Claude API for steps
// ═══════════════════════════════════════════════════════════════
async function renderRecipeView(ds, mi) {
  const meal = MEALS[ds][mi];
  const body = document.getElementById('slideBody');
  const diffLbl = ['Easy','Easy','Medium','Medium','Hard','Hard'][meal.diff] || 'Medium';
  const timeStr = meal.time >= 120 ? `${Math.round(meal.time/60)}h ${meal.time%60 > 0 ? meal.time%60+'m':''}`.trim() : `${meal.time} min`;
  const isFav = !!favs[meal.name];
  const pips = [1,2,3,4,5].map(n => `<div class="pip${n<=meal.diff?' on':''}"></div>`).join('');

  // Build ingredient list HTML
  const ingsHtml = meal.ingredients.map(ing =>
    `<div class="ing-row"><span class="ing-name">${ing.n}</span><span class="ing-qty">${ing.q}</span></div>`
  ).join('');

  // Initial render with skeleton steps
  body.innerHTML = `<div class="recipe-wrap">
    <div class="recipe-hero">
      <div class="recipe-eyebrow">${meal.cuisine}</div>
      <div class="recipe-title">${meal.name}</div>
      <button class="recipe-fav${isFav?' on':''}" id="recipeFavBtn" onclick="toggleFavFromRecipe('${ds}',${mi})">${isFav?'★':'☆'}</button>
    </div>
    <div class="recipe-stats">
      <div class="rstat"><div class="rstat-val">${meal.cal}</div><div class="rstat-lbl">Calories</div></div>
      <div class="rstat"><div class="rstat-val">${meal.protein}g</div><div class="rstat-lbl">Protein</div></div>
      <div class="rstat"><div class="rstat-val">${timeStr}</div><div class="rstat-lbl">Cook Time</div></div>
      <div class="rstat">
        <div class="diff-pips">${pips}</div>
        <div class="rstat-lbl">${diffLbl}</div>
      </div>
    </div>

    <div class="recipe-sec">
      <div class="recipe-sec-title">Ingredients</div>
      <div>${ingsHtml}</div>
    </div>

    <div class="recipe-sec" style="margin-top:16px;">
      <div class="recipe-sec-title">Instructions</div>
      <div id="stepsContainer">
        ${[1,2,3,4,5].map(i => `
          <div class="step-row">
            <div class="step-n" style="color:var(--cream3)">${String(i).padStart(2,'0')}</div>
            <div class="step-body">
              <div class="skeleton" style="height:14px;width:${50+Math.random()*30}%;margin-bottom:6px;"></div>
              <div class="skeleton" style="height:12px;width:${60+Math.random()*30}%;margin-bottom:4px;"></div>
              <div class="skeleton" style="height:12px;width:${40+Math.random()*20}%;"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <button class="change-opts-btn" onclick="showOptions()">↺ View other options for today</button>
    <div style="height:24px;"></div>
  </div>`;

  // Fetch recipe steps from Claude
  try {
    const ingredientList = meal.ingredients.map(i => `${i.n}: ${i.q}`).join(', ');
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a professional chef writing a home-cook recipe card. Return ONLY a JSON array of step objects. Each step: { "title": "short step name", "text": "clear instruction in 1-3 sentences. Be specific with temps, times, techniques.", "time": "X min or null" }. No preamble, no markdown, just the raw JSON array. Max 7 steps. Focus on technique tips that make a real difference.`,
        messages: [{
          role: 'user',
          content: `Write step-by-step instructions for: ${meal.name} (${meal.cuisine}, ${meal.time} min, difficulty ${meal.diff}/5). Ingredients: ${ingredientList}. Serves 2.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '[]';
    const clean = text.replace(/```json|```/g, '').trim();
    const steps = JSON.parse(clean);

    const stepsHtml = steps.map((step, idx) => `
      <div class="step-row">
        <div class="step-n">${String(idx+1).padStart(2,'0')}</div>
        <div class="step-body">
          <div class="step-title">${step.title}</div>
          <div class="step-text">${step.text}</div>
          ${step.time ? `<span class="step-time">⏱ ${step.time}</span>` : ''}
        </div>
      </div>`).join('');

    const container = document.getElementById('stepsContainer');
    if (container) container.innerHTML = stepsHtml;

  } catch(err) {
    const container = document.getElementById('stepsContainer');
    if (container) container.innerHTML = `<div style="padding:16px 0;font-size:13px;color:var(--ink4);font-style:italic;">Couldn't load recipe steps. Check your connection and try again.</div>`;
  }
}

function showOptions() {
  viewingRecipe = false;
  renderSlideBody();
}

function closeSlide() {
  document.getElementById('slidePanel').classList.remove('open');
  document.body.style.overflow = '';
  const wasDate = activeDate;
  activeDate = null;
  viewingRecipe = false;
  // Re-render plan so day row reflects any selection changes
  renderPlan();
}

// ═══════════════════════════════════════════════════════════════
// FAVORITES
// ═══════════════════════════════════════════════════════════════
function toggleFav(ds, mi) {
  const meal = MEALS[ds][mi];
  if (favs[meal.name]) {
    delete favs[meal.name];
  } else {
    favs[meal.name] = { ...meal, savedAt: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) };
  }
  save();
  renderOptionsView(ds);
  renderFavs();
  updateMeta();
}

function toggleFavFromRecipe(ds, mi) {
  const meal = MEALS[ds][mi];
  if (favs[meal.name]) {
    delete favs[meal.name];
  } else {
    favs[meal.name] = { ...meal, savedAt: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) };
  }
  save();
  const btn = document.getElementById('recipeFavBtn');
  if (btn) { btn.textContent = favs[meal.name] ? '★' : '☆'; btn.classList.toggle('on', !!favs[meal.name]); }
  renderFavs();
}

function renderFavs() {
  const list = Object.values(favs);
  const sub = document.getElementById('favsSub');
  const content = document.getElementById('favsContent');

  if (!list.length) {
    sub.textContent = 'No favorites yet';
    content.innerHTML = `<div class="favs-empty">
      <div class="favs-empty-h">No Favorites Yet</div>
      <div class="favs-empty-p">Tap the ☆ on any recipe to save it here — works across any date.</div>
    </div>`;
    return;
  }

  sub.textContent = `${list.length} saved recipe${list.length>1?'s':''}`;
  content.innerHTML = list.map(m => {
    const timeStr = m.time >= 120 ? `${Math.round(m.time/60)}h` : `${m.time}m`;
    const diffLbl = ['Easy','Easy','Medium','Medium','Hard','Hard'][m.diff] || 'Medium';
    const keyIngs = (m.ingredients||[]).slice(0,5).map(i => `<span class="ing-chip">${i.n}</span>`).join('');
    return `<div class="fav-card">
      <div class="fav-card-top">
        <div class="fav-body">
          <div class="fav-cuisine">${m.cuisine} · saved ${m.savedAt}</div>
          <div class="fav-name">${m.name}</div>
          <div class="fav-stats">
            <span class="fav-stat"><strong>${m.cal}</strong> cal</span>
            <span class="fav-stat"><strong>${m.protein}g</strong> protein</span>
            <span class="fav-stat"><strong>${timeStr}</strong></span>
            <span class="fav-stat">${diffLbl}</span>
          </div>
        </div>
        <button class="fav-rm" onclick="removeFav('${m.name.replace(/'/g,"\\'")}')">★</button>
      </div>
      <div style="height:1px;background:var(--cream2);margin:0 14px;"></div>
      <div style="padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:4px;">${keyIngs}</div>
    </div>`;
  }).join('');
}

function removeFav(name) {
  delete favs[name];
  save();
  renderFavs();
}

// ═══════════════════════════════════════════════════════════════
// GROCERY
// ═══════════════════════════════════════════════════════════════
const CAT_ORDER = ['Seafood','Meat','Produce','Dairy','Grains','Pantry'];

function renderGrocery() {
  const dates = Object.keys(sel).sort();
  const body = document.getElementById('grocContent');
  const sub = document.getElementById('grocSub');

  if (!dates.length) {
    sub.textContent = 'Select dinners to build your list';
    body.innerHTML = `<div class="groc-empty"><div class="groc-empty-h">Start Planning</div><div class="groc-empty-p">Tap any day in the calendar and choose a dinner. Your grocery list builds automatically.</div></div>`;
    return;
  }

  // Aggregate ingredients
  const agg = {};
  dates.forEach(ds => {
    const m = MEALS[ds][sel[ds]];
    const d = new Date(ds + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    m.ingredients.forEach(ing => {
      const k = `${ing.c}|||${ing.n}`;
      if (!agg[k]) agg[k] = { c: ing.c, n: ing.n, q: ing.q, dates: [], meals: [] };
      agg[k].dates.push(label);
      agg[k].meals.push(m.name.split(' with ')[0].split(' & ')[0]);
    });
  });

  const total = Object.keys(agg).length;
  const ckd = Object.keys(shopCk).filter(k => shopCk[k] && agg[k]).length;
  sub.textContent = `${dates.length} meal${dates.length>1?'s':''} · ${total - ckd} items remaining`;

  // Meal chips
  const chips = dates.map(ds => {
    const m = MEALS[ds][sel[ds]];
    const d = new Date(ds + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const short = m.name.length > 38 ? m.name.slice(0,36)+'…' : m.name;
    return `<div class="meal-chip-row"><span class="chip-date">${label}</span><span class="chip-name">${short}</span></div>`;
  }).join('');

  // Group by category
  const byCat = {};
  Object.values(agg).forEach(item => {
    if (!byCat[item.c]) byCat[item.c] = [];
    byCat[item.c].push(item);
  });

  let cols = '';
  CAT_ORDER.forEach(cat => {
    if (!byCat[cat]) return;
    const items = byCat[cat].sort((a,b) => a.n.localeCompare(b.n));
    cols += `<div class="groc-sec">
      <div class="groc-sec-title">${cat}</div>
      ${items.map(item => {
        const k = `${item.c}|||${item.n}`;
        const ck = shopCk[k];
        // For items used in multiple meals, show meal names
        const forLabel = item.meals.length > 1
          ? `<span class="groc-for">${[...new Set(item.meals)].slice(0,2).join(', ')}${item.meals.length > 2 ? ' +more' : ''}</span>`
          : `<span class="groc-for">${item.meals[0]}</span>`;
        return `<div class="groc-item${ck?' ckd':''}" onclick="toggleShop('${k.replace(/'/g,"\\'")}')">
          <div class="g-cb">${ck?'✓':''}</div>
          <div class="groc-item-r">
            <div class="groc-item-name">${item.n}</div>
            <div class="groc-item-meta">
              ${item.dates.length > 1 ? `<span class="groc-multi">×${item.dates.length} meals</span>` : `<span class="groc-qty">${item.q}</span>`}
              ${forLabel}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  });

  body.innerHTML = `<div class="meal-chips">${chips}</div>${cols}<div style="height:24px;"></div>`;
}

function toggleShop(k) { shopCk[k] = !shopCk[k]; save(); renderGrocery(); }
function clearChecked() { shopCk = {}; save(); renderGrocery(); }
function clearAllMeals() {
  if (!Object.keys(sel).length) return;
  if (confirm('Clear all meal selections?')) { sel = {}; shopCk = {}; save(); extraWeeks = []; renderPlan(); renderGrocery(); updateMeta(); }
}

// ═══════════════════════════════════════════════════════════════
// META
// ═══════════════════════════════════════════════════════════════
function updateMeta() {
  const n = Object.keys(sel).length;
  const f = Object.keys(favs).length;
  const meta = document.getElementById('topMeta');
  let parts = [];
  if (n > 0) parts.push(`<span>${n}</span> planned`);
  if (f > 0) parts.push(`<span>${f}</span> ★`);
  meta.innerHTML = parts.length ? parts.join(' &nbsp;·&nbsp; ') : 'No meals selected';

  // Update week progress dots if visible
  const prog = document.getElementById('weekProgress');
  if (prog) {
    const dates = getWeekDates(weekOffset);
    const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    prog.innerHTML = dates.map((ds, i) => {
      const isSel = sel[ds] !== undefined;
      const isToday = ds === TODAY;
      return `<div class="week-prog-dot${isSel?' done':''}${isToday?' today':''}" title="${DAYS[i]}"></div>`;
    }).join('');
  }
}
