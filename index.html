<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner — March & April</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f5f0e8;
  --cream2: #ede7d9;
  --cream3: #e4dccb;
  --parchment: #d9d0bc;
  --ink: #1a1814;
  --ink2: #3a3530;
  --ink3: #6a6358;
  --ink4: #9a9088;
  --rust: #b84a2e;
  --rust-light: #f0e8e4;
  --sage: #4a6650;
  --sage-light: #e8eeea;
  --ochre: #c27820;
  --ochre-light: #f5ede0;
  --border: #cec5b2;
  --border2: #ddd6c8;
  --shadow: rgba(26,24,20,0.08);
  --shadow2: rgba(26,24,20,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── MASTHEAD ── */
.masthead {
  background: var(--ink);
  color: var(--cream);
  padding: 0;
  position: sticky; top: 0; z-index: 100;
}
.masthead-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: stretch;
  height: 56px;
}
.masthead-brand {
  display: flex; align-items: center; gap: 14px;
  padding: 0 28px 0 24px;
  border-right: 1px solid rgba(255,255,255,0.1);
}
.masthead-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.35em; text-transform: uppercase;
  color: rgba(245,240,232,0.5);
}
.masthead-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--cream);
}
.masthead-nav {
  display: flex; align-items: center;
  flex: 1; padding: 0 8px;
}
.nav-tab {
  background: none; border: none;
  color: rgba(245,240,232,0.45);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.25em; text-transform: uppercase;
  padding: 0 20px; height: 100%; cursor: pointer;
  transition: color 0.2s; border-bottom: 2px solid transparent;
  position: relative;
}
.nav-tab:hover { color: rgba(245,240,232,0.75); }
.nav-tab.active { color: var(--cream); border-bottom-color: var(--rust); }
.nav-tab .tab-count {
  font-size: 9px; background: var(--rust);
  color: white; padding: 1px 5px; border-radius: 3px;
  margin-left: 6px; vertical-align: middle; font-weight: 700;
}
.masthead-meta {
  display: flex; align-items: center;
  padding: 0 24px; gap: 20px; margin-left: auto;
  border-left: 1px solid rgba(255,255,255,0.1);
}
.meta-sel {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; letter-spacing: 0.1em; color: rgba(245,240,232,0.5);
}
.meta-sel span { color: var(--cream); font-weight: 600; }
.clear-all-btn {
  background: none; border: 1px solid rgba(255,255,255,0.15);
  color: rgba(245,240,232,0.45); padding: 5px 12px;
  border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif;
  font-size: 11px; letter-spacing: 0.1em; transition: all 0.2s;
}
.clear-all-btn:hover { border-color: var(--rust); color: var(--rust); }

/* ── LAYOUT ── */
.page { max-width: 1200px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

/* ── MONTH HEADER ── */
.month-banner {
  padding: 32px 24px 20px;
  display: flex; align-items: baseline; gap: 16px;
  border-bottom: 2px solid var(--ink);
}
.month-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 42px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--ink); line-height: 1;
}
.month-year {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 400;
  letter-spacing: 0.2em; color: var(--ink4);
}
.month-count {
  margin-left: auto;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; letter-spacing: 0.15em;
  color: var(--ink4); text-transform: uppercase;
}
.month-count span { color: var(--rust); font-weight: 600; }

/* ── CALENDAR GRID ── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-left: 1px solid var(--border);
  border-top: 1px solid var(--border);
}
.cal-dow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--ink4); text-align: center;
  padding: 10px 4px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--cream2);
}
.cal-cell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  min-height: 80px; position: relative;
  cursor: pointer; transition: background 0.15s;
  background: var(--cream);
}
.cal-cell:hover { background: var(--cream2); }
.cal-cell.empty { background: var(--cream2); cursor: default; pointer-events: none; }
.cal-cell.selected { background: var(--rust-light); }
.cal-cell.selected:hover { background: #ecddd8; }
.cal-cell.today .cal-num { color: var(--rust); font-weight: 600; }
.cal-cell-inner { padding: 8px 10px; height: 100%; }
.cal-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--ink2); line-height: 1; margin-bottom: 6px;
}
.cal-meal-preview {
  font-size: 10px; line-height: 1.4;
  color: var(--ink3); font-weight: 400;
}
.cal-cell.selected .cal-meal-preview { color: var(--rust); font-weight: 500; }
.cal-sel-dot {
  position: absolute; top: 8px; right: 8px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--rust);
  opacity: 0;
  transition: opacity 0.2s;
}
.cal-cell.selected .cal-sel-dot { opacity: 1; }
.cal-today-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--rust);
}

/* ── DAY MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(26,24,20,0.45);
  z-index: 200; opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  backdrop-filter: blur(2px);
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -48%) scale(0.96);
  width: min(680px, 95vw);
  max-height: 88vh; overflow-y: auto;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: 0 20px 60px rgba(26,24,20,0.25);
  z-index: 201;
  opacity: 0; pointer-events: none;
  transition: all 0.22s cubic-bezier(0.34,1.2,0.64,1);
}
.modal.open {
  opacity: 1; pointer-events: all;
  transform: translate(-50%, -50%) scale(1);
}
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-track { background: var(--cream2); }
.modal::-webkit-scrollbar-thumb { background: var(--parchment); }

.modal-header {
  padding: 22px 24px 16px;
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: flex-start; justify-content: space-between;
  position: sticky; top: 0; background: var(--cream); z-index: 2;
}
.modal-date-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--ink4); margin-bottom: 4px;
}
.modal-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--ink); line-height: 1;
}
.modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--ink4); font-size: 22px; line-height: 1;
  padding: 2px 4px; transition: color 0.15s;
}
.modal-close:hover { color: var(--ink); }
.modal-instruction {
  padding: 12px 24px 0;
  font-size: 11px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--ink4);
}

/* ── MEAL OPTION CARDS ── */
.meal-cards { padding: 12px 24px 24px; display: flex; flex-direction: column; gap: 10px; }
.meal-card {
  border: 1.5px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
  background: white;
  position: relative;
}
.meal-card:hover {
  border-color: var(--ink2);
  box-shadow: 0 4px 16px var(--shadow);
  transform: translateY(-1px);
}
.meal-card.selected {
  border-color: var(--rust);
  box-shadow: 0 4px 20px rgba(184,74,46,0.15);
  transform: translateY(-2px);
}
.meal-card-top {
  padding: 16px 18px 12px;
  display: flex; align-items: flex-start; gap: 14px;
}
.meal-card-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px; font-weight: 700;
  color: var(--cream3); line-height: 1;
  flex-shrink: 0; margin-top: -2px;
  transition: color 0.15s;
}
.meal-card.selected .meal-card-num { color: rgba(184,74,46,0.2); }
.meal-card-body { flex: 1; min-width: 0; }
.meal-card-cuisine {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--ink4); margin-bottom: 5px;
  transition: color 0.15s;
}
.meal-card.selected .meal-card-cuisine { color: var(--rust); }
.meal-card-name {
  font-size: 17px; font-weight: 500;
  color: var(--ink); line-height: 1.25;
  margin-bottom: 10px;
}
.meal-card-stats {
  display: flex; gap: 16px; flex-wrap: wrap;
}
.stat {
  display: flex; flex-direction: column; gap: 1px;
}
.stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 600;
  color: var(--ink); line-height: 1;
}
.meal-card.selected .stat-val { color: var(--rust); }
.stat-label {
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--ink4);
}
.meal-card-divider { height: 1px; background: var(--cream2); margin: 0 18px; }
.meal-card-bottom { padding: 10px 18px 14px; }
.ingredient-label {
  font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--ink4); margin-bottom: 7px;
}
.ingredients-list {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.ing-chip {
  font-size: 11px; color: var(--ink3);
  background: var(--cream2); border: 1px solid var(--border2);
  padding: 3px 8px; border-radius: 2px;
  transition: all 0.15s;
}
.meal-card.selected .ing-chip {
  background: var(--rust-light); border-color: rgba(184,74,46,0.2);
  color: var(--rust);
}
.meal-card-check {
  position: absolute; top: 14px; right: 16px;
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent;
  transition: all 0.2s;
  background: white;
}
.meal-card.selected .meal-card-check {
  background: var(--rust); border-color: var(--rust); color: white;
}

/* ── DIFFICULTY PIPS ── */
.diff-pips { display: flex; gap: 3px; align-items: center; margin-top: 4px; }
.pip {
  width: 20px; height: 3px; border-radius: 1px;
  background: var(--cream3); transition: background 0.15s;
}
.pip.filled { background: var(--ink2); }
.meal-card.selected .pip.filled { background: var(--rust); }

/* ── GROCERY TAB ── */
.grocery-page { padding: 0; }
.grocery-toolbar {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  background: var(--cream);
  position: sticky; top: 56px; z-index: 10;
}
.grocery-title-block {}
.grocery-h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
  line-height: 1;
}
.grocery-sub {
  font-size: 11px; color: var(--ink4); margin-top: 3px;
  letter-spacing: 0.1em;
}
.grocery-actions { margin-left: auto; display: flex; gap: 8px; }
.g-btn {
  background: none; border: 1px solid var(--border);
  color: var(--ink3); padding: 7px 14px; border-radius: 2px;
  cursor: pointer; font-family: 'Barlow', sans-serif;
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  transition: all 0.2s;
}
.g-btn:hover { border-color: var(--ink2); color: var(--ink); }
.grocery-empty-state {
  text-align: center; padding: 80px 40px;
}
.grocery-empty-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--ink4); margin-bottom: 12px;
}
.grocery-empty-h {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--ink2); margin-bottom: 10px;
}
.grocery-empty-p { font-size: 14px; color: var(--ink4); max-width: 320px; margin: 0 auto; line-height: 1.6; }

/* ── SELECTED MEALS STRIP ── */
.selected-strip {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border2);
  display: flex; gap: 8px; flex-wrap: wrap;
}
.sel-chip {
  display: flex; align-items: center; gap: 8px;
  background: white; border: 1px solid var(--border);
  padding: 7px 12px; border-radius: 2px;
  font-size: 12px; color: var(--ink2);
}
.sel-chip-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--rust);
}

/* ── GROCERY COLUMNS ── */
.grocery-columns {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0;
  padding: 0;
}
.grocery-col {
  border-right: 1px solid var(--border2);
  border-bottom: 1px solid var(--border2);
  padding: 20px 24px;
}
.grocery-col:last-child { border-right: none; }
.grocery-col-header {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 2px solid var(--ink);
}
.grocery-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; cursor: pointer;
  border-bottom: 1px solid var(--border2);
  transition: opacity 0.15s;
}
.grocery-item:last-child { border-bottom: none; }
.grocery-item.checked { opacity: 0.35; }
.g-checkbox {
  width: 16px; height: 16px; flex-shrink: 0;
  border: 1.5px solid var(--border);
  border-radius: 1px; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: transparent;
  transition: all 0.15s;
}
.grocery-item.checked .g-checkbox {
  background: var(--sage); border-color: var(--sage); color: white;
}
.g-item-name {
  flex: 1; font-size: 13px; color: var(--ink2); line-height: 1.3;
}
.grocery-item.checked .g-item-name { text-decoration: line-through; color: var(--ink4); }
.g-item-qty {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; color: var(--ink4); white-space: nowrap;
  letter-spacing: 0.05em;
}
.g-item-multi {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 600;
  background: var(--ochre-light); color: var(--ochre);
  padding: 1px 5px; border-radius: 2px;
  letter-spacing: 0.1em;
}

/* ── MONTH SECTION SPACER ── */
.month-section { }
.month-section + .month-section { margin-top: 0; }
.month-section .cal-grid { margin: 0; }

/* ── SCROLL MARGIN ── */
#section-march, #section-april { scroll-margin-top: 72px; }

/* ── ANIMATIONS ── */
@keyframes popIn {
  0%   { opacity: 0; transform: translate(-50%,-52%) scale(0.94); }
  70%  { transform: translate(-50%,-49%) scale(1.01); }
  100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}
.modal.open { animation: popIn 0.22s cubic-bezier(0.34,1.2,0.64,1) forwards; }

@keyframes checkPop {
  0%   { transform: scale(0.6); }
  60%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.meal-card.selected .meal-card-check { animation: checkPop 0.22s ease forwards; }

@keyframes cellPulse {
  0%   { box-shadow: 0 0 0 0 rgba(184,74,46,0.3); }
  100% { box-shadow: 0 0 0 8px rgba(184,74,46,0); }
}
.cal-cell.just-selected { animation: cellPulse 0.5s ease forwards; }

@media (max-width: 700px) {
  .cal-grid { grid-template-columns: repeat(7, 1fr); }
  .cal-cell { min-height: 52px; }
  .cal-meal-preview { display: none; }
  .masthead-meta { display: none; }
  .grocery-columns { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- MASTHEAD -->
<div class="masthead">
  <div class="masthead-inner">
    <div class="masthead-brand">
      <div>
        <div class="masthead-label">Dinner Planner</div>
        <div class="masthead-title">Mar — Apr 2026</div>
      </div>
    </div>
    <nav class="masthead-nav">
      <button class="nav-tab active" onclick="switchTab('plan',this)">
        Plan
      </button>
      <button class="nav-tab" onclick="switchTab('grocery',this)">
        Grocery List <span class="tab-count" id="grocCount" style="display:none">0</span>
      </button>
    </nav>
    <div class="masthead-meta">
      <div class="meta-sel" id="metaSel">No meals selected</div>
      <button class="clear-all-btn" onclick="clearAll()">Clear All</button>
    </div>
  </div>
</div>

<!-- PLAN PANEL -->
<div class="panel active" id="panel-plan">
  <div class="page">
    <div class="month-section" id="section-march"></div>
    <div class="month-section" id="section-april"></div>
  </div>
</div>

<!-- GROCERY PANEL -->
<div class="panel" id="panel-grocery">
  <div class="grocery-page">
    <div class="grocery-toolbar">
      <div class="grocery-title-block">
        <div class="grocery-h1">Grocery List</div>
        <div class="grocery-sub" id="grocSub">Select dinners from the plan to build your list</div>
      </div>
      <div class="grocery-actions">
        <button class="g-btn" onclick="clearChecked()">Clear Checked</button>
        <button class="g-btn" onclick="printList()">Print</button>
      </div>
    </div>
    <div id="groceryContent"></div>
  </div>
</div>

<!-- DAY MODAL -->
<div class="modal-backdrop" id="backdrop" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-header">
    <div>
      <div class="modal-date-label">Dinner for</div>
      <div class="modal-date" id="modalDate">—</div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-instruction">Choose one option</div>
  <div class="meal-cards" id="modalCards"></div>
</div>

<script>
// ─── MEAL DATA ────────────────────────────────────────────────────
const DIFF_LABELS = ['Easy','Easy','Medium','Medium','Hard','Hard'];
const MEALS = {
"2026-03-01":[

// ─── STATE ───────────────────────────────────────────────────────
let sel = {};     // { dateStr: mealIndex }
let shopCk = {};  // { "Cat|||Name": true }
let activeModal = null;

function load() {
  try { const d = JSON.parse(localStorage.getItem('dp_v4')||'{}'); sel = d.sel||{}; shopCk = d.shopCk||{}; } catch(e){}
}
function save() { localStorage.setItem('dp_v4', JSON.stringify({sel,shopCk})); }

// ─── DATE HELPERS ────────────────────────────────────────────────
const TODAY = new Date().toISOString().slice(0,10);
function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function fmtFull(ds) { return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }
function fmtShort(ds) { return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

// ─── TABS ────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='grocery') renderGrocery();
}

// ─── RENDER PLAN ─────────────────────────────────────────────────
function renderPlan() {
  renderMonth('section-march',2026,2,'March');
  renderMonth('section-april',2026,3,'April');
  updateMeta();
}

function renderMonth(secId, year, month, label) {
  const sec = document.getElementById(secId);
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const selCount = Object.keys(sel).filter(k=>k.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).length;

  let html = `<div class="month-banner">
    <div class="month-name">${label}</div>
    <div class="month-year">${year}</div>
    <div class="month-count"><span>${selCount}</span> of ${daysInMonth} days planned</div>
  </div>
  <div class="cal-grid">`;

  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  dows.forEach(d=>{ html+=`<div class="cal-dow">${d}</div>`; });

  // Empty cells before month start
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;

  for(let d=1;d<=daysInMonth;d++) {
    const ds = dateKey(year,month,d);
    const hasMeals = !!MEALS[ds];
    const isSel = sel[ds]!==undefined;
    const isToday = ds===TODAY;
    const selMeal = isSel ? MEALS[ds][sel[ds]] : null;
    const preview = selMeal ? selMeal.name.split(' with ')[0].split(' & ')[0].split(',')[0] : '';

    html += `<div class="cal-cell${isSel?' selected':''}${isToday?' today':''}${!hasMeals?' empty':''}" 
      id="cell-${ds}" onclick="${hasMeals?`openModal('${ds}')`:''}">
      ${isToday?'<div class="cal-today-bar"></div>':''}
      <div class="cal-sel-dot"></div>
      <div class="cal-cell-inner">
        <div class="cal-num">${d}</div>
        ${hasMeals&&isSel?`<div class="cal-meal-preview">${preview}</div>`:''}
        ${hasMeals&&!isSel?`<div class="cal-meal-preview" style="color:var(--ink4);font-style:italic;font-size:9px">Tap to plan</div>`:''}
      </div>
    </div>`;
  }

  html += `</div>`;
  sec.innerHTML = html;
}

// ─── MODAL ───────────────────────────────────────────────────────
function openModal(ds) {
  activeModal = ds;
  const meals = MEALS[ds];
  document.getElementById('modalDate').textContent = fmtFull(ds);
  const curSel = sel[ds];

  document.getElementById('modalCards').innerHTML = meals.map((m,i) => {
    const isSel = curSel===i;
    const timeStr = m.time >= 60 ? (m.time>=120?`${Math.round(m.time/60)}h`:`${m.time}m`) : `${m.time}m`;
    const diffLabel = ['Easy','Easy','Medium','Medium','Hard','Hard'][m.diff]||'Medium';
    const pips = [1,2,3,4,5].map(n=>`<div class="pip${n<=m.diff?' filled':''}"></div>`).join('');
    const keyIngs = m.ingredients.slice(0,4).map(ing=>`<span class="ing-chip">${ing.n}</span>`).join('');

    return `<div class="meal-card${isSel?' selected':''}" onclick="selectMeal(${i})" id="mcard-${i}">
      <div class="meal-card-check">${isSel?'✓':''}</div>
      <div class="meal-card-top">
        <div class="meal-card-num">0${i+1}</div>
        <div class="meal-card-body">
          <div class="meal-card-cuisine">${m.cuisine}</div>
          <div class="meal-card-name">${m.name}</div>
          <div class="meal-card-stats">
            <div class="stat"><div class="stat-val">${m.cal}</div><div class="stat-label">Calories</div></div>
            <div class="stat"><div class="stat-val">${m.protein}g</div><div class="stat-label">Protein</div></div>
            <div class="stat"><div class="stat-val">${timeStr}</div><div class="stat-label">Cook Time</div></div>
            <div class="stat">
              <div class="stat-val" style="font-size:13px;padding-top:3px">${diffLabel}</div>
              <div class="diff-pips">${pips}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="meal-card-divider"></div>
      <div class="meal-card-bottom">
        <div class="ingredient-label">Key Ingredients</div>
        <div class="ingredients-list">${keyIngs}${m.ingredients.length>4?`<span class="ing-chip" style="color:var(--ink4)">+${m.ingredients.length-4} more</span>`:''}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('backdrop').classList.add('open');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function selectMeal(mi) {
  const ds = activeModal;
  sel[ds] = mi;
  save();

  // Animate cards
  document.querySelectorAll('.meal-card').forEach((card,i) => {
    card.classList.toggle('selected', i===mi);
    const chk = card.querySelector('.meal-card-check');
    if(chk) chk.textContent = i===mi?'✓':'';
  });

  // Update cell
  const cell = document.getElementById('cell-'+ds);
  if(cell) {
    cell.classList.add('selected','just-selected');
    setTimeout(()=>cell.classList.remove('just-selected'),600);
    const preview = cell.querySelector('.cal-meal-preview');
    const meal = MEALS[ds][mi];
    const txt = meal.name.split(' with ')[0].split(' & ')[0].split(',')[0];
    if(preview) { preview.textContent=txt; preview.style.cssText=''; }
    cell.querySelector('.cal-sel-dot').style.opacity='1';
  }

  updateMeta();

  // Close after short delay for tactile feel
  setTimeout(closeModal, 320);
}

function closeModal() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  activeModal = null;
}

// ─── META BAR ────────────────────────────────────────────────────
function updateMeta() {
  const n = Object.keys(sel).length;
  const metaSel = document.getElementById('metaSel');
  metaSel.innerHTML = n>0?`<span>${n}</span> dinner${n>1?'s':''} planned`:'No meals selected';
  const gc = document.getElementById('grocCount');
  if(n>0){ gc.style.display='inline'; gc.textContent=n; } else gc.style.display='none';
  // Update month counts
  ['march','april'].forEach(m=>{
    const sec = document.getElementById('section-'+m);
    if(!sec) return;
    const badge = sec.querySelector('.month-count');
    if(!badge) return;
    const yr=2026; const mo = m==='march'?2:3;
    const dim = new Date(yr,mo+1,0).getDate();
    const cnt = Object.keys(sel).filter(k=>k.startsWith(`${yr}-${String(mo+1).padStart(2,'0')}`)).length;
    badge.innerHTML=`<span>${cnt}</span> of ${dim} days planned`;
  });
}

// ─── GROCERY ─────────────────────────────────────────────────────
const CAT_ORDER=['Seafood','Meat','Produce','Dairy','Grains','Pantry'];

function renderGrocery() {
  const body = document.getElementById('groceryContent');
  const dates = Object.keys(sel).sort();

  if(!dates.length) {
    document.getElementById('grocSub').textContent='Select dinners from the plan to build your list';
    body.innerHTML=`<div class="grocery-empty-state">
      <div class="grocery-empty-eyebrow">Nothing here yet</div>
      <div class="grocery-empty-h">Start Planning</div>
      <div class="grocery-empty-p">Head to the Plan tab, tap any day, and choose a dinner. Your grocery list builds automatically.</div>
    </div>`;
    return;
  }

  // Aggregate
  const agg={};
  dates.forEach(ds=>{
    const m=MEALS[ds][sel[ds]];
    m.ingredients.forEach(ing=>{
      const k=`${ing.c}|||${ing.n}`;
      if(!agg[k]) agg[k]={c:ing.c,n:ing.n,q:ing.q,count:0};
      agg[k].count++;
    });
  });

  const total=Object.keys(agg).length;
  const ckd=Object.keys(shopCk).filter(k=>shopCk[k]&&agg[k]).length;
  document.getElementById('grocSub').textContent=`${dates.length} meal${dates.length>1?'s':''} · ${total-ckd} items remaining`;

  // Chips
  const chips=dates.map(ds=>{
    const m=MEALS[ds][sel[ds]];
    const short=m.name.length>36?m.name.slice(0,34)+'…':m.name;
    return `<div class="sel-chip"><span class="sel-chip-date">${fmtShort(ds)}</span>${short}</div>`;
  }).join('');

  // Group
  const byCat={};
  Object.values(agg).forEach(item=>{
    if(!byCat[item.c]) byCat[item.c]=[];
    byCat[item.c].push(item);
  });

  let cols='';
  CAT_ORDER.forEach(cat=>{
    if(!byCat[cat]) return;
    const items=byCat[cat].sort((a,b)=>a.n.localeCompare(b.n));
    cols+=`<div class="grocery-col">
      <div class="grocery-col-header">${cat}</div>
      ${items.map(item=>{
        const k=`${item.c}|||${item.n}`;
        const ck=shopCk[k];
        return `<div class="grocery-item${ck?' checked':''}" onclick="toggleShop('${k.replace(/'/g,"\\'")}')">
          <div class="g-checkbox">${ck?'✓':''}</div>
          <div class="g-item-name">${item.n}</div>
          ${item.count>1?`<span class="g-item-multi">×${item.count}</span>`:`<span class="g-item-qty">${item.q}</span>`}
        </div>`;
      }).join('')}
    </div>`;
  });

  body.innerHTML=`<div class="selected-strip">${chips}</div><div class="grocery-columns">${cols}</div>`;
}

function toggleShop(k) { shopCk[k]=!shopCk[k]; save(); renderGrocery(); }
function clearChecked() { shopCk={}; save(); renderGrocery(); }
function clearAll() {
  if(Object.keys(sel).length&&confirm('Clear all meal selections?')) {
    sel={}; shopCk={}; save(); renderPlan(); renderGrocery(); updateMeta();
  }
}
function printList() { window.print(); }

// ─── INIT ────────────────────────────────────────────────────────
load();
renderPlan();
</script>
