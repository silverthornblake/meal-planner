<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dinner — Mar & Apr</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f0e8;--cream2:#ede7d9;--cream3:#e4dccb;
  --ink:#1a1814;--ink2:#3a3530;--ink3:#6a6358;--ink4:#9a9088;
  --rust:#b84a2e;--rust-lt:#f0e8e4;--rust-mid:rgba(184,74,46,0.12);
  --sage:#4a6650;--ochre:#c27820;--ochre-lt:#f5ede0;--gold:#d4a843;
  --border:#cec5b2;--border2:#ddd6c8;
  --nav-h:52px;--bot-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--cream);color:var(--ink);font-family:'Barlow',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}

/* ── TOP NAV ── */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--ink);z-index:200;display:flex;align-items:center;padding:0 16px;gap:10px;}
.topnav-brand{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--cream);flex:1;}
.topnav-meta{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.1em;color:rgba(245,240,232,0.45);}
.topnav-meta span{color:var(--gold);font-weight:600;}

/* ── BOTTOM BAR ── */
.botbar{position:fixed;bottom:0;left:0;right:0;height:var(--bot-h);background:var(--ink);display:flex;align-items:stretch;border-top:1px solid rgba(255,255,255,0.08);z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:rgba(245,240,232,0.38);transition:color 0.15s;padding-bottom:2px;}
.btab.active{color:var(--cream);}
.btab-icon{font-size:18px;line-height:1;}
.btab-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;}

/* ── SCROLL WRAP ── */
.page-wrap{position:fixed;top:var(--nav-h);left:0;right:0;bottom:var(--bot-h);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page-wrap::-webkit-scrollbar{display:none;}
.panel{display:none;}.panel.active{display:block;}

/* ── WEEK HEADER ── */
.week-header{padding:0 16px;position:sticky;top:0;background:var(--cream);z-index:10;border-bottom:2px solid var(--ink);}
.week-nav{display:flex;align-items:center;gap:0;padding:12px 0 10px;}
.week-nav-btn{background:none;border:1px solid var(--border);color:var(--ink3);width:34px;height:34px;border-radius:4px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.week-nav-btn:active{background:var(--cream2);}
.week-label-wrap{flex:1;text-align:center;padding:0 10px;}
.week-label{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink);line-height:1;}
.week-sublabel{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.15em;color:var(--ink4);margin-top:2px;}
.week-progress{display:flex;gap:3px;justify-content:center;margin-top:8px;padding-bottom:10px;}
.week-prog-dot{width:10px;height:10px;border-radius:50%;background:var(--border);border:1.5px solid var(--border);transition:all 0.2s;cursor:pointer;}
.week-prog-dot.done{background:var(--rust);border-color:var(--rust);}
.week-prog-dot.today{border-color:var(--rust);}

/* ── ADD NEXT WEEK BUTTON ── */
.add-week-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px 16px;padding:14px;border:1.5px dashed var(--border);border-radius:4px;cursor:pointer;background:none;font-family:'Barlow',sans-serif;font-size:13px;color:var(--ink4);letter-spacing:0.05em;transition:all 0.15s;width:calc(100% - 32px);}
.add-week-btn:active{background:var(--cream2);border-color:var(--ink3);color:var(--ink);}
.add-week-btn-icon{font-size:16px;}

/* ── WEEK SECTION ── */
.week-section{padding-bottom:4px;}
.week-section-label{padding:10px 16px 6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink4);}

/* ── DAY ROW ── */
.day-row{display:flex;align-items:center;gap:0;margin:0 16px 8px;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;background:white;transition:all 0.12s;position:relative;}
.day-row:active{transform:scale(0.985);}
.day-row.selected{border-color:var(--rust);background:var(--rust-lt);}
.day-row.today-row{border-color:var(--ink2);}
.day-col{flex-shrink:0;width:56px;padding:12px 8px;text-align:center;border-right:1px solid var(--border2);background:var(--cream2);}
.day-row.selected .day-col{background:rgba(184,74,46,0.08);border-right-color:rgba(184,74,46,0.2);}
.day-row.today-row .day-col{background:var(--ink);border-right-color:var(--ink);}
.day-dow{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);line-height:1;}
.day-row.today-row .day-dow{color:rgba(245,240,232,0.6);}
.day-num-big{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--ink);line-height:1;margin-top:2px;}
.day-row.selected .day-num-big{color:var(--rust);}
.day-row.today-row .day-num-big{color:var(--cream);}
.day-content{flex:1;padding:10px 12px;min-width:0;}
.day-empty-label{font-size:12px;color:var(--ink4);font-style:italic;}
.day-meal-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:3px;}
.day-row.selected .day-meal-name{color:var(--rust);}
.day-meal-meta{display:flex;gap:10px;flex-wrap:wrap;}
.day-meta-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--ink4);}
.day-row.selected .day-meta-pill{color:rgba(184,74,46,0.7);}
.day-arrow{padding:0 12px;font-size:14px;color:var(--ink4);flex-shrink:0;}
.day-row.selected .day-arrow{color:var(--rust);}
.day-fav-badge{position:absolute;top:6px;right:36px;font-size:10px;color:var(--gold);}
.day-today-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rust);border-radius:3px 0 0 3px;}
.day-month{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:0.1em;color:var(--ink4);margin-top:1px;text-transform:uppercase;}
.day-row.today-row .day-month{color:rgba(245,240,232,0.5);}
.day-row.cooked-row{opacity:0.65;}

/* ── REMOVE WEEK BTN ── */
.remove-week-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:4px 16px 16px;padding:8px;background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:11px;color:var(--ink4);letter-spacing:0.1em;text-transform:uppercase;transition:color 0.15s;}
.remove-week-btn:active{color:var(--rust);}

/* ── SLIDE PANEL ── */
.slide-panel{position:fixed;inset:0;z-index:300;background:var(--cream);transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;}
.slide-panel.open{transform:translateX(0);}
.slide-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px 12px;background:var(--ink);flex-shrink:0;}
.slide-back{background:none;border:none;color:rgba(245,240,232,0.7);font-size:24px;cursor:pointer;padding:2px 6px 2px 0;line-height:1;}
.slide-date{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--cream);flex:1;}
.slide-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.slide-body::-webkit-scrollbar{display:none;}

/* ── OPTION CARDS ── */
.opts-wrap{padding:12px;}
.opts-hdr{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink4);padding:4px 0 10px;}
.opt-card{border:1.5px solid var(--border);border-radius:4px;margin-bottom:10px;cursor:pointer;overflow:hidden;background:white;transition:all 0.15s;position:relative;}
.opt-card:active{transform:scale(0.985);}
.opt-card.selected{border-color:var(--rust);background:var(--rust-lt);}
.opt-top{padding:13px 44px 10px 14px;}
.opt-num{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.25em;color:var(--ink4);margin-bottom:3px;text-transform:uppercase;}
.opt-card.selected .opt-num{color:var(--rust);}
.opt-name{font-size:15px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:7px;}
.opt-card.selected .opt-name{color:var(--rust);}
.opt-stats{display:flex;gap:14px;flex-wrap:wrap;}
.stp{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--ink3);}
.stp strong{color:var(--ink);}
.opt-card.selected .stp,.opt-card.selected .stp strong{color:var(--rust);}
.opt-chk{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;background:white;transition:all 0.18s;}
.opt-card.selected .opt-chk{background:var(--rust);border-color:var(--rust);color:white;}
.opt-fav{position:absolute;top:10px;right:44px;font-size:16px;cursor:pointer;padding:4px;z-index:2;opacity:0.35;transition:all 0.15s;background:none;border:none;}
.opt-fav.on{opacity:1;}
.opt-divider{height:1px;background:var(--cream2);margin:0 14px;}
.opt-ings{padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:4px;}
.ing-chip{font-size:10px;color:var(--ink3);background:var(--cream2);border:1px solid var(--border2);padding:2px 7px;border-radius:2px;}
.opt-card.selected .ing-chip{background:var(--rust-lt);border-color:rgba(184,74,46,0.2);color:var(--rust);}

/* ── RECIPE VIEW ── */
.recipe-wrap{padding-bottom:32px;}
.recipe-hero{background:var(--ink);padding:16px 16px 14px;position:relative;}
.recipe-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:rgba(245,240,232,0.4);margin-bottom:4px;}
.recipe-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--cream);letter-spacing:0.03em;line-height:1.15;padding-right:42px;}
.recipe-fav{position:absolute;top:14px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;opacity:0.4;transition:all 0.18s;}
.recipe-fav.on{opacity:1;}
.recipe-stats{display:flex;border-bottom:1px solid var(--border);}
.rstat{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border);}
.rstat:last-child{border-right:none;}
.rstat-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--ink);line-height:1;}
.rstat-lbl{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink4);margin-top:2px;}
.diff-pips{display:flex;gap:2px;justify-content:center;margin-top:3px;}
.pip{width:16px;height:3px;border-radius:1px;background:var(--cream3);}
.pip.on{background:var(--ink2);}
.recipe-sec{padding:14px 16px 0;}
.recipe-sec-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--ink);}
.ing-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border2);}
.ing-row:last-child{border-bottom:none;}
.ing-name{font-size:13px;color:var(--ink2);}
.ing-qty{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--ink4);}
.step-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border2);align-items:flex-start;}
.step-row:last-child{border-bottom:none;}
.step-n{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--cream3);line-height:1;flex-shrink:0;min-width:26px;}
.step-body{flex:1;}
.step-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.step-text{font-size:12px;color:var(--ink3);line-height:1.6;}
.step-time{display:inline-block;margin-top:5px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ochre);background:var(--ochre-lt);padding:2px 7px;border-radius:2px;}

/* ── LOADING RECIPE ── */
.recipe-loading{padding:40px 24px;text-align:center;}
.recipe-loading-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:8px;text-transform:uppercase;}
.recipe-loading-sub{font-size:12px;color:var(--ink4);margin-bottom:32px;}
.skeleton{background:linear-gradient(90deg,var(--cream2) 25%,var(--cream3) 50%,var(--cream2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:3px;margin-bottom:10px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── CHANGE OPTIONS BTN ── */
.change-opts-btn{margin:16px 16px 0;display:flex;align-items:center;justify-content:center;gap:8px;background:none;border:1.5px solid var(--border);color:var(--ink3);padding:12px;border-radius:4px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;width:calc(100% - 32px);transition:all 0.15s;}
.change-opts-btn:active{background:var(--cream2);}

/* ── SELECTED BAR ── */
.sel-bar{margin:12px 16px 0;background:var(--rust);color:white;border-radius:4px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.sel-bar-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;opacity:0.75;margin-bottom:2px;}
.sel-bar-name{font-size:13px;font-weight:500;}
.sel-bar-rm{background:none;border:none;color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;padding:0 0 0 8px;line-height:1;}

/* ── GROCERY TAB ── */
.groc-toolbar{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
.groc-h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.groc-sub{font-size:11px;color:var(--ink4);margin-top:2px;letter-spacing:0.08em;}
.groc-actions{display:flex;gap:8px;margin-top:10px;}
.g-btn{background:none;border:1px solid var(--border);color:var(--ink3);padding:7px 14px;border-radius:2px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.15s;flex:1;}
.g-btn:active{background:var(--cream2);}
.groc-empty{text-align:center;padding:60px 24px;}
.groc-empty-h{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;}
.groc-empty-p{font-size:13px;color:var(--ink4);line-height:1.6;}
.meal-chips{padding:12px 16px;border-bottom:1px solid var(--border2);}
.meal-chip-row{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--border2);}
.meal-chip-row:last-child{border-bottom:none;}
.chip-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;color:var(--rust);text-transform:uppercase;min-width:48px;}
.chip-name{font-size:12px;color:var(--ink3);}
.groc-sec{padding:14px 16px 0;}
.groc-sec-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--ink);}
.groc-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border2);cursor:pointer;transition:opacity 0.15s;}
.groc-item:last-child{border-bottom:none;}
.groc-item.ckd{opacity:0.35;}
.g-cb{width:17px;height:17px;flex-shrink:0;border:1.5px solid var(--border);border-radius:2px;background:white;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all 0.15s;margin-top:1px;}
.groc-item.ckd .g-cb{background:var(--sage);border-color:var(--sage);color:white;}
.groc-item-r{flex:1;min-width:0;}
.groc-item-name{font-size:13px;color:var(--ink2);margin-bottom:2px;}
.groc-item.ckd .groc-item-name{text-decoration:line-through;color:var(--ink4);}
.groc-item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.groc-qty{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--ink4);}
.groc-multi{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;background:var(--ochre-lt);color:var(--ochre);padding:1px 5px;border-radius:2px;letter-spacing:0.1em;}
.groc-for{font-size:10px;color:var(--rust);font-style:italic;}
.groc-save-btn{background:none;border:none;font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink4);cursor:pointer;padding:2px 0 2px 6px;flex-shrink:0;transition:color 0.15s;}
.groc-save-btn:active{color:var(--ochre);}
.groc-saved-header{display:flex;align-items:center;gap:8px;cursor:pointer;padding:14px 16px 8px;border-top:1px solid var(--border2);}
.groc-saved-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink4);}
.groc-saved-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;background:var(--cream3);color:var(--ink4);padding:1px 7px;border-radius:10px;}
.groc-saved-chevron{font-size:10px;color:var(--ink4);margin-left:auto;transition:transform 0.2s;}
.groc-saved-chevron.open{transform:rotate(180deg);}
.groc-item.saved-later{opacity:0.5;}
.groc-item.saved-later .groc-save-btn{color:var(--rust);}
.share-btn{background:var(--ink);color:var(--cream);border:none;padding:7px 14px;border-radius:2px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.15s;flex:1;}
.share-btn:active{background:var(--ink2);}
/* ── SYNC ── */
.sync-indicator{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.1em;color:rgba(245,240,232,0.45);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--sage);flex-shrink:0;transition:background 0.3s;}
.sync-dot.syncing{background:var(--ochre);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--rust);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* ── FAVORITES TAB ── */
.favs-toolbar{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
.favs-h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.favs-sub{font-size:11px;color:var(--ink4);margin-top:2px;}
.favs-empty{text-align:center;padding:60px 24px;}
.favs-empty-h{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;}
.favs-empty-p{font-size:13px;color:var(--ink4);line-height:1.6;}
.fav-card{border:1.5px solid var(--border);border-radius:4px;background:white;margin:0 16px 10px;overflow:hidden;cursor:pointer;}
.fav-card-top{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px;}
.fav-body{flex:1;}
.fav-cuisine{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--rust);margin-bottom:3px;}
.fav-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:6px;}
.fav-stats{display:flex;gap:12px;}
.fav-stat{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--ink3);}
.fav-stat strong{color:var(--ink);}
.fav-rm{background:none;border:none;font-size:18px;cursor:pointer;color:var(--gold);padding:2px;flex-shrink:0;}

/* ── RECIPE SWAP NAV ── */
.recipe-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border2);background:var(--cream2);}
.recipe-nav-btn{background:none;border:1.5px solid var(--border);border-radius:4px;padding:6px 14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.1em;color:var(--ink3);transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.recipe-nav-btn:active{background:var(--cream3);}
.recipe-nav-btn:disabled{opacity:0.25;cursor:default;}
.recipe-nav-pos{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.2em;color:var(--ink4);text-transform:uppercase;}

/* ── RECIPE NOTES ── */
.recipe-notes-wrap{padding:14px 16px 0;}
.recipe-notes-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px;}
.recipe-notes-input{width:100%;border:1.5px solid var(--border);border-radius:4px;padding:10px 12px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--ink);background:white;resize:none;min-height:64px;line-height:1.5;outline:none;transition:border-color 0.15s;-webkit-appearance:none;}
.recipe-notes-input:focus{border-color:var(--ink3);}
.recipe-notes-input::placeholder{color:var(--ink4);}
.recipe-notes-saved{font-size:10px;color:var(--sage);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.15em;margin-top:4px;height:14px;}

/* ── DAY QUIP ── */
.day-quip{font-size:11px;color:var(--ink4);font-style:italic;margin-top:3px;line-height:1.3;}


.serving-row{display:flex;align-items:center;gap:0;padding:12px 16px;border-bottom:1px solid var(--border2);}
.serving-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink4);flex:1;}
.serving-btns{display:flex;gap:6px;}
.serving-btn{background:none;border:1.5px solid var(--border);border-radius:4px;color:var(--ink3);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.1em;padding:5px 13px;cursor:pointer;transition:all 0.15s;}
.serving-btn.active{background:var(--rust);border-color:var(--rust);color:white;}
.serving-btn:active{transform:scale(0.95);}

/* ── REFRESH BUTTON ── */
.opts-refresh-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 0 12px;width:100%;background:none;border:1.5px dashed var(--border);border-radius:4px;padding:10px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;color:var(--ink4);letter-spacing:0.08em;transition:all 0.15s;}
.opts-refresh-btn:active{background:var(--cream2);color:var(--ink);}
.opts-refresh-btn svg{flex-shrink:0;}

/* ── MEAL-LEVEL SAVE FOR LATER (grocery) ── */
.meal-save-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);}
.meal-save-row:last-child{border-bottom:none;}
.meal-save-cb{width:18px;height:18px;flex-shrink:0;border:1.5px solid var(--border);border-radius:3px;background:white;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;cursor:pointer;transition:all 0.15s;}
.meal-save-cb.on{background:var(--ochre);border-color:var(--ochre);color:white;}
.meal-save-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;color:var(--rust);text-transform:uppercase;min-width:48px;}
.meal-save-name{font-size:12px;color:var(--ink3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.meal-save-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink4);}
.recipe-actions{display:flex;gap:10px;padding:14px 16px 0;margin-top:4px;}
.recipe-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 12px;border-radius:4px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;border:1.5px solid var(--border);background:white;color:var(--ink3);transition:all 0.15s;}
.recipe-action-btn:active{transform:scale(0.97);}
.recipe-action-btn.cooked{background:var(--sage-lt);border-color:var(--sage);color:var(--sage);}
.recipe-action-btn.remove{background:var(--rust-lt);border-color:var(--rust);color:var(--rust);}
.recipe-action-btn svg{flex-shrink:0;}

/* ── PROG SUMMARY ── */
.week-prog-summary{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.1em;color:var(--ink4);white-space:nowrap;}
.week-prog-summary span{color:var(--rust);font-weight:700;}

/* ── WEEK DIVIDER ── */
.week-divider{padding:14px 16px 6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink4);border-top:1px solid var(--border2);margin-top:4px;}

/* ── STATS TAB ── */
.stats-toolbar{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
.stats-h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.stats-sub{font-size:11px;color:var(--ink4);margin-top:2px;}
.stats-empty{text-align:center;padding:60px 24px;}
.stats-empty-h{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;}
.stats-empty-p{font-size:13px;color:var(--ink4);line-height:1.6;}
.stats-body{padding:0 0 40px;}

/* stat section */
.stat-section{padding:14px 16px 0;}
.stat-section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--ink);}

/* big number cards row */
.stat-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
.stat-card{background:white;border:1.5px solid var(--border);border-radius:6px;padding:14px 14px 12px;}
.stat-card-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;color:var(--rust);line-height:1;}
.stat-card-unit{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:400;color:var(--ink4);margin-left:2px;}
.stat-card-lbl{font-size:11px;color:var(--ink3);margin-top:4px;letter-spacing:0.05em;}
.stat-card-sub{font-size:10px;color:var(--ink4);margin-top:2px;}

/* bar chart rows */
.bar-rows{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{font-size:12px;color:var(--ink2);min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:8px;background:var(--cream2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
.bar-val{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--ink4);min-width:28px;text-align:right;letter-spacing:0.05em;}

/* ingredient chips */
.ing-freq-grid{display:flex;flex-wrap:wrap;gap:6px;}
.ing-freq-chip{display:flex;align-items:center;gap:5px;background:white;border:1.5px solid var(--border);border-radius:20px;padding:5px 10px 5px 8px;font-size:12px;color:var(--ink2);}
.ing-freq-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;background:var(--rust);color:white;border-radius:8px;padding:1px 5px;letter-spacing:0.05em;}

/* ── COOKED HISTORY ── */
.history-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:14px 16px 10px;border-top:1px solid var(--border2);margin-top:4px;background:none;border-left:none;border-right:none;border-bottom:none;width:100%;text-align:left;}
.history-toggle-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink);}
.history-toggle-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;background:var(--sage);color:white;padding:2px 8px;border-radius:10px;font-weight:700;}
.history-toggle-chevron{font-size:11px;color:var(--ink4);margin-left:auto;transition:transform 0.2s;}
.history-toggle-chevron.open{transform:rotate(180deg);}
.history-card{background:white;border:1.5px solid var(--border);border-radius:4px;margin:0 16px 8px;overflow:hidden;}
.history-card-top{padding:12px 14px 10px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;}
.history-card-body{flex:1;}
.history-card-date{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--rust);margin-bottom:3px;}
.history-card-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:5px;}
.history-card-meta{display:flex;gap:10px;}
.history-card-stat{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--ink3);}
.history-card-note{padding:0 14px 12px;font-size:12px;color:var(--ink3);font-style:italic;line-height:1.5;border-top:1px solid var(--border2);padding-top:10px;}
.history-card-action{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border2);background:var(--cream2);}
.history-card-btn{background:var(--rust);color:white;border:none;padding:7px 14px;border-radius:3px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;}

/* ── ASSIGN TO DAY SHEET ── */
.assign-overlay{position:fixed;inset:0;background:rgba(26,24,20,0.7);z-index:400;display:flex;align-items:flex-end;justify-content:center;}
.assign-sheet{background:var(--cream);border-radius:12px 12px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;}
.assign-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink);margin-bottom:4px;}
.assign-sub{font-size:12px;color:var(--ink4);margin-bottom:16px;}
.assign-day-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.assign-day-btn{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1.5px solid var(--border);border-radius:4px;background:white;cursor:pointer;text-align:left;transition:all 0.15s;}
.assign-day-btn:active{background:var(--cream2);}
.assign-day-btn.taken{opacity:0.45;cursor:not-allowed;border-style:dashed;}
.assign-day-date{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--rust);letter-spacing:0.05em;}
.assign-day-status{font-size:11px;color:var(--ink4);font-style:italic;}
.assign-cancel{width:100%;background:none;border:1.5px solid var(--border);padding:11px;border-radius:4px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;color:var(--ink3);letter-spacing:0.08em;text-transform:uppercase;}

/* streak */
.streak-display{display:flex;align-items:center;gap:16px;background:white;border:1.5px solid var(--border);border-radius:6px;padding:16px;}
.streak-num{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:700;color:var(--rust);line-height:1;}
.streak-body{}
.streak-lbl{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.streak-sub{font-size:11px;color:var(--ink4);}

/* diff breakdown */
.diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.diff-chip{background:white;border:1.5px solid var(--border);border-radius:6px;padding:12px 10px;text-align:center;}
.diff-chip-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--ink);line-height:1;}
.diff-chip-lbl{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink4);margin-top:3px;}

.stat-section + .stat-section{margin-top:8px;}
@keyframes popIn{0%{transform:scale(0.5);}70%{transform:scale(1.25);}100%{transform:scale(1);}}
.opt-chk.pop{animation:popIn 0.22s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.recipe-wrap{animation:fadeUp 0.22s ease;}
</style>
</head>

const RECIPE_STEPS = {"Miso-Glazed Cod with Sesame Bok Choy":[{"title":"Cook brown rice","text":"Rinse rice and combine with 2 cups water. Bring to a boil, reduce to low, cover and cook 30 min. Remove from heat and steam 5 min.","time":"35 min"},{"title":"Make miso glaze","text":"Whisk miso paste, mirin, sake, and sesame oil until completely smooth. Reserve 2 tbsp for basting.","time":null},{"title":"Marinate cod","text":"Pat cod completely dry \u2014 critical for the glaze to adhere. Coat all sides generously with glaze. Rest 15 min at room temperature.","time":"15 min"},{"title":"Broil the cod","text":"Preheat broiler to high. Place cod on a foil-lined baking sheet. Broil 6\u20138 min, basting once at the 4-minute mark. Watch closely \u2014 miso sugars burn fast.","time":"8 min"},{"title":"Sear bok choy","text":"Heat a skillet over high heat until smoking. Sear bok choy cut-side down without moving 2\u20133 min until caramelized, then flip for 1 min.","time":"4 min"},{"title":"Plate","text":"Scoop rice into bowls, add bok choy alongside, and place cod on top. Scatter sesame seeds and drizzle with sesame oil.","time":null}],"Harissa Salmon with Roasted Chickpeas":[{"title":"Roast chickpeas","text":"Drain and thoroughly pat chickpeas dry. Toss with olive oil, smoked paprika, and salt. Roast at 425\u00b0F for 25\u201330 min, shaking pan halfway.","time":"30 min"},{"title":"Marinate salmon","text":"Coat salmon fillets all over with harissa paste. Marinate while chickpeas roast \u2014 minimum 15 min.","time":"15 min"},{"title":"Make yogurt sauce","text":"Mix Greek yogurt with lemon juice, lemon zest, minced garlic, and salt. Refrigerate until serving.","time":null},{"title":"Sear salmon","text":"Heat an oven-safe skillet over high heat. Sear salmon skin-side down 3\u20134 min. Transfer to 400\u00b0F oven for 5\u20136 min until just cooked through.","time":"10 min"},{"title":"Plate","text":"Spoon yogurt sauce onto plate, place salmon on top, scatter crispy chickpeas around. Finish with fresh parsley and lemon.","time":null}],"Lamb Kofta Bowls with Tabbouleh":[{"title":"Soak bulgur","text":"Pour 1.5 cups boiling water over bulgur. Cover and let absorb 20\u201325 min until tender. Fluff with a fork and cool.","time":"25 min"},{"title":"Make tabbouleh","text":"Finely chop parsley. Combine with cooled bulgur, diced tomatoes, diced cucumber, lemon juice, and olive oil. Season generously.","time":null},{"title":"Mix kofta","text":"Combine ground lamb with minced garlic, cumin, coriander, chopped parsley, salt, and pepper. Form into oval patties or cylinders.","time":null},{"title":"Make tzatziki","text":"Mix Greek yogurt with grated squeezed-dry cucumber, minced garlic, lemon juice, and salt.","time":null},{"title":"Cook kofta","text":"Grill or pan-sear kofta over high heat 3\u20134 min per side until charred outside and just cooked through.","time":"8 min"},{"title":"Assemble bowls","text":"Add tabbouleh to bowls, place kofta on top, and spoon tzatziki alongside. Serve with warm pita if desired.","time":null}],"Chicken Thighs with Cherry Pan Sauce":[{"title":"Season chicken","text":"Pat chicken thighs completely dry. Season aggressively with salt and pepper on both sides.","time":null},{"title":"Render skin","text":"Place thighs skin-side down in a cold oven-safe skillet. Turn heat to medium. Cook undisturbed 12\u201315 min until skin is deeply golden.","time":"15 min"},{"title":"Finish in oven","text":"Flip thighs and transfer skillet to 400\u00b0F oven for 15\u201318 min until 165\u00b0F internal. Rest 5 min.","time":"18 min"},{"title":"Make cherry pan sauce","text":"Remove chicken. Saut\u00e9 shallots and garlic 2 min. Add red wine and scrape up fond. Add stock and dried cherries. Simmer 5 min.","time":"8 min"},{"title":"Finish sauce","text":"Swirl cold butter into sauce off heat until glossy. Season well. Plate chicken and spoon cherry sauce over.","time":null}],"Shrimp with Corn Pur\u00e9e & Crispy Bacon":[{"title":"Make corn pur\u00e9e","text":"Saut\u00e9 shallots in butter 3 min, add corn kernels and cook 5 min. Add cream and simmer 3 min. Blend until silky smooth. Keep warm.","time":"15 min"},{"title":"Crisp the bacon","text":"Cook bacon in a dry skillet over medium heat until very crispy. Remove and reserve the fat.","time":"6 min"},{"title":"Sear shrimp","text":"Pat shrimp completely dry. Season with salt and pepper. Get the bacon pan screaming hot. Sear shrimp 1.5\u20132 min without moving, flip and cook 1 min more.","time":"4 min"},{"title":"Plate","text":"Spoon corn pur\u00e9e into bowls, arrange shrimp on top, crumble crispy bacon over everything. Finish with lemon.","time":null}],"Braised Chicken Thighs with White Beans & Kale":[{"title":"Brown the chicken","text":"Season thighs well. Heat olive oil over medium-high and brown skin-side down 6\u20138 min until golden. Flip and cook 2 min. Remove.","time":"10 min"},{"title":"Build the braise","text":"Saut\u00e9 garlic 1 min. Add tomatoes and stock, scraping up fond. Tuck in rosemary and return chicken skin-side up.","time":null},{"title":"Braise","text":"Cover and simmer over low heat 35\u201340 min until chicken is very tender.","time":"40 min"},{"title":"Add beans and kale","text":"Add drained beans and torn kale to the pot. Cook uncovered 5\u20137 min until kale wilts. Season generously.","time":"7 min"},{"title":"Serve","text":"Ladle into deep bowls. Drizzle with olive oil and serve with crusty bread.","time":null}],"Salmon with Salsa Verde & Roasted Potatoes":[{"title":"Roast potatoes","text":"Cut potatoes into wedges. Toss with olive oil, salt, and pepper. Roast at 425\u00b0F for 35 min, flipping halfway, until golden and crispy.","time":"35 min"},{"title":"Make salsa verde","text":"Finely chop parsley, capers, anchovies, and garlic until almost paste-like. Combine with olive oil and lemon. Should be punchy.","time":null},{"title":"Sear salmon","text":"Pat salmon dry. Season well. Sear skin-side down in a hot oiled skillet 4\u20135 min until skin is crispy. Flip and cook 2 min.","time":"7 min"},{"title":"Plate","text":"Arrange roasted potatoes, place salmon alongside, and spoon salsa verde generously over the fish.","time":null}],"Beef Tenderloin with Mushroom Bordelaise":[{"title":"Season and rest beef","text":"Season tenderloin very generously with salt and pepper 30 min before cooking. Pat completely dry.","time":"30 min"},{"title":"Sear","text":"Heat cast iron until smoking. Sear tenderloin 2\u20133 min per side all around until deeply browned on every surface.","time":"10 min"},{"title":"Roast to temperature","text":"Transfer to 425\u00b0F oven 8\u201310 min for medium-rare (130\u00b0F internal). Rest 10 min under loose foil.","time":"10 min"},{"title":"Saut\u00e9 mushrooms","text":"Sear mushrooms in butter over high heat without stirring until golden brown. Season well.","time":"6 min"},{"title":"Make bordelaise","text":"In beef pan, saut\u00e9 shallots 2 min. Add red wine, reduce by 2/3. Add stock and thyme, simmer 10 min. Strain, swirl in cold butter.","time":"15 min"},{"title":"Plate","text":"Slice tenderloin against the grain. Fan on plate with mushrooms. Spoon bordelaise over everything.","time":null}],"Shrimp & Grits with Andouille":[{"title":"Cook grits","text":"Bring 2 cups stock and 2 cups water to a boil. Whisk in grits. Reduce, cover, cook 20\u201325 min stirring occasionally. Finish with butter and cheddar.","time":"25 min"},{"title":"Brown andouille","text":"Slice andouille into coins. Brown in skillet over medium-high 3\u20134 min until caramelized. Remove.","time":"5 min"},{"title":"Cook vegetables","text":"In the same pan, saut\u00e9 diced onion and bell peppers 5\u20136 min until soft. Add garlic and cook 1 min.","time":"7 min"},{"title":"Cook shrimp","text":"Push vegetables to the sides. Add shrimp to the center and cook 1\u20132 min per side until pink. Return andouille and toss.","time":"4 min"},{"title":"Plate","text":"Spoon creamy grits into bowls. Top with the shrimp and andouille mixture. Finish with hot sauce.","time":null}],"Whole Roasted Chicken with Lemon & Herbs":[{"title":"Dry brine","text":"Pat chicken completely dry inside and out. Let sit at room temperature 30 min \u2014 critical for crispy skin.","time":"30 min"},{"title":"Butter under skin","text":"Mix softened butter with minced rosemary, thyme, garlic, lemon zest, salt, and pepper. Rub under skin and all over outside. Stuff cavity with lemon halves.","time":null},{"title":"Prepare vegetables","text":"Cut potatoes into chunks and carrots into large pieces. Toss with olive oil and season. Spread in roasting pan.","time":null},{"title":"Roast","text":"Set chicken on top of vegetables. Roast at 425\u00b0F for 50\u201360 min until skin is deep golden and juices run clear (165\u00b0F at thigh joint).","time":"60 min"},{"title":"Rest and carve","text":"Rest 10 min minimum before carving. Carve and serve over roasted vegetables.","time":"10 min"}],"Spiced Lamb with Pomegranate & Couscous":[{"title":"Season and sear lamb","text":"Rub lamb all over with ras el hanout and salt. Sear in a heavy pot over high heat, browning all sides deeply, about 8\u201310 min total.","time":"10 min"},{"title":"Braise","text":"Add diced onion, garlic, stock, and pomegranate molasses. Bring to a simmer, cover, cook in 325\u00b0F oven 1.5\u20132 hours until very tender.","time":"90 min"},{"title":"Make couscous","text":"Bring 1.5 cups stock to a boil. Pour over couscous, cover tightly, steam 5 min. Fluff and season with olive oil.","time":null},{"title":"Serve","text":"Shred or slice lamb. Serve over couscous with braising juices, torn fresh mint, and a drizzle of pomegranate molasses.","time":null}],"Cod with Brown Butter & Capers":[{"title":"Blanch asparagus","text":"Blanch asparagus in boiling salted water 2\u20133 min until bright green. Drain and toss with butter and salt.","time":"4 min"},{"title":"Sear cod","text":"Pat fillets completely dry. Season both sides. Heat oil over high heat. Sear cod 3\u20134 min per side until golden and opaque.","time":"8 min"},{"title":"Brown butter","text":"Add butter to the hot pan. Cook over medium heat swirling constantly until golden brown and nutty \u2014 about 3 min. Add capers; they'll sputter.","time":"3 min"},{"title":"Plate","text":"Add lemon juice to the brown butter. Plate asparagus, place cod on top, spoon brown butter and capers over, finish with parsley.","time":null}],"Short Rib Tacos with Pickled Onion":[{"title":"Quick-pickle onions","text":"Thinly slice red onion and combine with red wine vinegar, a pinch of sugar, and salt. Let sit at least 30 min.","time":"30 min"},{"title":"Braise short ribs","text":"Season ribs aggressively. Sear all sides in a heavy pot. Add chipotle, cumin, and enough water to come halfway up ribs. Braise covered at 325\u00b0F for 2.5\u20133 hours.","time":"180 min"},{"title":"Make salsa verde","text":"Char tomatillos and jalape\u00f1os under the broiler until blistered. Blend with cilantro, garlic, lime juice, and salt.","time":"10 min"},{"title":"Shred and crisp","text":"Remove ribs and shred meat off bones. Spread on a foil-lined baking sheet and broil 5 min to crisp the edges.","time":"5 min"},{"title":"Assemble tacos","text":"Char tortillas directly over flame. Double-stack, add short rib, pickled onion, salsa verde, and fresh cilantro. Lime on the side.","time":null}],"Red Snapper with Fennel, Orange & Olives":[{"title":"Roast fennel","text":"Slice fennel thinly. Toss with olive oil, salt, and pepper. Roast at 400\u00b0F for 20\u201325 min until tender and caramelized.","time":"25 min"},{"title":"Make orange salad","text":"Supreme the oranges \u2014 cut off peel and pith, then slice between membranes. Toss with shallots, olives, and dill.","time":null},{"title":"Sear snapper","text":"Pat fillets very dry. Season well. Sear skin-side down pressing gently for the first 30 seconds. Cook 4\u20135 min, flip for 1\u20132 min.","time":"7 min"},{"title":"Plate","text":"Arrange roasted fennel, place snapper on top skin-side up, and spoon orange and olive salad over and around.","time":null}],"Mushroom Risotto with Truffle Oil":[{"title":"Warm stock","text":"Keep stock at a gentle simmer throughout. Adding cold stock shocks the rice.","time":null},{"title":"Saut\u00e9 mushrooms separately","text":"Cook mushrooms in butter over high heat without crowding until deeply golden. Season and set aside \u2014 they go in at the end.","time":"8 min"},{"title":"Toast the rice","text":"Saut\u00e9 shallots and garlic in butter until soft. Add arborio and toast 2 min until edges turn translucent. Add white wine and stir until absorbed.","time":"5 min"},{"title":"Build the risotto","text":"Add warm stock one ladle at a time, stirring constantly, waiting for each addition to absorb before adding more. Takes 20\u201322 min total.","time":"22 min"},{"title":"Finish","text":"Off heat, stir in cold butter and parmesan vigorously \u2014 this is the mantecatura that creates the creamy texture. Fold in mushrooms. Finish with a few drops of truffle oil.","time":null}],"Grilled Lamb Chops with Chimichurri":[{"title":"Cook farro","text":"Cook farro in well-salted boiling water 25\u201330 min until tender with slight chew. Drain and toss with olive oil while warm.","time":"30 min"},{"title":"Make chimichurri","text":"Finely chop parsley, oregano, and garlic. Combine with red wine vinegar, olive oil, minced shallots, and red pepper flakes. Season well. Best made 30 min ahead.","time":null},{"title":"Season and grill chops","text":"Season lamb chops aggressively. Grill over high heat 3\u20134 min per side for medium-rare \u2014 lamb should still be pink inside.","time":"8 min"},{"title":"Rest and serve","text":"Rest chops 3\u20134 min. Serve over farro with chimichurri spooned generously over the top.","time":null}],"Miso Butter Salmon with Edamame Rice":[{"title":"Cook jasmine rice","text":"Cook rice per package instructions. With 5 min left, stir in thawed frozen edamame.","time":"20 min"},{"title":"Make miso butter","text":"Blend softened butter with white miso paste until completely smooth and uniform.","time":null},{"title":"Sear salmon","text":"Pat salmon dry and season with pepper only \u2014 miso provides the salt. Sear skin-side down in a hot pan 4\u20135 min until crispy. Flip and cook 2\u20133 min.","time":"8 min"},{"title":"Glaze under broiler","text":"Spread miso butter over salmon. Broil 2\u20133 min until caramelized and glossy.","time":"3 min"},{"title":"Plate","text":"Stir sesame oil and soy sauce into the edamame rice. Plate rice, place salmon on top, scatter sliced scallions.","time":null}],"Chicken Piccata with Angel Hair":[{"title":"Cook pasta","text":"Cook angel hair in well-salted water 3\u20134 min. Reserve 1 cup pasta water. Toss with olive oil.","time":"5 min"},{"title":"Dredge and sear chicken","text":"Season chicken with salt and pepper. Dredge lightly in flour and shake off excess. Cook in butter and oil over medium-high 3\u20134 min per side until golden. Remove.","time":"8 min"},{"title":"Make piccata sauce","text":"Add white wine to pan and reduce by half. Add stock, lemon juice, and capers. Simmer 3 min. Swirl in cold butter until glossy.","time":"5 min"},{"title":"Blanch broccolini","text":"Add broccolini to pasta water in last 2 min of cooking, or blanch separately until bright and just tender.","time":"3 min"},{"title":"Plate","text":"Twirl pasta with broccolini into bowls. Add chicken. Spoon piccata sauce over everything. Lemon slices and parsley to finish.","time":null}],"Pork Belly Kimchi Fried Rice":[{"title":"Render pork belly","text":"Slice pork belly into bite-sized pieces. Cook in a wok over high heat 8\u201310 min until deeply caramelized and fat has rendered. Remove.","time":"10 min"},{"title":"Fry kimchi","text":"In the same pan with pork fat, add kimchi and gochujang. Cook over high heat 3\u20134 min until kimchi starts to caramelize.","time":"4 min"},{"title":"Add rice","text":"Add cold day-old rice \u2014 cold is essential. Break up clumps and stir-fry over high heat 3\u20134 min until slightly crispy.","time":"4 min"},{"title":"Season and finish","text":"Add soy sauce, sesame oil, and half the scallions. Toss to combine. Return pork belly.","time":null},{"title":"Fried eggs and serve","text":"Fry eggs separately \u2014 a runny yolk is strongly recommended. Top each bowl with fried egg, remaining scallions, and sesame oil.","time":"3 min"}],"Wild Mushroom Pasta with Crispy Bacon":[{"title":"Render bacon and crisp sage","text":"Dice bacon and cook until very crispy. Remove. Add sage leaves to the fat and fry until crispy. Remove both.","time":"8 min"},{"title":"Sear mushrooms","text":"In the same pan over high heat, cook mushrooms in batches \u2014 never crowd them. Don't stir for 2\u20133 min to develop color. Season well.","time":"8 min"},{"title":"Cook pasta","text":"Cook pappardelle in well-salted water until al dente. Reserve 1 cup pasta water.","time":"8 min"},{"title":"Build sauce","text":"Add garlic to mushrooms, cook 1 min. Add wine and reduce. Add pasta and a splash of pasta water. Toss vigorously.","time":"3 min"},{"title":"Plate","text":"Divide pasta into bowls. Top with crispy bacon, sage leaves, and generous pecorino.","time":null}],"Salmon Ni\u00e7oise with Haricots Verts":[{"title":"Cook potatoes","text":"Boil potato slices in salted water 8\u201310 min until tender. Drain and while still warm, toss with a splash of red wine vinegar.","time":"10 min"},{"title":"Soft-boil eggs","text":"Lower eggs into boiling water for exactly 7 minutes. Transfer immediately to an ice bath. Peel when cool for jammy yolks.","time":"7 min"},{"title":"Blanch green beans","text":"Blanch green beans in boiling salted water 2\u20133 min. Transfer immediately to an ice bath to preserve color.","time":"3 min"},{"title":"Make vinaigrette","text":"Whisk together Dijon mustard, red wine vinegar, and olive oil. Season aggressively.","time":null},{"title":"Sear salmon","text":"Season salmon well. Sear in an extremely hot dry pan 2\u20133 min per side. The center should remain medium.","time":"5 min"},{"title":"Compose","text":"Arrange potatoes, green beans, tomatoes, olives, and egg halves on a platter. Flake salmon on top. Drizzle vinaigrette over everything.","time":null}],"Braised Short Ribs with Creamy Polenta":[{"title":"Brown short ribs","text":"Season ribs aggressively. Brown all sides in a Dutch oven over high heat until deeply caramelized \u2014 3\u20134 min per side. Don't rush it.","time":"15 min"},{"title":"Build the braise","text":"Remove ribs. Cook mirepoix 5 min. Add garlic, wine, scraping fond. Add stock and thyme. Return ribs \u2014 liquid halfway up.","time":"8 min"},{"title":"Braise","text":"Cover and cook in 325\u00b0F oven for 2.5\u20133 hours until meat is fork-tender and falling off the bone.","time":"180 min"},{"title":"Cook polenta","text":"Bring 4 cups water and 1 cup milk to boil. Whisk in polenta. Cook over low heat 20\u201325 min stirring often. Finish with butter and parmesan.","time":"25 min"},{"title":"Reduce and serve","text":"Skim fat from braising liquid. Simmer on stovetop 10 min until glossy. Spoon polenta into bowls, add rib meat, ladle sauce over.","time":null}],"Thai Basil Shrimp with Jasmine Rice":[{"title":"Cook jasmine rice","text":"Cook rice per package instructions and keep warm.","time":"18 min"},{"title":"Mise en place","text":"Mince garlic, slice chiles (remove seeds for less heat). Have basil ready \u2014 it goes in at the very last second.","time":null},{"title":"Stir-fry","text":"Get wok screaming hot. Add oil, garlic, and chiles. Stir-fry 30 seconds. Add shrimp in a single layer and cook 1 min without touching.","time":"2 min"},{"title":"Sauce it","text":"Flip shrimp. Add oyster sauce, fish sauce, and a small splash of water. Toss to coat. Cook 1\u20132 min more.","time":"2 min"},{"title":"Add basil and serve","text":"Kill the heat. Add Thai basil and toss just until wilted from residual heat \u2014 about 20 seconds. Serve immediately over jasmine rice.","time":null}],"Roasted Rack of Lamb with Mint Gremolata":[{"title":"Season and rest","text":"Remove rack from fridge 40 min before cooking. Season all over with salt and pepper.","time":"40 min"},{"title":"Make herb crust and gremolata","text":"Combine panko, minced rosemary, garlic, lemon zest, and olive oil for the crust. Separately combine fresh mint, garlic, and lemon zest for the gremolata.","time":null},{"title":"Sear the rack","text":"Heat an oven-safe skillet over high heat. Sear meaty side down 3\u20134 min until golden brown.","time":"4 min"},{"title":"Crust and roast","text":"Brush seared side with Dijon mustard. Press herb crust firmly on. Roast at 400\u00b0F for 20\u201325 min for medium-rare (130\u00b0F). Rest 8 min.","time":"25 min"},{"title":"Carve and serve","text":"Cut between the ribs. Fan on a plate and scatter mint gremolata over the top.","time":null}],"Butter Chicken with Garlic Naan":[{"title":"Marinate chicken","text":"Mix yogurt with half the garam masala, turmeric, garlic, ginger, and salt. Coat chicken and marinate at least 30 min.","time":"30 min"},{"title":"Char the chicken","text":"Cook marinated chicken in a very hot pan or under the broiler until lightly charred on the outside. It finishes in the sauce.","time":"8 min"},{"title":"Build the sauce","text":"In the same pan, cook butter with garlic and ginger 2 min. Add remaining spices and cook 1 min. Add tomatoes and simmer 15 min until thick.","time":"20 min"},{"title":"Blend and finish","text":"Blend sauce until very smooth. Return to pot. Add cream and chicken. Simmer 10\u201312 min. Add a pinch more garam masala at the end.","time":"12 min"},{"title":"Serve","text":"Serve over basmati rice with naan brushed with garlic butter on the side.","time":null}],"Red Snapper with Romesco & Charred Broccoli":[{"title":"Make romesco","text":"Toast almonds in a dry pan until golden. Blend roasted peppers, almonds, garlic, smoked paprika, sherry vinegar, and olive oil until smooth.","time":"5 min"},{"title":"Char broccoli","text":"Cut broccoli into large florets. Toss with olive oil and salt. Roast at 450\u00b0F or broil 12\u201315 min until edges are deeply charred.","time":"15 min"},{"title":"Sear snapper","text":"Pat fillets dry, season well. Sear skin-side down pressing gently to prevent curling. Cook 4\u20135 min until skin is crispy, then flip for 1\u20132 min.","time":"7 min"},{"title":"Plate","text":"Spread romesco on the plate. Add charred broccoli. Set snapper skin-side up. Squeeze lemon and drizzle olive oil.","time":null}],"Smash Burger with Aged Cheddar & Garlic Aioli":[{"title":"Make garlic aioli","text":"Mix mayonnaise with minced garlic, a squeeze of lemon, and a pinch of salt. Refrigerate.","time":null},{"title":"Form loose balls","text":"Divide beef into two loose 4-oz balls. Do not overwork the meat \u2014 just gather it loosely.","time":null},{"title":"Smash and sear","text":"Heat a cast iron skillet until smoking hot. Add a ball of beef and immediately smash flat with a spatula using maximum force. Cook 2\u20133 min until edges are very crispy. Flip once.","time":"6 min"},{"title":"Melt cheese","text":"Add cheddar in the last minute and cover with a lid to melt.","time":"1 min"},{"title":"Toast and assemble","text":"Toast brioche buns cut-side down in butter until golden. Spread aioli on both halves. Add lettuce, tomato, then the smashed patty. Eat immediately.","time":"2 min"}],"Spaghetti Carbonara with Thick-Cut Bacon":[{"title":"Make egg mixture","text":"Whisk together 2 whole eggs and 2 yolks with most of the pecorino and a heavy grind of black pepper. Should be thick like cream.","time":null},{"title":"Cook bacon","text":"Dice bacon and render in a skillet over medium heat until fat is released and meat is very crispy. Add garlic briefly, then remove.","time":"8 min"},{"title":"Cook pasta","text":"Cook spaghetti in very well-salted water until al dente. Reserve at least 2 cups of starchy pasta water.","time":"10 min"},{"title":"Combine off heat","text":"Transfer pasta to the pan with bacon off the heat. Add egg mixture and toss vigorously, adding pasta water a splash at a time until silky and flowing.","time":null},{"title":"Serve immediately","text":"Plate at once. Add more pecorino and a generous grind of black pepper. Carbonara waits for no one.","time":null}],"Korean Beef Short Ribs \u2014 Galbi":[{"title":"Make marinade","text":"Blend Asian or Bosc pear with soy sauce, sesame oil, garlic, ginger, brown sugar, and sliced scallions. The pear enzymes tenderize the meat \u2014 key to galbi.","time":null},{"title":"Marinate the ribs","text":"Score flanken ribs if needed. Submerge in marinade at least 2 hours, preferably overnight in the fridge.","time":"120 min"},{"title":"Grill over high heat","text":"Grill over very high heat 3\u20134 min per side until caramelized and slightly charred. The sugars create a lacquered, glossy crust.","time":"8 min"},{"title":"Serve","text":"Serve with steamed short-grain rice, quick-pickled vegetables, sesame seeds, and sliced scallions.","time":null}],"Cod with Lemon Caper Butter Sauce":[{"title":"Season cod","text":"Score the skin diagonally 3\u20134 times to prevent curling. Season the flesh side with salt and white pepper.","time":null},{"title":"Sear the cod","text":"Heat oil in a skillet over medium-high. Lay fillets skin-side down. Press gently for the first 30 seconds. Cook 3\u20134 min until skin is crispy and fish is 80% cooked through. Flip and cook 1 min more.","time":"5 min"},{"title":"Make the sauce","text":"Remove fish. Add shallots to pan and cook 1 min. Add wine and reduce. Add capers and lemon juice. Swirl in cold butter until glossy.","time":"4 min"},{"title":"Plate","text":"Place cod skin-side up on the plate. Spoon sauce over and around. Finish with fresh parsley.","time":null}],"Chicken Marsala with Egg Noodles":[{"title":"Dredge and sear chicken","text":"Season chicken, dredge in flour. Sear in butter and oil over medium-high 3\u20134 min per side until golden. Remove.","time":"10 min"},{"title":"Cook mushrooms","text":"Add butter to pan and saut\u00e9 mushrooms and shallots over high heat until deeply golden. Season well.","time":"6 min"},{"title":"Make Marsala sauce","text":"Add Marsala wine \u2014 it will sizzle dramatically. Reduce by half. Add chicken stock and simmer until slightly thickened, about 5 min.","time":"7 min"},{"title":"Finish","text":"Return chicken with any resting juices. Swirl in remaining cold butter. Add spinach and let wilt.","time":"3 min"},{"title":"Cook noodles and serve","text":"Cook egg noodles per package, toss with butter. Plate noodles, add chicken and mushrooms, spoon Marsala sauce over everything.","time":"8 min"}],"Mole-Braised Chicken Enchiladas":[{"title":"Cook and shred chicken","text":"Season chicken thighs. Simmer in stock with half the mole sauce 30 min over medium-low until tender. Shred with two forks.","time":"30 min"},{"title":"Make mole sauce","text":"Mix remaining mole paste with enough braising liquid to make a pourable sauce. Should be complex, slightly bitter, slightly sweet.","time":null},{"title":"Warm tortillas","text":"Heat tortillas briefly in a dry skillet until pliable. Stack in a kitchen towel to keep warm.","time":null},{"title":"Fill and roll","text":"Fill each tortilla with shredded chicken and a little cheese. Roll tightly and place seam-side down in a baking dish.","time":null},{"title":"Bake and garnish","text":"Pour mole sauce over enchiladas. Top with remaining cheese. Bake at 375\u00b0F for 20 min until bubbly. Top with crema, onion, and cilantro.","time":"20 min"}],"Shrimp Tostadas with Avocado & Slaw":[{"title":"Make slaw","text":"Thinly shred cabbage. Toss with lime juice, a pinch of salt, and cumin. Let sit 10 min to soften slightly.","time":"10 min"},{"title":"Make avocado smash","text":"Mash avocados with lime juice, salt, and minced jalape\u00f1o. Keep chunky.","time":null},{"title":"Cook shrimp","text":"Season shrimp with cumin, chili powder, salt, and pepper. Cook in a hot skillet 1\u20132 min per side until pink and slightly charred at edges.","time":"4 min"},{"title":"Make crema","text":"Mix sour cream with lime juice and a pinch of salt until thin enough to drizzle.","time":null},{"title":"Assemble","text":"Spread avocado on tostadas. Add slaw, pile on shrimp, drizzle with crema, top with cilantro and jalape\u00f1o.","time":null}],"Roasted Salmon with Beurre Blanc":[{"title":"Roast salmon","text":"Season salmon fillets. Place on an oiled baking sheet. Roast at 400\u00b0F for 12\u201314 min until opaque through. Rest while making sauce.","time":"14 min"},{"title":"Blanch asparagus","text":"Blanch asparagus in boiling salted water 2\u20133 min. Transfer to ice bath to preserve color. Warm in a pan with butter before serving.","time":"5 min"},{"title":"Make beurre blanc reduction","text":"Simmer white wine with minced shallots in a small saucepan until almost completely reduced \u2014 just 1 tablespoon of liquid remains.","time":"8 min"},{"title":"Emulsify butter","text":"Add cream to stabilize. Over very low heat, whisk in cold butter one tablespoon at a time. The sauce must never boil or it will break.","time":"8 min"},{"title":"Plate","text":"Arrange asparagus, place salmon on top, spoon beurre blanc around and over. Finish with lemon zest.","time":null}],"Shakshuka with Chorizo & Crusty Bread":[{"title":"Brown chorizo","text":"Remove chorizo from casing and crumble into a skillet. Brown over medium-high heat until caramelized. Remove, leaving fat in pan.","time":"6 min"},{"title":"Cook vegetables","text":"Add diced onion and peppers to the chorizo fat. Cook 6\u20137 min. Add garlic, harissa, and cumin. Cook 1 min.","time":"8 min"},{"title":"Add tomatoes and simmer","text":"Add crushed tomatoes. Season well. Simmer 10 min until sauce thickens. Return chorizo.","time":"10 min"},{"title":"Poach the eggs","text":"Create wells in the sauce. Crack an egg into each well. Cover and cook 5\u20136 min for runny yolks.","time":"6 min"},{"title":"Serve","text":"Serve directly from the pan. Garnish with herbs and olive oil. Crusty bread is non-negotiable for scooping.","time":null}],"Vietnamese Lemongrass Pork Chops":[{"title":"Make marinade and marinate","text":"Finely mince tender inner stalks of lemongrass. Combine with garlic, fish sauce, sugar, and lime juice. Coat pork chops and marinate 20\u201330 min.","time":"30 min"},{"title":"Cook vermicelli","text":"Soak rice vermicelli in warm water 10 min, then cook in boiling water 2\u20133 min. Drain and rinse with cold water immediately.","time":"15 min"},{"title":"Make nuoc cham","text":"Combine fish sauce, lime juice, sugar, minced garlic, and sliced chiles with a little water. Should be salty, sour, sweet, and spicy.","time":null},{"title":"Grill pork chops","text":"Grill or pan-sear over high heat 3\u20134 min per side until caramelized. The sugars in the marinade will char \u2014 that's the goal.","time":"8 min"},{"title":"Assemble bowls","text":"Place vermicelli in bowls. Add bean sprouts and fresh mint. Slice pork chop and arrange on top. Drizzle generously with nuoc cham.","time":null}],"Filet Mignon with B\u00e9arnaise & Frites":[{"title":"Make b\u00e9arnaise reduction","text":"Simmer white wine vinegar with minced shallots and half the tarragon until reduced to 1 tablespoon. Cool completely.","time":"5 min"},{"title":"Make b\u00e9arnaise","text":"Whisk egg yolks with the cooled reduction over a bain-marie until thick and doubled in volume. Very slowly whisk in warm clarified butter. Add remaining tarragon.","time":"12 min"},{"title":"Make frites","text":"Cut potatoes into thin batons, rinse, and dry completely. Fry in 325\u00b0F oil 4\u20135 min (blanch), drain. Raise oil to 375\u00b0F and fry again until golden and crispy.","time":"20 min"},{"title":"Cook filets","text":"Season generously. Sear in smoking cast iron 3\u20134 min per side. Internal temp 130\u00b0F for medium-rare. Rest 5 min.","time":"8 min"},{"title":"Plate","text":"Place filet on the plate with a generous spoonful of b\u00e9arnaise on top. Pile frites alongside.","time":null}],"Large Shrimp Pasta with Brown Butter & Herbs":[{"title":"Cook linguine","text":"Cook pasta in very well-salted water until al dente. Reserve 1 cup pasta water.","time":"10 min"},{"title":"Saut\u00e9 garlic","text":"Cook garlic in butter and olive oil over medium heat until golden \u2014 soft and sweet, not bitter.","time":"3 min"},{"title":"Cook shrimp","text":"Add shrimp in a single layer. Cook 1\u20132 min per side until pink and just cooked through. Don't overcook.","time":"4 min"},{"title":"Brown butter","text":"Remove shrimp. Add remaining butter to the pan and cook until golden brown and nutty, swirling constantly.","time":"3 min"},{"title":"Combine and serve","text":"Add wine and lemon juice to deglaze. Add pasta and toss with pasta water as needed. Return shrimp. Finish with parsley and red pepper flakes.","time":null}],"Spicy Peanut Noodles with Rotisserie Chicken":[{"title":"Make peanut sauce","text":"Whisk together peanut butter, soy sauce, sesame oil, minced garlic, grated ginger, lime juice, and sriracha. Thin with hot water until pourable.","time":null},{"title":"Cook soba noodles","text":"Cook soba per package (usually 4\u20135 min). Drain and rinse immediately with cold water to stop cooking and prevent clumping.","time":"5 min"},{"title":"Prep toppings","text":"Shred rotisserie chicken into pieces. Cut cucumber into thin matchsticks. Slice scallions.","time":null},{"title":"Assemble","text":"Toss noodles with enough peanut sauce to coat generously. Add chicken and cucumber. Top with scallions and sesame seeds. More sriracha on the side.","time":null}],"Gulf Coast Seafood Stew with Sourdough":[{"title":"Build the base","text":"Saut\u00e9 diced fennel in olive oil 5 min until soft. Add garlic and cook 1 min. Add white wine and reduce by half.","time":"8 min"},{"title":"Add tomatoes and clam juice","text":"Add crushed tomatoes and clam juice. Simmer 15 min until flavors develop and broth tastes of the sea.","time":"15 min"},{"title":"Cook seafood","text":"Add cubed cod first and simmer 3 min. Add shrimp and cook 3\u20134 min more until both are just cooked through.","time":"7 min"},{"title":"Season and serve","text":"Season generously. Ladle into deep bowls. Finish with olive oil and parsley. Grilled sourdough is essential for dipping.","time":null}],"Pork Tenderloin with Apple & Brandy Cream":[{"title":"Sear tenderloin","text":"Season pork well. Sear all sides in an oven-safe skillet over high heat until golden brown all around \u2014 about 2 min per side.","time":"8 min"},{"title":"Roast to temperature","text":"Transfer to 400\u00b0F oven for 12\u201315 min until internal temperature reaches 145\u00b0F. Rest 5 min.","time":"15 min"},{"title":"Saut\u00e9 apples","text":"In a separate pan, cook apple slices in butter over medium-high heat until golden and caramelized on both sides.","time":"5 min"},{"title":"Make pan sauce","text":"In the pork pan, cook shallots and thyme 2 min. Add brandy carefully and reduce. Add cream and Dijon, simmer until slightly thick.","time":"8 min"},{"title":"Plate","text":"Slice pork and arrange with caramelized apples. Spoon brandy cream sauce over everything.","time":null}],"Red Snapper with Saffron Rice":[{"title":"Bloom saffron","text":"Add saffron threads to warm stock and let infuse at least 15 min. The liquid should turn a deep golden color.","time":"15 min"},{"title":"Toast rice","text":"Saut\u00e9 shallots in butter until soft. Add rice and toast 2 min. Deglaze with white wine and stir until absorbed.","time":"5 min"},{"title":"Cook the rice","text":"Add saffron stock ladle by ladle, stirring frequently, over 18\u201320 min until rice is tender and creamy. Finish with butter and parmesan.","time":"20 min"},{"title":"Sear snapper","text":"Pat fillets dry and season well. Sear skin-side down pressing with a spatula to prevent curling. Cook 4\u20135 min until skin is crispy. Flip for 1\u20132 min.","time":"7 min"},{"title":"Serve","text":"Mound saffron rice on plates, place snapper skin-side up on top. Finish with lemon juice.","time":null}],"Chicken Tikka Masala with Basmati":[{"title":"Marinate chicken","text":"Mix yogurt with half the spices, garlic, ginger, and salt. Coat chicken and marinate at least 30 min.","time":"30 min"},{"title":"Char the chicken","text":"Cook marinated chicken under a hot broiler or in a very hot pan until lightly charred on the outside.","time":"10 min"},{"title":"Build masala sauce","text":"Cook butter with garlic and ginger 2 min. Add remaining spices and cook 1 min. Add tomatoes, simmer 15 min until thick.","time":"20 min"},{"title":"Blend and add cream","text":"Blend sauce until very smooth. Return to pan. Add cream and chicken. Simmer 10 min. Adjust seasoning.","time":"10 min"},{"title":"Serve","text":"Serve over basmati rice with a knob of butter stirred in. Garnish with fresh cilantro.","time":null}],"Chicken Thighs with Lentils du Puy":[{"title":"Cook lentils","text":"Simmer lentils in chicken stock with carrots, celery, and thyme for 20\u201325 min until tender but still holding shape.","time":"25 min"},{"title":"Crisp the chicken skin","text":"Pat chicken skin very dry. Place skin-side down in a cold pan. Heat slowly over medium 12\u201315 min until deeply golden and crispy.","time":"15 min"},{"title":"Roast chicken","text":"Flip and transfer to 400\u00b0F oven for 15 min until cooked through.","time":"15 min"},{"title":"Make warm vinaigrette","text":"Render bacon until crispy. Remove. In same pan, cook shallots 2 min. Add red wine vinegar and Dijon. Stir in olive oil.","time":"6 min"},{"title":"Dress lentils and serve","text":"Toss warm lentils with vinaigrette and crumbled bacon. Season generously. Plate lentils, set chicken skin-side up on top.","time":null}],"Shrimp Pasta with Clam Sauce":[{"title":"Cook linguine","text":"Cook pasta in well-salted water until al dente. Reserve 1 cup pasta water.","time":"10 min"},{"title":"Build the briny base","text":"Saut\u00e9 garlic and shallots in olive oil until soft. Add white wine and reduce by half. Add clam juice and red pepper flakes. Simmer 5 min.","time":"8 min"},{"title":"Cook shrimp","text":"Add shrimp to the sauce and cook 2\u20133 min until just pink and cooked through.","time":"3 min"},{"title":"Combine and finish","text":"Add drained pasta to the pan and toss with pasta water to create a loose sauce. Finish with lemon juice and parsley.","time":null}],"Beef Short Rib Osso Buco Style with Gremolata":[{"title":"Brown the ribs","text":"Season ribs and dredge in flour. Brown all sides deeply in a Dutch oven \u2014 3\u20134 min per side. This crust is the foundation of flavor.","time":"15 min"},{"title":"Build the braise","text":"Saut\u00e9 mirepoix 5 min. Add garlic, tomatoes, wine. Reduce wine by half. Add stock and return ribs. Liquid should come 2/3 up.","time":"10 min"},{"title":"Braise low and slow","text":"Cover and cook in 325\u00b0F oven for 2\u20132.5 hours until meat is very tender. Turn ribs halfway through.","time":"150 min"},{"title":"Make gremolata","text":"Combine minced garlic, lemon zest, and finely chopped parsley. This is added raw at the table \u2014 it provides brightness that cuts the richness.","time":null},{"title":"Serve","text":"Make soft polenta. Plate with ribs and braising liquid. Scatter gremolata generously on top.","time":"25 min"}],"Blackened Catfish with Cajun Dirty Rice":[{"title":"Cook dirty rice","text":"Brown diced andouille in a pot. Add the holy trinity (onion, peppers, celery) and cook until soft. Add garlic, Cajun seasoning, raw rice. Toast 1 min. Add stock. Cook covered 18 min.","time":"25 min"},{"title":"Season catfish","text":"Coat catfish fillets generously on both sides with Cajun seasoning. Press firmly to adhere \u2014 a thick crust is the goal.","time":null},{"title":"Blacken the catfish","text":"Heat a cast iron skillet until smoking hot. Add butter \u2014 it will instantly brown. Lay catfish in the smoking pan. Cook 2\u20133 min per side until charred with a dark, spicy crust.","time":"6 min"},{"title":"Plate","text":"Pile dirty rice on the plate, add catfish on top. Serve with hot sauce and lemon wedges.","time":null}],"Moroccan Chicken Tagine":[{"title":"Season and brown chicken","text":"Rub chicken with ras el hanout and salt. Brown in olive oil skin-side down 4\u20135 min until golden.","time":"10 min"},{"title":"Build the tagine","text":"Saut\u00e9 sliced onion until soft. Add garlic and any remaining spices. Add stock and scrape up all the fond.","time":"6 min"},{"title":"Add preserved lemon and olives","text":"Rinse preserved lemon and add rind to pot (discard pulp). Add olives. Return chicken skin-side up.","time":null},{"title":"Simmer","text":"Cover and cook on low heat 40\u201345 min until chicken is very tender and sauce has deepened in flavor.","time":"45 min"},{"title":"Make couscous and serve","text":"Pour boiling stock over couscous, cover and steam 5 min. Fluff. Serve chicken and sauce over couscous, scatter cilantro.","time":null}],"Irish Stew with Lamb & Stout":[{"title":"Brown the lamb","text":"Season lamb pieces and brown in batches in a Dutch oven over high heat until well caramelized on all sides.","time":"12 min"},{"title":"Deglaze with Guinness","text":"Add onion and cook 3 min. Pour in Guinness and scrape all the fond from the bottom. The stout makes the base.","time":"5 min"},{"title":"Simmer","text":"Add stock, thyme, and bay leaves. Return lamb. Bring to simmer, cover, cook on low heat 1 hour.","time":"60 min"},{"title":"Add root vegetables","text":"Add carrots, parsnips, and potatoes. Cook uncovered 30\u201340 min until vegetables are tender and stew has thickened naturally.","time":"35 min"},{"title":"Serve","text":"Serve in deep bowls with crusty soda bread or brown bread to soak up the Guinness-rich broth.","time":null}],"Corned Beef & Cabbage":[{"title":"Simmer corned beef","text":"Rinse brisket and place in a pot. Cover with cold water by 2 inches. Add bay leaves and spice packet. Bring to a boil, then reduce and simmer covered 2.5\u20133 hours until fork-tender.","time":"180 min"},{"title":"Make mustard sauce","text":"Mix Dijon and prepared horseradish with a spoonful of the braising liquid. Should be sharp and punchy.","time":null},{"title":"Add vegetables","text":"With 40 min left on the beef, add carrots and potatoes to the pot. With 20 min left, add cabbage wedges.","time":"40 min"},{"title":"Slice against the grain","text":"Remove beef and rest 10 min. Slice against the grain \u2014 completely non-negotiable for tenderness.","time":null},{"title":"Serve","text":"Plate sliced beef with vegetables. Ladle some braising broth over. Pass mustard-horseradish sauce at the table.","time":null}],"Salmon with Dill Cream & Cucumber Salad":[{"title":"Make cucumber salad","text":"Thinly slice cucumber. Toss with white wine vinegar, minced shallots, a pinch of sugar, and salt. Let sit 15 min.","time":"15 min"},{"title":"Make dill cream","text":"Mix sour cream with chopped dill, lemon zest, lemon juice, and salt. Should be bright and herby.","time":null},{"title":"Sear salmon","text":"Season salmon. Sear skin-side down in a hot pan 4\u20135 min. Flip and cook 2 min. Rest 2 min.","time":"7 min"},{"title":"Plate","text":"Spoon dill cream on the plate. Place salmon on top. Pile cucumber salad alongside. Garnish with fresh dill fronds.","time":null}],"Miso-Glazed Cod with Bok Choy & Brown Rice":[{"title":"Cook brown rice","text":"Rinse brown rice. Combine with 2 cups water, bring to a boil, cover and simmer 30 min. Remove from heat and steam 5 min with lid on.","time":"35 min"},{"title":"Make glaze","text":"Whisk miso, mirin, sake, and sesame oil until completely smooth and uniform.","time":null},{"title":"Marinate cod","text":"Pat cod completely dry \u2014 essential for the glaze to caramelize. Coat with glaze, reserving a little for basting. Marinate 15 min.","time":"15 min"},{"title":"Broil cod","text":"Broil on high 6\u20138 min, basting once at the 4-min mark. Watch closely \u2014 miso sugars can burn in seconds.","time":"8 min"},{"title":"Sear bok choy and serve","text":"Sear halved bok choy cut-side down in a hot pan 2\u20133 min without moving. Flip and cook 1 min. Plate rice, bok choy, and cod. Finish with sesame seeds.","time":"4 min"}],"Beef Short Rib Rag\u00f9 with Pappardelle":[{"title":"Sear the ribs","text":"Season short ribs aggressively. Sear in oil over high heat until deeply browned on all sides \u2014 real browning, not grey.","time":"15 min"},{"title":"Build the rag\u00f9","text":"In same pot, cook mirepoix 5 min. Add garlic, then wine and reduce by half. Add tomatoes, thyme, and return ribs.","time":"10 min"},{"title":"Braise low and slow","text":"Cover and cook at 325\u00b0F for 3+ hours until meat is completely falling apart.","time":"180 min"},{"title":"Shred and reduce","text":"Remove ribs and shred. Skim fat. Return meat to pot and simmer uncovered 10 min to concentrate.","time":"10 min"},{"title":"Cook pasta and serve","text":"Cook pappardelle until al dente. Reserve 1 cup pasta water. Toss pasta with rag\u00f9, adding water to loosen. Plate with parmesan grated generously on top.","time":"8 min"}],"Grilled Snapper with Mango Habanero Salsa":[{"title":"Make salsa first","text":"Dice mango, finely dice habanero (use gloves), dice red onion. Mix with cilantro and lime juice. Season. Let sit 20 min.","time":"20 min"},{"title":"Season snapper","text":"Score the skin lightly in 2\u20133 places to prevent curling. Season with cumin, salt, and a drizzle of olive oil.","time":null},{"title":"Grill over high heat","text":"Grill skin-side down over high heat 3\u20134 min. The skin will release naturally when ready \u2014 don't force it. Flip and cook 2 min.","time":"7 min"},{"title":"Plate and serve","text":"Place snapper on the plate and spoon mango salsa generously over the top. Extra lime wedges on the side.","time":null}],"Chicken Saltimbocca with Marsala":[{"title":"Assemble saltimbocca","text":"Lay sage leaves on the pounded chicken. Drape prosciutto over to cover completely. Secure with a toothpick. Season the underside with pepper only \u2014 prosciutto is already salty.","time":null},{"title":"Sear prosciutto side down","text":"Lightly flour the prosciutto side. Place prosciutto-side down in hot butter. Cook 3\u20134 min until crispy. Flip and cook 2 min more.","time":"6 min"},{"title":"Make Marsala sauce","text":"Remove chicken. Add Marsala wine to the pan and reduce by half, scraping all the fond. Add stock. Simmer 3 min. Swirl in remaining cold butter.","time":"5 min"},{"title":"Plate","text":"Plate chicken prosciutto-side up. Pour Marsala sauce over. Add a squeeze of lemon to finish.","time":null}],"Miso-Glazed Salmon with Shiitake Fried Rice":[{"title":"Make glaze and marinate","text":"Combine soy sauce, mirin, miso paste, and a pinch of sugar. Coat salmon fillets and marinate 15 min.","time":"15 min"},{"title":"Broil salmon","text":"Wipe excess marinade \u2014 burnt miso is bitter. Broil on high 8\u201310 min until lacquered and caramelized. Watch closely.","time":"10 min"},{"title":"Fry shiitakes","text":"Slice shiitakes and stir-fry in a hot wok until golden and slightly crispy. Season and set aside.","time":"5 min"},{"title":"Fry the rice","text":"Add cold day-old rice to the wok, breaking up any clumps. Stir-fry over high heat 3\u20134 min.","time":"4 min"},{"title":"Finish rice and serve","text":"Push rice to the sides, scramble eggs in the center, then mix together. Add sesame oil, soy sauce, and scallions. Plate rice with salmon on top.","time":"3 min"}],"Eggplant Parmigiana with Fresh Mozzarella":[{"title":"Salt and drain eggplant","text":"Slice eggplant half-inch thick. Salt both sides
